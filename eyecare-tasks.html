<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイケア タスク管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f7cff;
    --accent2: #7c4fff;
    --green: #2ecc71;
    --yellow: #f1c40f;
    --red: #e74c3c;
    --text: #e8eaf0;
    --text-muted: #7a8099;
    --outsource: #ff6b9d;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 24px 80px;
  }

  .header {
    max-width: 900px; margin: 0 auto 32px;
    display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; flex-wrap: wrap;
  }
  .header-left h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 4px; }
  .header-left p { color: var(--text-muted); font-size: 13px; }
  .back-link { font-size: 12px; color: var(--text-muted); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 8px; }
  .back-link:hover { color: var(--accent); }

  .countdown { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px 24px; text-align: center; min-width: 170px; }
  .countdown-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 6px; }
  .countdown-days { font-size: 40px; font-weight: 800; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .countdown-date { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

  .overall { max-width: 900px; margin: 0 auto 28px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px 24px; }
  .overall-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .overall-top span { font-size: 12px; color: var(--text-muted); }
  .overall-top strong { font-size: 18px; font-weight: 700; color: var(--accent); }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }
  .milestone-progress { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .mp-item { font-size: 11px; color: var(--text-muted); }
  .mp-item span { color: var(--text); font-weight: 600; }

  .phases { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .phase { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .phase-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  .phase-number { width: 26px; height: 26px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text-muted); flex-shrink: 0; }
  .phase-title { font-size: 14px; font-weight: 600; flex: 1; }
  .phase-count { font-size: 11px; color: var(--text-muted); }
  .phase-chevron { color: var(--text-muted); transition: transform 0.2s; font-size: 11px; }
  .phase.collapsed .phase-chevron { transform: rotate(-90deg); }
  .phase.collapsed .task-list { display: none; }

  .task-list { padding: 8px; }
  .task-item { border-radius: 10px; margin-bottom: 4px; border: 1px solid transparent; transition: border-color 0.15s; }
  .task-item.expanded { border-color: var(--border); background: var(--surface2); }
  .task-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; border-radius: 10px; transition: background 0.15s; }
  .task-item:not(.expanded) .task-row:hover { background: var(--surface2); }
  .task-expand-icon { font-size: 10px; color: var(--text-muted); transition: transform 0.2s; width: 14px; text-align: center; flex-shrink: 0; }
  .task-item.expanded .task-expand-icon,
  .person-task-item.expanded .task-expand-icon { transform: rotate(90deg); }
  .task-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; font-size: 10px; }
  .task-item[data-status="done"] .task-check,
  .person-task-item[data-status="done"] .task-check { background: var(--green); border-color: var(--green); color: white; }
  .task-item[data-status="doing"] .task-check,
  .person-task-item[data-status="doing"] .task-check { border-color: var(--yellow); background: rgba(241,196,15,0.15); }
  .task-main { flex: 1; min-width: 0; }
  .task-name { font-size: 13px; font-weight: 600; }
  .task-item[data-status="done"] .task-name,
  .person-task-item[data-status="done"] .task-name { color: var(--text-muted); text-decoration: line-through; }
  .task-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
  .badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; letter-spacing: 0.5px; text-transform: uppercase; }
  .badge-self { background: rgba(79,124,255,0.15); color: var(--accent); border: 1px solid rgba(79,124,255,0.3); }
  .badge-outsource { background: rgba(255,107,157,0.15); color: var(--outsource); border: 1px solid rgba(255,107,157,0.3); }
  .ms-summary { font-size: 11px; color: var(--text-muted); }
  .status-btn { display: flex; gap: 4px; flex-shrink: 0; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; cursor: pointer; opacity: 0.3; transition: opacity 0.15s, transform 0.15s; }
  .status-dot:hover { opacity: 0.8; transform: scale(1.3); }
  .status-dot.active { opacity: 1; }
  .dot-todo { background: var(--text-muted); }
  .dot-doing { background: var(--yellow); }
  .dot-done { background: var(--green); }

  .milestone-panel { padding: 0 14px 14px 14px; display: none; }
  .task-item.expanded .milestone-panel,
  .person-task-item.expanded .milestone-panel { display: block; }
  .milestone-section { margin-bottom: 14px; }
  .milestone-section-title { font-size: 10px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .milestone-item { display: flex; align-items: flex-start; gap: 10px; padding: 7px 10px; border-radius: 8px; cursor: pointer; transition: background 0.12s; }
  .milestone-item:hover { background: rgba(255,255,255,0.04); }
  .ms-check { width: 15px; height: 15px; border-radius: 4px; border: 1.5px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; transition: all 0.12s; font-size: 9px; }
  .milestone-item.done .ms-check { background: var(--green); border-color: var(--green); color: white; }
  .ms-content { flex: 1; }
  .ms-text { font-size: 12px; color: var(--text); line-height: 1.4; }
  .milestone-item.done .ms-text { color: var(--text-muted); text-decoration: line-through; }
  .ms-hint { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }
  .ms-deliverable { display: inline-block; font-size: 9px; font-weight: 600; padding: 1px 6px; border-radius: 4px; background: rgba(79,124,255,0.12); color: var(--accent); border: 1px solid rgba(79,124,255,0.2); margin-top: 3px; }

  .deadline-badge { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; letter-spacing: 0.3px; flex-shrink: 0; }
  .dl-ok      { background: rgba(122,128,153,0.15); color: var(--text-muted); border: 1px solid rgba(122,128,153,0.25); }
  .dl-soon    { background: rgba(241,196,15,0.15);  color: var(--yellow);     border: 1px solid rgba(241,196,15,0.35); }
  .dl-urgent  { background: rgba(231,76,60,0.15);   color: #e74c3c;           border: 1px solid rgba(231,76,60,0.35); }
  .dl-done    { background: rgba(46,204,113,0.12);  color: var(--green);      border: 1px solid rgba(46,204,113,0.25); }

  .deadline-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .deadline-row label { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .deadline-row input[type=date] { background: transparent; border: none; color: var(--text); font-size: 12px; font-family: inherit; outline: none; cursor: pointer; flex: 1; }
  .deadline-row input[type=date]::-webkit-calendar-picker-indicator { filter: invert(0.5); cursor: pointer; }

  .task-notes-area { margin-top: 10px; }
  .task-notes-area textarea { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 12px; padding: 10px; resize: vertical; min-height: 70px; outline: none; transition: border-color 0.15s; }
  .task-notes-area textarea:focus { border-color: var(--accent); }
  .task-notes-area textarea::placeholder { color: var(--text-muted); }

  /* ── ビュータブ ── */
  .view-tabs { max-width: 900px; margin: 0 auto 20px; display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 4px; width: fit-content; }
  .view-tab { font-size: 12px; font-weight: 600; padding: 7px 18px; border-radius: 8px; cursor: pointer; color: var(--text-muted); transition: all 0.15s; user-select: none; }
  .view-tab:hover { color: var(--text); }
  .view-tab.active { background: var(--accent); color: #fff; }

  /* ── 担当者別ビュー ── */
  .person-sections { max-width: 900px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
  .person-section { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
  .person-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .person-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
  .person-name { font-size: 15px; font-weight: 700; flex: 1; }
  .person-count { font-size: 11px; color: var(--text-muted); }
  .person-task-list { padding: 8px; }
  .person-task-item { border-radius: 10px; margin-bottom: 4px; border: 1px solid transparent; transition: border-color 0.15s; }
  .person-task-item.expanded { border-color: var(--border); background: var(--surface2); }
  .person-task-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; cursor: pointer; border-radius: 10px; transition: background 0.15s; }
  .person-task-item:not(.expanded) .person-task-row:hover { background: var(--surface2); }
  .person-phase-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); flex-shrink: 0; white-space: nowrap; }

  /* ── 担当者フィルター（フェーズビュー用） ── */
  .badge-assignee { font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 99px; background: rgba(124,79,255,0.15); color: var(--accent2); border: 1px solid rgba(124,79,255,0.3); }
  .assignee-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; padding: 10px 14px; background: var(--bg); border-radius: 8px; border: 1px solid var(--border); }
  .assignee-row label { font-size: 11px; color: var(--text-muted); flex-shrink: 0; }
  .assignee-row input[type=text] { background: transparent; border: none; color: var(--text); font-size: 12px; font-family: inherit; outline: none; flex: 1; }
  .assignee-row input[type=text]::placeholder { color: var(--text-muted); }

  footer { max-width: 900px; margin: 40px auto 0; text-align: center; font-size: 11px; color: var(--text-muted); }
  footer a { color: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">

<div id="view-person" style="display:none">

<footer>タスク行をクリックしてマイルストーンを展開 / ●●● でステータス上書き | <a href="/project-hub.html">← Hub</a></footer>

function loadData() {
  // v5 データがあればそのまま使う
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e) {}

  // v5 がなければ旧 v4 データを読み込んで移行
  const base = JSON.parse(JSON.stringify(defaultData));
  try {
    const old = localStorage.getItem('eyecare_tasks_v4');
    if (old) {
      const oldData = JSON.parse(old);
      // 旧データのタスク状態（notes / deadline / milestone.done / expanded）を引き継ぐ
      const oldTaskMap = {};
      for (const p of (oldData.phases || [])) {
        for (const t of (p.tasks || [])) oldTaskMap[t.id] = t;
      }
      for (const p of base.phases) {
        if (oldData.phases) {
          const oldPhase = oldData.phases.find(op => op.id === p.id);
          if (oldPhase) p.collapsed = oldPhase.collapsed;
        }
        for (const t of p.tasks) {
          const ot = oldTaskMap[t.id];
          if (!ot) continue;
          t.notes    = ot.notes    ?? t.notes;
          t.deadline = ot.deadline ?? t.deadline;
          t.expanded = ot.expanded ?? false;
          // milestone done 状態を引き継ぐ
          const oldMsMap = {};
          for (const ms of (ot.milestones || [])) {
            if (ms.type === 'section') for (const item of ms.items) oldMsMap[item.id] = item.done;
          }
          for (const ms of (t.milestones || [])) {
            if (ms.type === 'section') for (const item of ms.items) {
              if (item.id in oldMsMap) item.done = oldMsMap[item.id];
            }
          }
        }
      }
    }
  } catch(e) {}
  return base;
}
function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  // v4 も同期して上書き（移行完了済みにする）
  localStorage.setItem('eyecare_tasks_v4', JSON.stringify(d));
}

let data = loadData();

function updateCountdown() {
  const days = Math.ceil((DEADLINE - new Date()) / 86400000);
  const el = document.getElementById('countdown-days');
  el.textContent = days > 0 ? days : '0';
  if (days <= 14) el.style.background = 'linear-gradient(135deg,#e74c3c,#ff6b9d)';
  else if (days <= 30) el.style.background = 'linear-gradient(135deg,#f1c40f,#ff9d00)';
}

function allMilestoneItems() {
  return data.phases.flatMap(p => p.tasks.flatMap(t =>
    (t.milestones || []).flatMap(ms => ms.type === 'section' ? ms.items : [])
  ));
}

function updateProgress() {
  const all = allMilestoneItems();
  const done = all.filter(m => m.done).length;
  const pct = all.length ? Math.round(done / all.length * 100) : 0;
  document.getElementById('overall-pct').textContent = pct + '%';
  document.getElementById('overall-bar').style.width = pct + '%';
  document.getElementById('ms-done').textContent = done;
  document.getElementById('ms-total').textContent = all.length;
  const tasks = data.phases.flatMap(p => p.tasks);
  document.getElementById('ms-doing').textContent = tasks.filter(t => deriveStatus(t) === 'doing').length;
  document.getElementById('ms-todo').textContent = tasks.filter(t => deriveStatus(t) === 'todo').length;
}

function deadlineBadge(task) {
  if (!task.deadline) return '';
  const status = deriveStatus(task);
  const dl = new Date(task.deadline + 'T00:00:00');
  const days = Math.ceil((dl - new Date()) / 86400000);
  const label = task.deadline.slice(5).replace('-', '/');
  if (status === 'done') return `<span class="deadline-badge dl-done">✓ ${label}</span>`;
  if (days < 0)   return `<span class="deadline-badge dl-urgent">⚑ ${label} 超過${Math.abs(days)}日</span>`;
  if (days <= 7)  return `<span class="deadline-badge dl-urgent">⚑ ${label} あと${days}日</span>`;
  if (days <= 14) return `<span class="deadline-badge dl-soon">⚑ ${label} あと${days}日</span>`;
  return `<span class="deadline-badge dl-ok">⚑ ${label}</span>`;
}

function deriveStatus(task) {
  const items = (task.milestones || []).flatMap(ms => ms.type === 'section' ? ms.items : []);
  if (!items.length) return task.status || 'todo';
  const done = items.filter(m => m.done).length;
  if (done === 0) return 'todo';
  if (done === items.length) return 'done';
  return 'doing';
}

function findTask(id) {
  for (const p of data.phases) for (const t of p.tasks) if (t.id === id) return t;
  return null;
}
function findMsItem(taskId, msId) {
  const t = findTask(taskId);
  if (!t) return null;
  for (const ms of (t.milestones || [])) {
    if (ms.type === 'section') { const m = ms.items.find(i => i.id === msId); if (m) return m; }
  }
  return null;
}

function render() {
  const container = document.getElementById('phases-container');
  container.innerHTML = '';
  data.phases.forEach((phase, pi) => {
    const filteredTasks = phase.tasks;
    if (filteredTasks.length === 0) return;
    const done = filteredTasks.filter(t => deriveStatus(t) === 'done').length;
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase' + (phase.collapsed ? ' collapsed' : '');
    const tasksHtml = filteredTasks.map(task => {
      const status = deriveStatus(task);
      const items = (task.milestones || []).flatMap(ms => ms.type === 'section' ? ms.items : []);
      const doneCount = items.filter(m => m.done).length;
      const checkIcon = status === 'done' ? '✓' : status === 'doing' ? '…' : '';

      const sectionsHtml = (task.milestones || []).map(ms => {
        if (ms.type !== 'section') return '';
        return `<div class="milestone-section">
          <div class="milestone-section-title">${esc(ms.title)}</div>
          ${ms.items.map(item => `
            <div class="milestone-item ${item.done ? 'done' : ''}" onclick="toggleMs('${task.id}','${item.id}')">
              <div class="ms-check">${item.done ? '✓' : ''}</div>
              <div class="ms-content">
                <div class="ms-text">${esc(item.text)}</div>
                ${item.hint ? `<div class="ms-hint">${esc(item.hint)}</div>` : ''}
                ${item.deliverable ? `<div class="ms-deliverable">成果物: ${esc(item.deliverable)}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>`;
      }).join('');

      return `<div class="task-item ${task.expanded ? 'expanded' : ''}" data-status="${status}" id="task-${task.id}">
        <div class="task-row" onclick="toggleTask('${task.id}')">
          <div class="task-expand-icon">▶</div>
          <div class="task-check">${checkIcon}</div>
          <div class="task-main">
            <div class="task-name">${esc(task.name)}</div>
            <div class="task-meta">
              <span class="badge ${task.type === 'outsource' ? 'badge-outsource' : 'badge-self'}">${task.type === 'outsource' ? '外注' : '自分'}</span>
              <span class="badge-assignee">${esc(getAssignee(task))}</span>
              ${deadlineBadge(task)}
              <span class="ms-summary">${doneCount}/${items.length} 完了</span>
              ${task.notes ? `<span class="ms-summary">— ${esc(task.notes.substring(0,50))}</span>` : ''}
            </div>
          </div>
          <div class="status-btn" onclick="event.stopPropagation()">
            <div class="status-dot dot-todo ${status==='todo'?'active':''}" title="未着手" onclick="forceStatus('${task.id}','todo')"></div>
            <div class="status-dot dot-doing ${status==='doing'?'active':''}" title="進行中" onclick="forceStatus('${task.id}','doing')"></div>
            <div class="status-dot dot-done ${status==='done'?'active':''}" title="完了" onclick="forceStatus('${task.id}','done')"></div>
          </div>
        </div>
        <div class="milestone-panel">
          ${sectionsHtml}
          <div class="assignee-row">
            <label>担当者</label>
            <input type="text" placeholder="名前を入力..." value="${esc(task.assignee || '')}"
              onchange="saveAssignee('${task.id}',this.value)" onclick="event.stopPropagation()">
          </div>
          <div class="deadline-row">
            <label>⚑ 締切日</label>
            <input type="date" value="${task.deadline||''}" onchange="saveDeadline('${task.id}',this.value)" onclick="event.stopPropagation()">
          </div>
          <div class="task-notes-area">
            <textarea placeholder="メモ..." oninput="saveNotes('${task.id}',this.value)">${esc(task.notes||'')}</textarea>
          </div>
        </div>
      </div>`;
    }).join('');

    phaseEl.innerHTML = `
      <div class="phase-header" onclick="togglePhase('${phase.id}')">
        <div class="phase-number">${pi+1}</div>
        <div class="phase-title">${esc(phase.title)}</div>
        <div class="phase-count">${done}/${filteredTasks.length}</div>
        <div class="phase-chevron">▼</div>
      </div>
      <div class="task-list">${tasksHtml}</div>`;
    container.appendChild(phaseEl);
  });
  updateProgress();
}

function toggleTask(id) {
  const t = findTask(id); if (t) { t.expanded = !t.expanded; saveData(data); render(); }
}
function togglePhase(id) {
  const p = data.phases.find(ph => ph.id === id); if (p) { p.collapsed = !p.collapsed; saveData(data); render(); }
}
function toggleMs(taskId, msId) {
  const m = findMsItem(taskId, msId); if (m) { m.done = !m.done; saveData(data); render(); }
}
function forceStatus(taskId, status) {
  const t = findTask(taskId); if (!t) return;
  const items = (t.milestones || []).flatMap(ms => ms.type === 'section' ? ms.items : []);
  if (status === 'done') items.forEach(m => m.done = true);
  else if (status === 'todo') items.forEach(m => m.done = false);
  saveData(data); render();
}
function saveNotes(taskId, val) {
  const t = findTask(taskId); if (t) { t.notes = val; saveData(data); }
}
function saveDeadline(taskId, val) {
  const t = findTask(taskId); if (t) { t.deadline = val; saveData(data); render(); }
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── ビュー切替 ────────────────────────────────────
let currentView = 'phase';

function switchView(v) {
  currentView = v;
  document.getElementById('view-phase').style.display = v === 'phase' ? '' : 'none';
  document.getElementById('view-person').style.display = v === 'person' ? '' : 'none';
  document.getElementById('tab-phase').classList.toggle('active', v === 'phase');
  document.getElementById('tab-person').classList.toggle('active', v === 'person');
  if (v === 'person') renderPersonView();
}

// ── 担当者ヘルパー ────────────────────────────────
function getAssignee(task) {
  if (task.assignee) return task.assignee;
  return task.type === 'outsource' ? '外注' : '自分';
}

function getAllAssignees() {
  const set = new Set();
  data.phases.flatMap(p => p.tasks).forEach(t => set.add(getAssignee(t)));
  return Array.from(set).sort();
}

function saveAssignee(taskId, val) {
  const t = findTask(taskId);
  if (t) { t.assignee = val.trim(); saveData(data); }
}

// ── 担当者別ビュー ────────────────────────────────
function renderPersonView() {
  const container = document.getElementById('person-container');
  container.innerHTML = '';

  // Collect all tasks with their phase label
  const allTasks = data.phases.flatMap(p =>
    p.tasks.map(t => ({ task: t, phaseTitle: p.title.replace(/フェーズ \d+ — /, '') }))
  );

  // Group by assignee
  const grouped = {};
  allTasks.forEach(({ task, phaseTitle }) => {
    const name = getAssignee(task);
    if (!grouped[name]) grouped[name] = [];
    grouped[name].push({ task, phaseTitle });
  });

  Object.keys(grouped).sort().forEach(name => {
    const entries = grouped[name];
    const doneCount = entries.filter(({ task }) => deriveStatus(task) === 'done').length;
    const initial = name.slice(0, 1).toUpperCase() || '?';

    const tasksHtml = entries.map(({ task, phaseTitle }) => {
      const status = deriveStatus(task);
      const items = (task.milestones || []).flatMap(ms => ms.type === 'section' ? ms.items : []);
      const msDone = items.filter(m => m.done).length;
      const checkIcon = status === 'done' ? '✓' : status === 'doing' ? '…' : '';

      const sectionsHtml = (task.milestones || []).map(ms => {
        if (ms.type !== 'section') return '';
        return `<div class="milestone-section">
          <div class="milestone-section-title">${esc(ms.title)}</div>
          ${ms.items.map(item => `
            <div class="milestone-item ${item.done ? 'done' : ''}" onclick="toggleMs('${task.id}','${item.id}');renderPersonView()">
              <div class="ms-check">${item.done ? '✓' : ''}</div>
              <div class="ms-content">
                <div class="ms-text">${esc(item.text)}</div>
                ${item.hint ? `<div class="ms-hint">${esc(item.hint)}</div>` : ''}
                ${item.deliverable ? `<div class="ms-deliverable">成果物: ${esc(item.deliverable)}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>`;
      }).join('');

      return `<div class="person-task-item ${task.expanded ? 'expanded' : ''}" data-status="${status}">
        <div class="person-task-row" onclick="toggleTask('${task.id}');renderPersonView()">
          <div class="task-expand-icon">▶</div>
          <div class="task-check">${checkIcon}</div>
          <div class="task-main">
            <div class="task-name">${esc(task.name)}</div>
            <div class="task-meta">
              <span class="person-phase-tag">${esc(phaseTitle)}</span>
              <span class="badge ${task.type === 'outsource' ? 'badge-outsource' : 'badge-self'}">${task.type === 'outsource' ? '外注' : '自分'}</span>
              ${deadlineBadge(task)}
              <span class="ms-summary">${msDone}/${items.length} 完了</span>
            </div>
          </div>
          <div class="status-btn" onclick="event.stopPropagation()">
            <div class="status-dot dot-todo ${status==='todo'?'active':''}" onclick="forceStatus('${task.id}','todo');renderPersonView()"></div>
            <div class="status-dot dot-doing ${status==='doing'?'active':''}" onclick="forceStatus('${task.id}','doing');renderPersonView()"></div>
            <div class="status-dot dot-done ${status==='done'?'active':''}" onclick="forceStatus('${task.id}','done');renderPersonView()"></div>
          </div>
        </div>
        <div class="milestone-panel">
          ${sectionsHtml}
          <div class="assignee-row">
            <label>担当者</label>
            <input type="text" placeholder="名前を入力..." value="${esc(task.assignee || '')}"
              onchange="saveAssignee('${task.id}',this.value);renderPersonView()" onclick="event.stopPropagation()">
          </div>
          <div class="deadline-row">
            <label>⚑ 締切日</label>
            <input type="date" value="${task.deadline||''}" onchange="saveDeadline('${task.id}',this.value);renderPersonView()" onclick="event.stopPropagation()">
          </div>
          <div class="task-notes-area">
            <textarea placeholder="メモ..." oninput="saveNotes('${task.id}',this.value)">${esc(task.notes||'')}</textarea>
          </div>
        </div>
      </div>`;
    }).join('');

    const pct = entries.length ? Math.round(doneCount / entries.length * 100) : 0;
    const secEl = document.createElement('div');
    secEl.className = 'person-section';
    secEl.innerHTML = `
      <div class="person-header">
        <div class="person-avatar">${esc(initial)}</div>
        <div class="person-name">${esc(name)}</div>
        <div class="person-count">${doneCount}/${entries.length} 完了 &nbsp;·&nbsp; ${pct}%</div>
      </div>
      <div class="person-task-list">${tasksHtml}</div>`;
    container.appendChild(secEl);
  });
}

updateCountdown();
render();
</script>
</body>
</html>
