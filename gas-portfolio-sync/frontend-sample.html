<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>制作物ギャラリー（GAS連携サンプル）</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', sans-serif; background: #f9f8f6; color: #111; padding: 40px 24px; }
  h1   { font-size: 1.4rem; font-weight: 700; margin-bottom: 24px; }

  /* フィルター */
  .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn {
    background: none; border: 1px solid #dedad5; border-radius: 14px;
    padding: 4px 14px; cursor: pointer; font-size: 0.75rem; color: #999;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: #111; color: #fff; border-color: #111;
  }

  /* ギャラリー */
  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 24px;
  }

  /* カード */
  .card {
    background: #fff; border: 1px solid #dedad5; border-radius: 4px; overflow: hidden;
    transition: box-shadow .2s;
  }
  .card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.08); }

  .card-thumb {
    aspect-ratio: 4/3; background: #e6e4e0;
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem; color: #bbb; cursor: pointer;
  }
  .card-thumb img { width: 100%; height: 100%; object-fit: cover; }

  .card-body { padding: 14px; }
  .card-title { font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; }
  .card-meta  { font-size: 0.7rem; color: #999; margin-bottom: 10px; }

  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }
  .card-tag {
    font-size: 0.6rem; color: #999; border: 1px solid #dedad5;
    padding: 1px 7px; border-radius: 2px;
  }
  .card-tag.category { color: #2a9d2a; border-color: #b5e0b5; background: #f4fbf4; }

  .pdf-btn {
    display: inline-block; margin-top: 12px;
    background: #111; color: #fff; border-radius: 3px;
    font-size: 0.7rem; padding: 6px 14px; text-decoration: none;
    letter-spacing: .04em; transition: opacity .15s;
  }
  .pdf-btn:hover { opacity: .75; }

  .empty  { padding: 60px; text-align: center; color: #999; grid-column: 1/-1; }
  .loader { padding: 60px; text-align: center; color: #999; }
  .error  { padding: 24px; background: #fff1f0; border: 1px solid #ffb3b3;
            border-radius: 4px; color: #c0392b; font-size: 0.85rem; }
</style>
</head>
<body>

<h1>制作物ギャラリー</h1>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">すべて</button>
  <!-- カテゴリボタンはJSで動的生成 -->
</div>

<div class="gallery" id="gallery">
  <div class="loader">読み込み中...</div>
</div>

<script>
/**
 * ============================================================
 *  GAS Web App からデータを取得してギャラリーを描画するサンプル
 * ============================================================
 */

// ★ デプロイ後の Web App URL に変更してください
const GAS_API_URL = 'https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXXX/exec';

let allItems   = [];
let activeFilter = 'all';

// ── データ取得 ─────────────────────────────────────────────
async function loadGallery() {
  try {
    const res  = await fetch(`${GAS_API_URL}?status=active`);
    const json = await res.json();

    if (!json.ok) throw new Error(json.error || 'APIエラー');

    // sync_status === 'ok' のみ表示（サーバー側でも絞り込み済み）
    allItems = json.data.filter(d => d.sync_status === 'ok');

    buildFilterButtons();
    renderGallery(allItems);

  } catch (e) {
    document.getElementById('gallery').innerHTML =
      `<div class="error">データの取得に失敗しました: ${e.message}</div>`;
  }
}

// ── フィルターボタン生成 ─────────────────────────────────────
function buildFilterButtons() {
  const categories = [...new Set(allItems.map(d => d.category).filter(Boolean))].sort();
  const container  = document.getElementById('filters');

  categories.forEach(cat => {
    const btn = document.createElement('button');
    btn.className    = 'filter-btn';
    btn.dataset.filter = cat;
    btn.textContent  = cat;
    container.appendChild(btn);
  });

  container.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;

    container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;

    const filtered = activeFilter === 'all'
      ? allItems
      : allItems.filter(d => d.category === activeFilter);
    renderGallery(filtered);
  });
}

// ── ギャラリーレンダリング ────────────────────────────────────
function renderGallery(items) {
  const container = document.getElementById('gallery');

  if (!items.length) {
    container.innerHTML = '<div class="empty">表示できる制作物がありません</div>';
    return;
  }

  container.innerHTML = items.map(item => cardHtml(item)).join('');
}

// ── カードHTML生成 ────────────────────────────────────────────
function cardHtml(item) {
  // PDF リンクを安全にエスケープ
  const pdfUrl  = esc(item.pdf_url  || '');
  const pdfName = esc(item.pdf_name || 'PDF');
  const title   = esc(item.title    || '');
  const store   = esc(item.store_name || '');
  const cat     = esc(item.category   || '');
  const updAt   = item.pdf_updated_at
    ? new Date(item.pdf_updated_at).toLocaleDateString('ja-JP')
    : '';

  const pdfBtn = pdfUrl
    ? `<a class="pdf-btn" href="${pdfUrl}" target="_blank" rel="noopener">PDF を開く</a>`
    : '';

  return `
    <div class="card">
      <div class="card-thumb" onclick="${pdfUrl ? `window.open('${pdfUrl}','_blank')` : ''}">
        📄
      </div>
      <div class="card-body">
        <div class="card-title">${title}</div>
        <div class="card-meta">${store}${updAt ? ' · ' + updAt : ''}</div>
        <div class="card-tags">
          ${cat ? `<span class="card-tag category">${cat}</span>` : ''}
          <span class="card-tag">${esc(item.status || '')}</span>
        </div>
        ${pdfBtn}
      </div>
    </div>`;
}

// ── ユーティリティ ────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 起動 ──────────────────────────────────────────────────────
loadGallery();
</script>
</body>
</html>
