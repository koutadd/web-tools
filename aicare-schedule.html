<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全体スケジュール | アイケアラボ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #080c14;
  --surface: #111827;
  --surface2: #1e2740;
  --border: #253047;
  --text: #f0f4ff;
  --muted: #7c8fa8;
  --accent: #f59e0b;
}
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  min-height: 100vh;
  padding-bottom: 100px;
}

/* ── Common Nav ── */
#aicare-common-nav {
  position: sticky; top: 0; z-index: 99999;
  background: #040c18;
  border-bottom: 1px solid rgba(245,158,11,0.18);
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px; height: 42px; min-height: 42px; max-height: 42px;
  overflow-x: auto; overflow-y: hidden;
  flex-wrap: nowrap; white-space: nowrap;
  scrollbar-width: none; -ms-overflow-style: none;
  font-family: 'DM Mono','SF Mono',monospace; font-size: 11px; letter-spacing: 0.05em;
}
#aicare-common-nav::-webkit-scrollbar { display: none; }
#aicare-common-nav > * { flex-shrink: 0; }
#aicare-common-nav .cn-label { color: rgba(255,255,255,0.25); font-size: 10px; letter-spacing: 0.1em; padding-right: 4px; }
#aicare-common-nav .cn-sep  { color: rgba(255,255,255,0.15); padding: 0 2px; user-select: none; }
#aicare-common-nav a { color: rgba(148,163,184,0.85); text-decoration: none; padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(148,163,184,0.12); transition: all 0.15s; white-space: nowrap; }
#aicare-common-nav a:hover { color: #e2eaf4; background: rgba(255,255,255,0.06); }
#aicare-common-nav a.cn-active { color: #f59e0b !important; border-color: rgba(245,158,11,0.35) !important; background: rgba(245,158,11,0.08) !important; }

/* ── Layout ── */
.wrap { max-width: 1400px; margin: 0 auto; padding: 28px 32px; }
@media (max-width: 768px) { .wrap { padding: 16px; } }

/* ── Page Header ── */
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; }
.page-head-left h1 { font-size: 22px; font-weight: 700; }
.page-head-left p  { color: var(--muted); font-size: 12px; margin-top: 4px; }
.refresh-btn {
  padding: 6px 14px; font-size: 12px; border-radius: 7px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; transition: all 0.15s;
}
.refresh-btn:hover { color: var(--text); border-color: rgba(245,158,11,0.3); }

/* ── Stats Row ── */
.stats-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 28px; align-items: stretch; }
.stat-chip {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 12px 20px; display: flex; align-items: center; gap: 10px; flex: 1; min-width: 120px;
}
.stat-chip .s-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.stat-chip .s-num { font-size: 28px; font-weight: 800; line-height: 1; }
.stat-chip .s-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.countdown-chip {
  background: var(--surface); border: 1px solid rgba(245,158,11,0.3);
  border-radius: 10px; padding: 12px 24px; text-align: center; min-width: 140px;
}
.countdown-chip .c-days { font-size: 36px; font-weight: 800; color: var(--accent); line-height: 1; }
.countdown-chip .c-lbl { font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 4px; }
.countdown-chip .c-date { font-size: 11px; color: var(--text); margin-top: 5px; font-weight: 500; }

/* ── Section Head ── */
.sec-head {
  font-size: 11px; font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 14px; padding-bottom: 10px;
  border-bottom: 2px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.sec-head .sh-sub { font-weight: 400; opacity: 0.7; letter-spacing: 0; text-transform: none; font-size: 11px; }

/* ── Gantt Card ── */
.gantt-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  overflow-x: auto; margin-bottom: 32px; padding: 20px 20px 28px;
}
.gantt-inner { min-width: 860px; }

/* ── Timeline Header ── */
.tl-head { display: flex; margin-bottom: 6px; }
.tl-lbl  { width: 230px; flex-shrink: 0; padding-right: 12px; }
.tl-track { flex: 1; position: relative; height: 38px; }
.m-label { position: absolute; top: 0; font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; }
.w-line  { position: absolute; top: 18px; bottom: 0; width: 1px; background: var(--border); }
.w-label { position: absolute; top: 20px; font-size: 9px; color: var(--muted); transform: translateX(-50%); }

/* ── Category Header ── */
.cat-sep {
  display: flex; align-items: center; gap: 8px; margin: 18px 0 4px;
  padding: 5px 8px 5px 4px; border-radius: 6px;
}
.cat-sep .cat-icon-wrap {
  width: 22px; height: 22px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.cat-sep .cat-name { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; }
.cat-sep .cat-count { font-size: 10px; color: var(--muted); padding: 1px 6px; background: var(--surface2); border-radius: 8px; }

/* ── Project Gantt Row ── */
.pg-row {
  display: flex; align-items: stretch;
  border-top: 1px solid rgba(37,48,71,0.6);
  transition: background 0.12s;
}
.pg-row:hover { background: rgba(255,255,255,0.02); }
.pg-lbl {
  width: 230px; flex-shrink: 0; padding: 8px 12px 8px 8px;
  display: flex; flex-direction: column; justify-content: center; gap: 4px;
  border-left: 3px solid transparent;
}
.pg-name { font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 190px; }
.pg-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.pg-badge { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 8px; }
.pg-assignee { font-size: 10px; color: var(--muted); }

.pg-track { flex: 1; position: relative; height: 68px; }
.pg-track-bg { position: absolute; inset: 0; }
.wk-line  { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(37,48,71,0.5); }
.today-vline { position: absolute; top: 0; bottom: 0; width: 2px; z-index: 10; pointer-events: none; background: linear-gradient(to bottom, rgba(239,68,68,0.9), rgba(239,68,68,0.3)); }
.today-vdot  { position: absolute; top: -1px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; background: #ef4444; border-radius: 50%; border: 2px solid var(--surface); }

/* ── Gantt Bar ── */
.g-bar {
  position: absolute; top: 50%; transform: translateY(-50%);
  height: 30px; border-radius: 6px; overflow: hidden;
  display: flex; align-items: center; min-width: 4px;
}
.g-bar-prog { position: absolute; left: 0; top: 0; bottom: 0; opacity: 0.25; }
.g-bar-content {
  position: relative; z-index: 1; display: flex; align-items: center; gap: 6px;
  padding: 0 8px; width: 100%; overflow: hidden;
}
.g-bar-text { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.95); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.g-bar-tasks { font-size: 9px; color: rgba(255,255,255,0.65); white-space: nowrap; flex-shrink: 0; }
.g-bar.no-dl { opacity: 0.5; border-right: 2px dashed rgba(255,255,255,0.35); border-radius: 6px 0 0 6px; }

/* Deadline label */
.g-dl-label {
  position: absolute; top: 50%; transform: translateY(-50%);
  font-size: 10px; font-weight: 700; white-space: nowrap;
  padding: 2px 5px; border-radius: 4px;
  background: rgba(8,12,20,0.85); border: 1px solid;
  z-index: 5;
}
/* Today label */
.today-lbl-bottom {
  position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: #ef4444; font-weight: 700; white-space: nowrap;
}

/* ── Upcoming Deadlines ── */
.dl-section { margin-bottom: 32px; }
.dl-week-group { margin-bottom: 20px; }
.dl-week-head {
  font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.dl-week-head .wk-badge { padding: 2px 8px; border-radius: 6px; font-size: 10px; }
.dl-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
.dl-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 16px; border-left: 4px solid; display: flex; flex-direction: column; gap: 6px;
}
.dl-card-top { display: flex; align-items: center; justify-content: space-between; }
.dl-days-num { font-size: 28px; font-weight: 800; line-height: 1; }
.dl-days-lbl { font-size: 10px; color: var(--muted); margin-top: 2px; }
.dl-name { font-size: 13px; font-weight: 600; }
.dl-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.dl-meta span { font-size: 11px; color: var(--muted); }
.dl-status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dl-blocker { font-size: 11px; color: #fb923c; background: rgba(249,115,22,0.1); padding: 2px 8px; border-radius: 6px; border: 1px solid rgba(249,115,22,0.25); }
.dl-date { font-size: 11px; color: var(--muted); }

/* ── Loading / Empty ── */
#loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 14px; }
.empty-state { text-align: center; padding: 40px; color: var(--muted); font-size: 13px; }

/* ── Deadline end-of-bar marker ── */
.g-dl-end {
  position: absolute; top: 0; bottom: 0; width: 3px; border-radius: 0 3px 3px 0; z-index: 6;
}
.g-dl-flag {
  position: absolute; z-index: 7;
  transform: translateX(-50%);
  text-align: center; line-height: 1.3;
  background: rgba(8,14,28,0.88);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 5px;
  padding: 2px 6px;
  backdrop-filter: blur(2px);
  box-shadow: 0 1px 6px rgba(0,0,0,0.5);
}
.g-dl-flag .flag-date { font-size: 11px; font-weight: 800; white-space: nowrap; }
.g-dl-flag .flag-days { font-size: 10px; font-weight: 600; white-space: nowrap; }

/* ── Legend ── */
.legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--border); }
.legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.legend-bar  { width: 24px; height: 9px; border-radius: 3px; }
.legend-today { width: 3px; height: 14px; background: #ef4444; border-radius: 2px; }
</style>

<script>
// ── Constants ──────────────────────────────────────────────────────
const STORAGE_KEY = 'aicare-projects-v3';
const API_URL = '/api/data';

const CATEGORIES = [
  { id: 'brand',      name: '全体ブランド',  icon: '🎯', color: '#8b5cf6' },
  { id: 'site',       name: '本体サイト',     icon: '🌐', color: '#3b82f6' },
  { id: '365',        name: 'アイケア365',    icon: '📅', color: '#14b8a6' },
  { id: 'glasses',    name: 'アイケアグラス', icon: '👓', color: '#f59e0b' },
  { id: 'events',     name: 'イベント',       icon: '🎪', color: '#f97316' },
  { id: 'app',        name: 'アプリ',         icon: '📱', color: '#06b6d4' },
  { id: 'management', name: '管理・体制',     icon: '📋', color: '#10b981' },
];

const STATUS_COLOR = {
  '進行中': '#3b82f6',
  '要確認': '#f59e0b',
  '未着手': '#475569',
  '完了':   '#10b981',
  '保留':   '#6b7280',
};

const STATUS_BG = {
  '進行中': 'rgba(59,130,246,0.15)',
  '要確認': 'rgba(245,158,11,0.15)',
  '未着手': 'rgba(71,85,105,0.15)',
  '完了':   'rgba(16,185,129,0.15)',
  '保留':   'rgba(107,114,128,0.15)',
};

// ── Date Utils ────────────────────────────────────────────────────
function today0() {
  const t = new Date();
  t.setHours(0,0,0,0);
  return t;
}

function parseDate(s) {
  if (!s) return null;
  const d = new Date(s);
  return isNaN(d) ? null : d;
}

function fmtMD(d) {
  if (!d) return '';
  return (d.getMonth()+1) + '/' + d.getDate();
}

function fmtYMD(d) {
  if (!d) return '';
  return d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
}

function daysFromNow(d) {
  if (!d) return null;
  const t = today0();
  return Math.round((d - t) / 86400000);
}

// ── Data ──────────────────────────────────────────────────────────
let APP = { projects: [], categories: [], updatedAt: 0 };

function getCatById(id) {
  return CATEGORIES.find(c => c.id === id) || { id, name: id, icon: '📁', color: '#475569' };
}

async function loadData() {
  // 1. localStorage (fast)
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && Array.isArray(d.projects)) {
        APP = d;
        render();
      }
    }
  } catch(e) {}

  // 2. API (authoritative)
  try {
    const res = await fetch(API_URL);
    if (res.ok) {
      const d = await res.json();
      if (d && Array.isArray(d.projects)) {
        const localTs = APP.updatedAt || 0;
        const cloudTs = d.updatedAt || 0;
        if (cloudTs >= localTs) {
          APP = d;
          try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
        }
        render();
      }
    }
  } catch(e) {
    if (APP.projects.length === 0) {
      document.getElementById('loading').textContent = 'データを取得できませんでした。プロジェクト管理ページを先に開いてください。';
    }
  }
}

async function forceRefresh() {
  document.getElementById('last-updated').textContent = '更新中…';
  try {
    const res = await fetch(API_URL);
    if (res.ok) {
      const d = await res.json();
      if (d && Array.isArray(d.projects)) {
        APP = d;
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(d)); } catch(e) {}
        render();
      }
    }
  } catch(e) {}
}

// ── Timeline Range ─────────────────────────────────────────────────
function calcRange(projects) {
  const t = today0();
  // Start: first of current month or Apr 1 2026 whichever is earlier
  let start = new Date(t.getFullYear(), t.getMonth(), 1);
  const apr1 = new Date('2026-04-01');
  if (apr1 < start) start = apr1;

  // End: max deadline + 14 days, min 90 days from start
  let end = new Date(start.getTime() + 90 * 86400000);
  projects.forEach(p => {
    const d = parseDate(p.deadline);
    if (d) {
      const plusBuf = new Date(d.getTime() + 14 * 86400000);
      if (plusBuf > end) end = plusBuf;
    }
  });
  return { start, end, totalDays: (end - start) / 86400000 };
}

function pct(date, range) {
  const raw = (date - range.start) / (range.end - range.start) * 100;
  return Math.max(0, Math.min(100, raw));
}

// ── Week markers ──────────────────────────────────────────────────
function getWeekStarts(range) {
  const weeks = [];
  // Align to nearest Monday before/on range.start
  let d = new Date(range.start);
  // go back to Monday
  const dow = d.getDay(); // 0=Sun
  d.setDate(d.getDate() - ((dow + 6) % 7));
  // Advance to first Monday >= start
  while (d < range.start) d = new Date(d.getTime() + 7*86400000);
  while (d <= range.end) {
    weeks.push(new Date(d));
    d = new Date(d.getTime() + 7*86400000);
  }
  return weeks;
}

function getMonthStarts(range) {
  const months = [];
  let d = new Date(range.start.getFullYear(), range.start.getMonth(), 1);
  while (d <= range.end) {
    if (d >= range.start) months.push(new Date(d));
    d = new Date(d.getFullYear(), d.getMonth() + 1, 1);
  }
  return months;
}

// ── Render ────────────────────────────────────────────────────────
function render() {
  const projects = APP.projects || [];
  if (projects.length === 0) {
    document.getElementById('loading').textContent = 'プロジェクトデータなし';
    return;
  }

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  // Last updated
  const ts = APP.updatedAt;
  if (ts) {
    const d = new Date(ts);
    document.getElementById('last-updated').textContent =
      'データ更新: ' + fmtYMD(d) + ' ' + d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  } else {
    document.getElementById('last-updated').textContent = 'ローカルデータ';
  }

  renderStats(projects);
  renderGantt(projects);
  renderDeadlines(projects);
}

// ── Stats ──────────────────────────────────────────────────────────
function renderStats(projects) {
  const counts = { '進行中':0,'要確認':0,'未着手':0,'完了':0,'保留':0 };
  projects.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });

  // Nearest upcoming deadline
  const t = today0();
  const upcoming = projects
    .filter(p => p.deadline && p.status !== '完了' && p.status !== '保留')
    .map(p => ({ p, d: parseDate(p.deadline) }))
    .filter(x => x.d && x.d >= t)
    .sort((a,b) => a.d - b.d);

  const statuses = ['進行中','要確認','未着手','完了','保留'];
  let html = statuses.map(s => `
    <div class="stat-chip">
      <div>
        <div class="s-num" style="color:${STATUS_COLOR[s]}">${counts[s]}</div>
        <div class="s-lbl">${s}</div>
      </div>
      <div class="s-dot" style="background:${STATUS_COLOR[s]}"></div>
    </div>`).join('');

  if (upcoming.length > 0) {
    const next = upcoming[0];
    const days = daysFromNow(next.d);
    const c = days <= 3 ? '#ef4444' : days <= 7 ? '#f97316' : '#f59e0b';
    html += `
    <div class="countdown-chip">
      <div class="c-days" style="color:${c}">${days}</div>
      <div class="c-lbl">DAYS TO DEADLINE</div>
      <div class="c-date">📌 ${next.p.name}</div>
      <div class="c-date" style="color:${c};font-weight:600;">${fmtYMD(next.d)}</div>
    </div>`;
  }

  document.getElementById('stats-row').innerHTML = html;
}

// ── Gantt ──────────────────────────────────────────────────────────
function renderGantt(projects) {
  const range = calcRange(projects);
  const weeks = getWeekStarts(range);
  const months = getMonthStarts(range);
  const t = today0();
  const todayP = pct(t, range);

  // Only show active + non-complete (keep 完了 but dim them)
  // Group by category, skip categories with 0 projects
  const catOrder = CATEGORIES.map(c => c.id);

  // Sort projects: 進行中 > 要確認 > 未着手 > 保留 > 完了, then by deadline
  const statOrd = {'進行中':0,'要確認':1,'未着手':2,'保留':3,'完了':4};
  const sorted = [...projects].sort((a,b) => {
    const sA = statOrd[a.status] ?? 5, sB = statOrd[b.status] ?? 5;
    if (sA !== sB) return sA - sB;
    const dA = parseDate(a.deadline), dB = parseDate(b.deadline);
    if (dA && dB) return dA - dB;
    if (dA) return -1; if (dB) return 1;
    return 0;
  });

  // Group by category
  const grouped = {};
  catOrder.forEach(cid => { grouped[cid] = []; });
  sorted.forEach(p => {
    const cid = p.categoryId || 'brand';
    if (!grouped[cid]) grouped[cid] = [];
    grouped[cid].push(p);
  });

  let html = '';

  // ── Timeline header ──
  html += '<div class="tl-head">';
  html += '  <div class="tl-lbl"></div>';
  html += '  <div class="tl-track">';
  months.forEach(m => {
    const left = pct(m, range);
    html += `<div class="m-label" style="left:${left}%">${(m.getMonth()+1)}月</div>`;
  });
  weeks.forEach(w => {
    const left = pct(w, range);
    if (left > 0 && left < 100) {
      html += `<div class="w-line" style="left:${left}%"></div>`;
      html += `<div class="w-label" style="left:${left}%">${fmtMD(w)}</div>`;
    }
  });
  // Today marker in header
  if (todayP >= 0 && todayP <= 100) {
    html += `<div style="position:absolute;top:0;left:${todayP}%;width:2px;height:100%;background:rgba(239,68,68,0.5);z-index:5;"></div>`;
  }
  html += '  </div>';
  html += '</div>';

  // ── Rows ──
  catOrder.forEach(cid => {
    const catProjs = grouped[cid];
    if (!catProjs || catProjs.length === 0) return;
    const cat = getCatById(cid);

    // Category separator
    html += `<div class="cat-sep" style="background:${cat.color}10;">
      <div class="cat-icon-wrap" style="background:${cat.color}20;">${cat.icon}</div>
      <div class="cat-name" style="color:${cat.color}">${cat.name}</div>
      <div class="cat-count">${catProjs.length}件</div>
    </div>`;

    catProjs.forEach(p => {
      const sc = STATUS_COLOR[p.status] || '#475569';
      const sbg = STATUS_BG[p.status] || 'rgba(71,85,105,0.15)';
      const dl = parseDate(p.deadline);
      const tasks = p.tasks || [];
      const totalT = tasks.length;
      const doneT  = tasks.filter(t => t.status === '完了').length;
      const progPct = totalT > 0 ? (doneT / totalT * 100) : 0;
      const isDim = p.status === '完了' || p.status === '保留';

      // Bar: from timeline start to deadline (or to timeline end if no deadline)
      const barStart = pct(range.start, range);
      const barEnd   = dl ? pct(dl, range) : 98;
      const barWidth = Math.max(0.5, barEnd - barStart);

      const dlDays = daysFromNow(dl);
      const dlColor = dlDays === null ? '#475569'
                    : dlDays < 0 ? '#ef4444'
                    : dlDays <= 3 ? '#f97316'
                    : dlDays <= 7 ? '#f59e0b'
                    : '#94a3b8';

      // Label to show inside bar
      let barLabel = p.name;
      if (p.blockedBy || p.status === '要確認') barLabel = '🚫 ' + p.name;
      else if (p.waitingFor) barLabel = '⏳ ' + p.name;

      const taskBadge = totalT > 0 ? `${doneT}/${totalT}` : '';

      // Deadline display in left label
      const dlLabelHtml = dl
        ? `<div style="display:flex;align-items:center;gap:4px;margin-top:2px;">
             <span style="font-size:11px;font-weight:800;color:${dlColor};">📅 ${fmtMD(dl)}</span>
             <span style="font-size:10px;font-weight:600;color:${dlColor};padding:1px 5px;border-radius:5px;background:${dlColor}18;border:1px solid ${dlColor}30;">
               ${dlDays < 0 ? Math.abs(dlDays)+'日超過' : dlDays === 0 ? '今日期限' : 'あと'+dlDays+'日'}
             </span>
           </div>`
        : `<div style="font-size:10px;color:#3d4f66;margin-top:2px;">締切未設定</div>`;

      // End-of-bar flag (visible below bar)
      const flagLeft = dl ? Math.max(4, Math.min(barEnd, 94)) : null;
      const flagHtml = dl
        ? `<div class="g-dl-end" style="left:${barEnd}%;background:${dlColor};"></div>
           <div class="g-dl-flag" style="left:${flagLeft}%;bottom:3px;top:auto;">
             <div class="flag-date" style="color:${dlColor};">${fmtMD(dl)}</div>
             <div class="flag-days" style="color:${dlColor};">${dlDays < 0 ? Math.abs(dlDays)+'日超過' : dlDays === 0 ? '今日' : 'あと'+dlDays+'日'}</div>
           </div>`
        : ``;

      html += `<div class="pg-row" style="opacity:${isDim ? 0.45 : 1}">
        <div class="pg-lbl" style="border-left-color:${sc}">
          <div class="pg-name">
            <span style="width:7px;height:7px;border-radius:50%;background:${sc};flex-shrink:0;display:inline-block;"></span>
            <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</span>
          </div>
          <div class="pg-meta">
            <span class="pg-badge" style="background:${sbg};color:${sc}">${p.status}</span>
            ${p.assignee ? `<span class="pg-assignee">👤 ${p.assignee}</span>` : ''}
            ${p.priority === '最優先' || p.priority === '高' ? `<span style="font-size:9px;color:#f87171;font-weight:700;">🔥${p.priority}</span>` : ''}
          </div>
          ${dlLabelHtml}
        </div>
        <div class="pg-track">
          ${weeks.map(w => {
            const lp = pct(w, range);
            return (lp > 0 && lp < 100) ? `<div class="wk-line" style="left:${lp}%"></div>` : '';
          }).join('')}
          <div class="today-vline" style="left:${todayP}%">
            <div class="today-vdot"></div>
          </div>
          <div class="g-bar${dl ? '' : ' no-dl'}" style="left:${barStart}%;width:${barWidth}%;background:${cat.color}cc;top:38%;transform:translateY(-50%);">
            <div class="g-bar-prog" style="width:${progPct}%;background:rgba(255,255,255,0.4);"></div>
            <div class="g-bar-content">
              <span class="g-bar-text">${barLabel}</span>
              ${taskBadge ? `<span class="g-bar-tasks">${taskBadge}</span>` : ''}
            </div>
          </div>
          ${flagHtml}
        </div>
      </div>`;
    });
  });

  // ── Legend ──
  const legendHtml = Object.entries(STATUS_COLOR).map(([s,c]) =>
    `<div class="legend-item"><div class="legend-bar" style="background:${c}aa"></div>${s}</div>`
  ).join('') +
  `<div class="legend-item"><div class="legend-today"></div>今日</div>
   <div class="legend-item"><div style="width:24px;height:9px;border-radius:3px;background:rgba(255,255,255,0.2);position:relative;overflow:hidden;"><div style="position:absolute;left:0;top:0;bottom:0;width:60%;background:rgba(255,255,255,0.4);"></div></div>タスク進捗</div>
   <div class="legend-item"><span style="font-size:12px">🚫</span>詰まりあり</div>
   <div class="legend-item"><span style="font-size:12px">⏳</span>誰か待ち</div>`;

  document.getElementById('gantt-inner').innerHTML = html;
  document.getElementById('gantt-legend').innerHTML = legendHtml;
}

// ── Upcoming Deadlines ─────────────────────────────────────────────
function renderDeadlines(projects) {
  const t = today0();
  const cutoff = new Date(t.getTime() + 45 * 86400000);

  const upcoming = projects
    .filter(p => {
      const d = parseDate(p.deadline);
      return d && d <= cutoff;
    })
    .map(p => ({ p, d: parseDate(p.deadline), days: daysFromNow(parseDate(p.deadline)) }))
    .sort((a,b) => a.d - b.d);

  if (upcoming.length === 0) {
    document.getElementById('dl-section').innerHTML =
      '<div class="empty-state">45日以内の締切なし</div>';
    return;
  }

  // Group by week
  const groups = [
    { label: '今週',       days: 7,   color: '#ef4444', items: [] },
    { label: '来週',       days: 14,  color: '#f97316', items: [] },
    { label: '2週間後',    days: 21,  color: '#f59e0b', items: [] },
    { label: '3週間後',    days: 28,  color: '#a78bfa', items: [] },
    { label: '1ヶ月以降',  days: 999, color: '#7c8fa8', items: [] },
  ];
  const overdue = { label: '超過', days: -1, color: '#ef4444', items: [] };

  upcoming.forEach(x => {
    if (x.days < 0) { overdue.items.push(x); return; }
    for (const g of groups) {
      if (x.days <= g.days) { g.items.push(x); return; }
    }
  });

  let html = '';

  // Overdue first
  if (overdue.items.length > 0) {
    html += `<div class="dl-week-group">
      <div class="dl-week-head">
        <span class="wk-badge" style="background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.3);">⚠ 期限超過</span>
      </div>
      <div class="dl-grid">
        ${overdue.items.map(x => dlCard(x, '#ef4444')).join('')}
      </div>
    </div>`;
  }

  groups.forEach(g => {
    if (g.items.length === 0) return;
    html += `<div class="dl-week-group">
      <div class="dl-week-head">
        <span class="wk-badge" style="background:${g.color}18;color:${g.color};border:1px solid ${g.color}30;">${g.label}</span>
      </div>
      <div class="dl-grid">
        ${g.items.map(x => dlCard(x, g.color)).join('')}
      </div>
    </div>`;
  });

  document.getElementById('dl-section').innerHTML = html;
}

function dlCard(x, groupColor) {
  const { p, days } = x;
  const sc = STATUS_COLOR[p.status] || '#475569';
  const cat = getCatById(p.categoryId);
  const tasks = p.tasks || [];
  const totalT = tasks.length;
  const doneT  = tasks.filter(t => t.status === '完了').length;
  const dlColor = days < 0 ? '#ef4444' : days <= 3 ? '#f97316' : days <= 7 ? '#f59e0b' : groupColor;

  const assigneeHtml = p.assignee
    ? `<span>👤 ${p.assignee}</span>`
    : '';
  const taskHtml = totalT > 0
    ? `<span>📋 ${doneT}/${totalT} タスク</span>`
    : '';
  const blockerHtml = (p.blockedBy || p.waitingFor)
    ? `<div class="dl-blocker">${p.blockedBy ? '🚫 ' + p.blockedBy : '⏳ ' + p.waitingFor + '待ち'}</div>`
    : '';

  return `<div class="dl-card" style="border-left-color:${cat.color}">
    <div class="dl-card-top">
      <div>
        <div class="dl-days-num" style="color:${dlColor}">${days < 0 ? Math.abs(days) : days}</div>
        <div class="dl-days-lbl">${days < 0 ? '日 超過' : days === 0 ? '今日期限' : '日後'}</div>
      </div>
      <span class="pg-badge" style="background:${STATUS_BG[p.status]||'rgba(71,85,105,0.15)'};color:${sc};">${p.status}</span>
    </div>
    <div class="dl-name">${cat.icon} ${p.name}</div>
    <div class="dl-meta">
      ${assigneeHtml}
      ${taskHtml}
      <span style="color:${dlColor};font-weight:600;">📅 ${fmtYMD(x.d)}</span>
    </div>
    ${blockerHtml}
    ${p.nextAction ? `<div style="font-size:11px;color:#7c8fa8;margin-top:2px;">▶ ${p.nextAction}</div>` : ''}
  </div>`;
}

// ── Init ──────────────────────────────────────────────────────────
loadData();
</script>
