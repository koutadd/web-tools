<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>アイケアラボ ブランドマネージャー</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4ed;
      --sidebar-bg: #1a1a18;
      --sidebar-text: #c8c6be;
      --sidebar-hover: #2a2a27;
      --sidebar-active: #30302e;
      --border: #e8e6dc;
      --text: #141413;
      --text-sub: #5e5d59;
      --text-mute: #87867f;
      --accent: #c96442;
      --accent-light: #f0ede5;
      --white: #ffffff;
      --user-bubble: #141413;
      --ai-bubble: #ffffff;
      --input-bg: #ffffff;
      --shadow: 0 1px 8px rgba(0,0,0,0.08);
    }
    html, body { height: 100%; overflow: hidden; font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }

    /* ── LAYOUT ── */
    .app { display: flex; height: 100vh; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 260px; min-width: 260px;
      background: var(--sidebar-bg);
      display: flex; flex-direction: column;
      overflow: hidden;
      border-right: 1px solid #2a2a27;
    }
    .sidebar-header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid #2a2a27;
      flex-shrink: 0;
    }
    .sidebar-logo {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #5e5d59;
      margin-bottom: 12px;
    }
    .new-chat-btn {
      width: 100%;
      padding: 9px 14px;
      background: transparent;
      border: 1px solid #3a3a37;
      border-radius: 6px;
      color: var(--sidebar-text);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s;
    }
    .new-chat-btn:hover { background: var(--sidebar-hover); }
    .new-chat-btn svg { opacity: 0.6; flex-shrink: 0; }

    .sidebar-section-label {
      padding: 14px 16px 6px;
      font-size: 11px;
      letter-spacing: 0.1em;
      color: #3a3a37;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px 16px;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-track { background: transparent; }
    .conv-list::-webkit-scrollbar-thumb { background: #3a3a37; border-radius: 4px; }
    .conv-item {
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      color: var(--sidebar-text);
      font-size: 13px;
      line-height: 1.4;
      transition: background 0.12s;
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .conv-item:hover { background: var(--sidebar-hover); }
    .conv-item.active { background: var(--sidebar-active); color: #fff; }
    .conv-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv-item-del {
      opacity: 0;
      background: none;
      border: none;
      color: #5e5d59;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: opacity 0.15s, color 0.15s;
    }
    .conv-item:hover .conv-item-del { opacity: 1; }
    .conv-item-del:hover { color: #e57373; }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid #2a2a27;
      flex-shrink: 0;
    }
    .api-key-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .api-key-label { font-size: 11px; color: #5e5d59; white-space: nowrap; }
    .api-key-input {
      flex: 1;
      background: #0e0e0c;
      border: 1px solid #2a2a27;
      border-radius: 4px;
      color: #5e5d59;
      font-size: 11px;
      padding: 5px 8px;
      font-family: monospace;
    }
    .api-key-input:focus { outline: none; border-color: #3a3a37; color: #c8c6be; }

    /* ── MAIN ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── TOPBAR ── */
    .topbar {
      height: 52px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 24px;
      gap: 12px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }
    .topbar-model {
      font-size: 11px;
      color: var(--text-mute);
      background: var(--border);
      padding: 3px 8px;
      border-radius: 100px;
    }

    /* ── MESSAGES ── */
    .messages-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 32px 0 16px;
    }
    .messages-wrap::-webkit-scrollbar { width: 6px; }
    .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .messages-inner {
      max-width: 720px;
      margin: 0 auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }
    .welcome-icon {
      width: 56px; height: 56px;
      background: var(--text);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .welcome-title {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome-sub {
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 28px;
    }
    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 500px;
    }
    .starter-btn {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-sub);
      cursor: pointer;
      font-family: inherit;
      text-align: left;
      line-height: 1.5;
      transition: border-color 0.15s, color 0.15s;
    }
    .starter-btn:hover { border-color: var(--text); color: var(--text); }

    /* Message rows */
    .msg { display: flex; gap: 14px; align-items: flex-start; }
    .msg.user { flex-direction: row-reverse; }
    .msg-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; font-size: 13px; font-weight: 600;
    }
    .msg.user .msg-avatar { background: var(--user-bubble); color: #fff; }
    .msg.ai .msg-avatar { background: var(--accent); color: #fff; }
    .msg-bubble {
      max-width: 80%;
      padding: 13px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.75;
      white-space: pre-wrap;
    }
    .msg.user .msg-bubble {
      background: var(--user-bubble);
      color: #fff;
      border-radius: 12px 4px 12px 12px;
    }
    .msg.ai .msg-bubble {
      background: var(--ai-bubble);
      color: var(--text);
      border-radius: 4px 12px 12px 12px;
      box-shadow: var(--shadow);
    }
    .msg.ai .msg-bubble h2, .msg.ai .msg-bubble h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      margin-top: 14px;
    }
    .msg.ai .msg-bubble h2:first-child, .msg.ai .msg-bubble h3:first-child { margin-top: 0; }
    .msg.ai .msg-bubble p { margin-bottom: 10px; }
    .msg.ai .msg-bubble p:last-child { margin-bottom: 0; }
    .msg.ai .msg-bubble ul, .msg.ai .msg-bubble ol { padding-left: 20px; margin-bottom: 10px; }
    .msg.ai .msg-bubble li { margin-bottom: 4px; }
    .msg.ai .msg-bubble strong { font-weight: 600; }
    .msg.ai .msg-bubble code {
      background: var(--accent-light);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: monospace;
    }
    .msg.ai .msg-bubble hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 12px 0;
    }

    /* typing indicator */
    .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
    .typing-dot {
      width: 7px; height: 7px;
      background: var(--text-mute);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

    /* ── INPUT AREA ── */
    .input-area {
      padding: 16px 24px 20px;
      background: var(--bg);
      flex-shrink: 0;
    }
    .input-wrap {
      max-width: 720px;
      margin: 0 auto;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: flex-end;
      gap: 0;
      padding: 10px 12px 10px 16px;
    }
    .input-wrap:focus-within { border-color: #b0aea5; }
    #chat-input {
      flex: 1;
      border: none;
      outline: none;
      resize: none;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      background: transparent;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      padding: 2px 0;
    }
    #chat-input::placeholder { color: var(--text-mute); }
    .send-btn {
      width: 34px; height: 34px;
      background: var(--text);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .send-btn:hover { opacity: 0.75; }
    .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .input-hint { max-width: 720px; margin: 8px auto 0; font-size: 11px; color: var(--text-mute); text-align: center; }

    /* attach button */
    .attach-btn {
      width: 32px; height: 32px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; flex-shrink: 0;
      color: var(--text-mute); transition: color 0.15s, background 0.15s;
    }
    .attach-btn:hover { color: var(--text); background: var(--border); }

    /* input bottom bar: attach + previews + send */
    .input-bottom {
      display: flex; align-items: center; gap: 6px;
      padding: 8px 10px 10px 10px;
    }
    .input-bottom-left { display: flex; align-items: center; gap: 6px; flex: 1; flex-wrap: wrap; }

    /* image previews inside input */
    .img-preview-item {
      position: relative; width: 52px; height: 52px; flex-shrink: 0;
    }
    .img-preview-item img {
      width: 52px; height: 52px;
      object-fit: cover; border-radius: 8px;
      border: 1px solid var(--border);
      display: block;
    }
    .img-preview-del {
      position: absolute; top: -5px; right: -5px;
      width: 17px; height: 17px; border-radius: 50%;
      background: #444; color: #fff; border: none;
      font-size: 10px; cursor: pointer; line-height: 1;
      display: flex; align-items: center; justify-content: center;
    }

    /* images in bubbles */
    .msg-images { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
    .msg-images img {
      max-width: 220px; max-height: 180px;
      border-radius: 8px; object-fit: cover;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .msg.ai .msg-images img { border-color: var(--border); }

    /* ── DOCS SECTION ── */
    .sidebar-docs {
      border-top: 1px solid #2a2a27;
      padding: 12px 8px 8px;
      flex-shrink: 0;
    }
    .sidebar-docs-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 8px 8px;
    }
    .sidebar-docs-label {
      font-size: 11px; letter-spacing: 0.1em; color: #3a3a37; text-transform: uppercase;
    }
    .docs-add-btn {
      background: none; border: 1px solid #3a3a37; border-radius: 4px;
      color: #5e5d59; font-size: 11px; padding: 3px 8px; cursor: pointer;
      font-family: inherit; transition: color 0.15s, border-color 0.15s;
      display: flex; align-items: center; gap: 4px;
    }
    .docs-add-btn:hover { color: var(--sidebar-text); border-color: #5e5d59; }
    .doc-item {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 10px; border-radius: 6px; cursor: pointer;
      color: var(--sidebar-text); font-size: 12px;
      transition: background 0.12s;
    }
    .doc-item:hover { background: var(--sidebar-hover); }
    .doc-item-icon { color: #5e5d59; flex-shrink: 0; }
    .doc-item-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .doc-item-del {
      opacity: 0; background: none; border: none;
      color: #5e5d59; cursor: pointer; padding: 2px 4px;
      border-radius: 3px; flex-shrink: 0; transition: opacity 0.15s, color 0.15s;
    }
    .doc-item:hover .doc-item-del { opacity: 1; }
    .doc-item-del:hover { color: #e57373; }

    /* ── DOC MODAL ── */
    .doc-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 9999; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .doc-modal {
      background: #fff; border-radius: 14px;
      width: 100%; max-width: 560px;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
      display: flex; flex-direction: column;
      max-height: 80vh;
    }
    .doc-modal-header {
      padding: 20px 20px 14px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .doc-modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
    .doc-modal-close {
      background: none; border: none; cursor: pointer;
      color: var(--text-mute); font-size: 18px; line-height: 1;
      padding: 2px 6px; border-radius: 4px;
    }
    .doc-modal-close:hover { background: var(--border); }
    .doc-modal-body { padding: 18px 20px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    .doc-field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--text-sub); margin-bottom: 6px;
    }
    .doc-field input, .doc-field textarea {
      width: 100%; font-family: inherit; font-size: 13px;
      color: var(--text); background: var(--bg);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; outline: none; resize: vertical;
      transition: border-color 0.15s;
    }
    .doc-field input:focus, .doc-field textarea:focus { border-color: #b0aea5; }
    .doc-field textarea { min-height: 180px; line-height: 1.6; }
    .doc-field-hint { font-size: 11px; color: var(--text-mute); margin-top: 5px; }
    .doc-modal-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
      flex-shrink: 0;
    }
    .doc-btn-cancel {
      padding: 8px 18px; border: 1px solid var(--border); border-radius: 8px;
      background: #fff; color: var(--text-sub); font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .doc-btn-cancel:hover { background: var(--bg); }
    .doc-btn-save {
      padding: 8px 22px; border: none; border-radius: 8px;
      background: var(--text); color: #fff; font-size: 13px; font-weight: 600;
      cursor: pointer; font-family: inherit;
    }
    .doc-btn-save:hover { opacity: 0.8; }
    .docs-empty { font-size: 12px; color: #3a3a37; padding: 4px 10px 8px; }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .sidebar { width: 0; min-width: 0; display: none; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">Aicare Lab</div>
      <button class="new-chat-btn" onclick="newChat()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        新しい会話
      </button>
    </div>
    <div class="sidebar-section-label">会話履歴</div>
    <div class="conv-list" id="conv-list"></div>
    <!-- 資料セクション -->
    <div class="sidebar-docs">
      <div class="sidebar-docs-header">
        <span class="sidebar-docs-label">資料</span>
        <button class="docs-add-btn" onclick="openDocModal(null)">
          <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M5 1v8M1 5h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          追加
        </button>
      </div>
      <div id="doc-list"></div>
    </div>
    <div class="sidebar-footer">
      <div class="api-key-row">
        <span class="api-key-label">API KEY</span>
        <input class="api-key-input" id="api-key-input" type="password" placeholder="AIza..." autocomplete="off" oninput="saveApiKey()" />
      </div>
    </div>
  </aside>

  <!-- 資料モーダル -->
  <div id="doc-overlay" class="doc-overlay" style="display:none;" onclick="if(event.target===this)closeDocModal()">
    <div class="doc-modal">
      <div class="doc-modal-header">
        <div class="doc-modal-title" id="doc-modal-title">資料を追加</div>
        <button class="doc-modal-close" onclick="closeDocModal()">✕</button>
      </div>
      <div class="doc-modal-body">
        <div class="doc-field">
          <label>資料名 *</label>
          <input type="text" id="doc-name-input" placeholder="例：競合分析レポート、新商品説明など" />
        </div>
        <div class="doc-field">
          <label>内容（テキストを貼り付け or 入力）</label>
          <textarea id="doc-content-input" placeholder="ここに資料のテキスト内容を貼り付けてください。PDFや資料をコピーしてそのままペーストでOKです。"></textarea>
          <div class="doc-field-hint">ここに追加した内容はAIが会話中に参照します。</div>
        </div>
      </div>
      <div class="doc-modal-footer">
        <button class="doc-btn-cancel" onclick="closeDocModal()">キャンセル</button>
        <button class="doc-btn-save" onclick="saveDoc()">保存</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <div class="topbar-title">アイケアラボ ブランドマネージャー</div>
      <div class="topbar-model">gemini-2.0-flash (無料)</div>
    </div>

    <div class="messages-wrap" id="messages-wrap">
      <!-- Welcome or messages -->
      <div id="welcome-screen" class="welcome">
        <div class="welcome-icon">
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
            <circle cx="13" cy="13" r="5" fill="white"/>
            <path d="M13 3v3M13 20v3M3 13h3M20 13h3M5.8 5.8l2.1 2.1M18.1 18.1l2.1 2.1M5.8 20.2l2.1-2.1M18.1 7.9l2.1-2.1" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="welcome-title">アイケアラボ ブランドマネージャー</div>
        <div class="welcome-sub">
          ブランドの方向性・コピー・ターゲット・トーンなど、<br>
          何でも聞いてください。データはすべて把握しています。
        </div>
        <div class="starter-grid">
          <button class="starter-btn" onclick="sendStarter(this)">アイケアラボのブランドコンセプトを教えて</button>
          <button class="starter-btn" onclick="sendStarter(this)">ターゲット顧客像を詳しく説明して</button>
          <button class="starter-btn" onclick="sendStarter(this)">ブランドのトーン＆マナーを整理して</button>
          <button class="starter-btn" onclick="sendStarter(this)">競合との差別化ポイントは？</button>
        </div>
      </div>
      <div id="messages-inner" class="messages-inner" style="display:none;"></div>
    </div>

    <div class="input-area">
      <div class="input-wrap" style="flex-direction:column; padding:0; gap:0;">
        <!-- textarea -->
        <textarea id="chat-input" rows="1" placeholder="ブランドについて何でも聞いてください…" onkeydown="handleKey(event)" oninput="autoResize(this)" style="flex:1; border:none; outline:none; resize:none; font-family:inherit; font-size:14px; color:var(--text); background:transparent; line-height:1.6; max-height:200px; overflow-y:auto; padding:14px 14px 4px 16px; width:100%;"></textarea>
        <!-- bottom bar -->
        <div class="input-bottom">
          <div class="input-bottom-left">
            <button class="attach-btn" onclick="document.getElementById('file-input').click()" title="画像を添付">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">

// ── STATE ────────────────────────────────────────────────
let conversations = JSON.parse(localStorage.getItem('aicare_bm_convs') || '[]');
let currentConvId = null;
let isStreaming = false;
let pendingImages = []; // [{dataUrl, mimeType, base64}]

function saveConvs() {
  localStorage.setItem('aicare_bm_convs', JSON.stringify(conversations));
}

// ── CONVERSATION MANAGEMENT ──────────────────────────────
function newChat() {
  currentConvId = null;
  document.getElementById('welcome-screen').style.display = '';
  document.getElementById('messages-inner').style.display = 'none';
  document.getElementById('messages-inner').innerHTML = '';
  document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
}

function createConversation(firstUserMsg) {
  const id = Date.now().toString();
  const title = firstUserMsg.slice(0, 28) + (firstUserMsg.length > 28 ? '…' : '');
  const conv = { id, title, messages: [], createdAt: Date.now() };
  conversations.unshift(conv);
  saveConvs();
  renderSidebar();
  return id;
}

function renderSidebar() {
  const list = document.getElementById('conv-list');
  if (conversations.length === 0) {
    list.innerHTML = '<div style="padding:12px 10px;font-size:12px;color:#3a3a37;">まだ会話がありません</div>';
    return;
  }
  list.innerHTML = conversations.map(c => `
    <div class="conv-item ${c.id === currentConvId ? 'active' : ''}" onclick="loadConv('${c.id}')">
      <span class="conv-item-text">${escHtml(c.title)}</span>
      <button class="conv-item-del" onclick="event.stopPropagation();deleteConv('${c.id}')" title="削除">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M9 3L3 9M3 3l6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  `).join('');
}

function loadConv(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  currentConvId = id;
  document.getElementById('welcome-screen').style.display = 'none';
  const inner = document.getElementById('messages-inner');
  inner.style.display = '';
  inner.innerHTML = '';
  conv.messages.forEach(m => appendMessage(m.role, m.content, false, m.images || []));
  renderSidebar();
  scrollToBottom();
}

function deleteConv(id) {
  conversations = conversations.filter(c => c.id !== id);
  saveConvs();
  if (currentConvId === id) newChat();
  renderSidebar();
}

// ── RENDER ───────────────────────────────────────────────
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMarkdown(text) {
  let html = text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    .replace(/^### (.+)$/gm,'<h3>$1</h3>')
    .replace(/^## (.+)$/gm,'<h2>$1</h2>')
    .replace(/^# (.+)$/gm,'<h2>$1</h2>')
    .replace(/^---+$/gm,'<hr>')
    .replace(/^- (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>.*<\/li>)/s, m => '<ul>' + m + '</ul>');
  // wrap non-tag lines in <p>
  html = html.replace(/^(?!<[hup\/]).+$/gm, line => line ? `<p>${line}</p>` : '');
  return html;
}

function appendMessage(role, content, animate = true, imageUrls = []) {
  const inner = document.getElementById('messages-inner');
  inner.style.display = '';
  document.getElementById('welcome-screen').style.display = 'none';

  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const initials = role === 'user' ? 'You' : 'BM';
  const imagesHtml = imageUrls.length
    ? `<div class="msg-images">${imageUrls.map(u => `<img src="${u}" />`).join('')}</div>`
    : '';
  const bubbleContent = role === 'ai' ? renderMarkdown(content) : escHtml(content);
  div.innerHTML = `
    <div class="msg-avatar">${initials}</div>
    <div class="msg-bubble">${imagesHtml}${bubbleContent}</div>
  `;
  if (animate) div.style.opacity = '0';
  inner.appendChild(div);
  if (animate) requestAnimationFrame(() => { div.style.transition = 'opacity 0.25s'; div.style.opacity = '1'; });
  scrollToBottom();
  return div;
}

function appendTyping() {
  const inner = document.getElementById('messages-inner');
  inner.style.display = '';
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-avatar">BM</div>
    <div class="msg-bubble"><div class="typing-dots"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>
  `;
  inner.appendChild(div);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

function scrollToBottom() {
  const wrap = document.getElementById('messages-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

// ── SEND ─────────────────────────────────────────────────
async function sendMessage() {
  if (isStreaming) return;
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text && pendingImages.length === 0) return;

  const images = [...pendingImages];
  pendingImages = [];
  renderPreviews();
  input.value = '';
  autoResize(input);
  document.getElementById('send-btn').disabled = true;
  isStreaming = true;

  // init conversation
  if (!currentConvId) {
    currentConvId = createConversation(text || '(画像)');
    renderSidebar();
  }

  const conv = conversations.find(c => c.id === currentConvId);
  const userMsg = { role: 'user', content: text, images: images.map(i => i.dataUrl) };
  conv.messages.push(userMsg);
  saveConvs();
  appendMessage('user', text, true, images.map(i => i.dataUrl));
  appendTyping();
  scrollToBottom();

  // Build Gemini contents (history)
  const geminiContents = conv.messages.slice(0, -1).map(m => {
    const parts = [];
    if (m.images) m.images.forEach(durl => {
      const [meta, b64] = durl.split(',');
      const mime = meta.match(/:(.*?);/)[1];
      parts.push({ inline_data: { mime_type: mime, data: b64 } });
    });
    if (m.content) parts.push({ text: m.content });
    return { role: m.role === 'ai' ? 'model' : 'user', parts };
  });

  // Current user message parts
  const curParts = [];
  images.forEach(img => {
    curParts.push({ inline_data: { mime_type: img.mimeType, data: img.base64 } });
  });
  if (text) curParts.push({ text });
  geminiContents.push({ role: 'user', parts: curParts });

  try {
    const res = await fetch('/api/brand-manager', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apiKey: getApiKey(),
        system_instruction: { parts: [{ text: buildSystemInstruction() }] },
        contents: geminiContents
      })
    });

    const data = await res.json();
    removeTyping();

    if (!res.ok) {
      const rawMsg = data?.error?.message || `Error ${res.status}`;
      const errMsg = /quota|rate.?limit|RESOURCE_EXHAUSTED|free_tier/i.test(rawMsg)
        ? 'APIキーのクォータが超過しています。しばらく待つか、有料APIキーを設定してください。'
        : rawMsg;
      appendMessage('ai', `⚠️ エラー: ${errMsg}`);
    } else {
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || '（応答なし）';
      conv.messages.push({ role: 'ai', content: reply });
      saveConvs();
      appendMessage('ai', reply);
    }
  } catch (e) {
    removeTyping();
    appendMessage('ai', `⚠️ 通信エラー: ${e.message}`);
  }

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
}

function sendStarter(btn) {
  document.getElementById('chat-input').value = btn.textContent;
  sendMessage();
}

function handleKey(e) {
  if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 200) + 'px';
}

// ── IMAGE HANDLING ────────────────────────────────────────
function handleFiles(input) {
  const files = Array.from(input.files);
  files.forEach(file => {
    if (!file.type.startsWith('image/')) return;
    const reader = new FileReader();
    reader.onload = e => {
      const dataUrl = e.target.result;
      const base64 = dataUrl.split(',')[1];
      pendingImages.push({ dataUrl, mimeType: file.type, base64 });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

function renderPreviews() {
  const wrap = document.getElementById('img-previews');
  wrap.innerHTML = pendingImages.map((img, i) => `
    <div class="img-preview-item">
      <img src="${img.dataUrl}" />
      <button class="img-preview-del" onclick="removeImage(${i})">✕</button>
    </div>
  `).join('');
}

function removeImage(i) {
  pendingImages.splice(i, 1);
  renderPreviews();
}

// ── API KEY ───────────────────────────────────────────────
const API_KEY_STORAGE = 'aicare_bm_apikey';
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (val) localStorage.setItem(API_KEY_STORAGE, val);
  else localStorage.removeItem(API_KEY_STORAGE);
}
function getApiKey() {
  return localStorage.getItem(API_KEY_STORAGE) || '';
}

// ── EXTRA DOCS ───────────────────────────────────────────
const DOCS_KEY = 'aicare_bm_docs';
let extraDocs = [];
let editingDocId = null;

function loadDocs() {
  try { extraDocs = JSON.parse(localStorage.getItem(DOCS_KEY) || '[]'); } catch(e) { extraDocs = []; }
}

function saveDocs() {
  localStorage.setItem(DOCS_KEY, JSON.stringify(extraDocs));
}

function renderDocList() {
  const el = document.getElementById('doc-list');
  if (!el) return;
  if (extraDocs.length === 0) {
    el.innerHTML = '<div class="docs-empty">まだ資料がありません</div>';
    return;
  }
  el.innerHTML = extraDocs.map(d => `
    <div class="doc-item" onclick="openDocModal('${d.id}')">
      <svg class="doc-item-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 1.5h6l3 3V11.5a.5.5 0 01-.5.5h-8.5a.5.5 0 01-.5-.5v-10a.5.5 0 01.5-.5z" stroke="currentColor" stroke-width="1.2"/>
        <path d="M8 1.5v3h3" stroke="currentColor" stroke-width="1.2"/>
      </svg>
      <span class="doc-item-name">${escHtml(d.name)}</span>
      <button class="doc-item-del" onclick="event.stopPropagation();deleteDoc('${d.id}')" title="削除">✕</button>
    </div>
  `).join('');
}

function openDocModal(id) {
  editingDocId = id;
  const doc = id ? extraDocs.find(d => d.id === id) : null;
  document.getElementById('doc-modal-title').textContent = id ? '資料を編集' : '資料を追加';
  document.getElementById('doc-name-input').value = doc ? doc.name : '';
  document.getElementById('doc-content-input').value = doc ? doc.content : '';
  document.getElementById('doc-overlay').style.display = 'flex';
  setTimeout(() => document.getElementById('doc-name-input').focus(), 50);
}

function closeDocModal() {
  document.getElementById('doc-overlay').style.display = 'none';
  editingDocId = null;
}

function saveDoc() {
  const name = document.getElementById('doc-name-input').value.trim();
  const content = document.getElementById('doc-content-input').value.trim();
  if (!name) { document.getElementById('doc-name-input').focus(); return; }
  if (editingDocId) {
    const idx = extraDocs.findIndex(d => d.id === editingDocId);
    if (idx >= 0) extraDocs[idx] = { ...extraDocs[idx], name, content };
  } else {
    extraDocs.push({ id: 'doc-' + Date.now(), name, content });
  }
  saveDocs();
  renderDocList();
  closeDocModal();
}

function deleteDoc(id) {
  if (!confirm('この資料を削除しますか？')) return;
  extraDocs = extraDocs.filter(d => d.id !== id);
  saveDocs();
  renderDocList();
}

function buildSystemInstruction() {
  let text = BRAND_KNOWLEDGE;
  if (extraDocs.length > 0) {
    text += '\n\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n【追加資料】\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
    extraDocs.forEach(d => {
      text += `\n▼ ${d.name}\n${d.content}\n`;
    });
  }
  return text;
}

// ── INIT ─────────────────────────────────────────────────
loadDocs();
renderDocList();
renderSidebar();
const _savedKey = getApiKey();
if (_savedKey) document.getElementById('api-key-input').value = _savedKey;
</script>
