<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アイケアラボ | 制作物ダッシュボード</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #08080f;
    --surface:  #111118;
    --surface2: #1a1a26;
    --border:   #252535;
    --text:     #eeeef8;
    --muted:    #7878a0;
    --accent:   #6c63ff;
    --accent2:  #a78bfa;
    --green:    #4ade80;
    --yellow:   #fbbf24;
    --red:      #f87171;
    --purple:   #c084fc;
    --gap:      14px;
    --radius:   14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(8,8,15,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .hinner {
    max-width: 1700px; margin: 0 auto;
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
  }

  .logo {
    display: flex; align-items: center; gap: 10px; white-space: nowrap;
    text-decoration: none; color: var(--text);
  }
  .logo-mark {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .logo-text { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo-text em { color: var(--accent2); font-style: normal; }

  .hcontrols { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; flex-wrap: wrap; }

  .search-wrap { position: relative; flex: 1; min-width: 160px; max-width: 320px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search {
    width: 100%; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text); font-size: 0.875rem;
    padding: 7px 11px 7px 32px; outline: none; transition: border-color .2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted); }

  .filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .fbtn {
    background: transparent; border: 1px solid var(--border); border-radius: 20px;
    color: var(--muted); cursor: pointer; font-size: 0.75rem; font-weight: 500;
    padding: 4px 12px; transition: all .15s; white-space: nowrap;
  }
  .fbtn:hover { border-color: var(--accent2); color: var(--accent2); }
  .fbtn.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 700; }

  .hright { display: flex; align-items: center; gap: 14px; margin-left: auto; }
  .count { color: var(--muted); font-size: 0.8rem; white-space: nowrap; }

  .live {
    display: flex; align-items: center; gap: 5px;
    font-size: 0.7rem; font-weight: 600; letter-spacing: .06em; color: var(--muted);
    user-select: none;
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0;
  }
  .live.on .live-dot { background: var(--green); box-shadow: 0 0 7px var(--green); animation: blink 2s infinite; }
  .live.on { color: var(--green); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* ── Main ───────────────────────────────────────────────────── */
  main { max-width: 1700px; margin: 0 auto; padding: 22px 18px 80px; }

  /* ── Masonry ─────────────────────────────────────────────────── */
  .masonry { columns: 4; column-gap: var(--gap); }
  @media (max-width: 1400px) { .masonry { columns: 3; } }
  @media (max-width: 960px)  { .masonry { columns: 2; } }
  @media (max-width: 520px)  { .masonry { columns: 1; } }

  /* ── Card ────────────────────────────────────────────────────── */
  .card {
    break-inside: avoid; margin-bottom: var(--gap);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
    transition: border-color .2s, box-shadow .2s, transform .2s;
  }
  .card:hover {
    border-color: var(--accent);
    box-shadow: 0 0 28px rgba(108,99,255,.22);
    transform: translateY(-3px);
  }

  /* image area */
  .cimg-wrap { position: relative; overflow: hidden; }
  .cimg {
    width: 100%; display: block; object-fit: cover;
    transition: transform .35s;
  }
  .card:hover .cimg { transform: scale(1.03); }

  /* placeholder gradient */
  .cph {
    width: 100%; aspect-ratio: 16/9;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .cph-icon { font-size: 3rem; opacity: .6; }
  .cph-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }

  /* hover overlay */
  .coverlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(4,4,12,.95) 0%, rgba(4,4,12,.2) 55%, transparent 80%);
    opacity: 0; transition: opacity .25s;
    display: flex; align-items: flex-end; gap: 6px; flex-wrap: wrap; padding: 14px;
  }
  .card:hover .coverlay { opacity: 1; }

  .ovbtn {
    display: inline-flex; align-items: center; gap: 4px;
    background: rgba(255,255,255,.1); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,.18); border-radius: 7px;
    color: #fff; font-size: 0.76rem; font-weight: 500; padding: 5px 11px;
    text-decoration: none; transition: background .15s, border-color .15s;
    white-space: nowrap;
  }
  .ovbtn:hover { background: rgba(108,99,255,.55); border-color: var(--accent); }
  .ovbtn.primary { background: var(--accent); border-color: var(--accent); }
  .ovbtn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  /* card body */
  .cbody { padding: 13px 15px 15px; }
  .ctop { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
  .cname { font-size: 0.93rem; font-weight: 700; line-height: 1.3; letter-spacing: -.01em; }
  .sdot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
  }
  .sdot.active   { background: var(--green);  box-shadow: 0 0 7px var(--green); }
  .sdot.wip      { background: var(--yellow); }
  .sdot.paused   { background: var(--red); }
  .sdot.planning { background: var(--purple); }

  .cdesc { font-size: 0.8rem; color: var(--muted); line-height: 1.55; margin-bottom: 10px; }

  .ctags { display: flex; flex-wrap: wrap; gap: 4px; }
  .tag {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 4px; color: var(--muted); font-size: 0.68rem; padding: 2px 7px;
  }

  /* updated flash */
  @keyframes imgflash { 0%{border-color:var(--green);box-shadow:0 0 22px rgba(74,222,128,.45)} 100%{border-color:var(--border);box-shadow:none} }
  .card.updated { animation: imgflash 1.8s ease-out forwards; }

  /* empty */
  .empty { text-align: center; padding: 90px 20px; color: var(--muted); }
  .empty-icon { font-size: 3rem; margin-bottom: 14px; }
  .empty p { font-size: 0.95rem; }
</style>
</head>
<body>

<header>
  <div class="hinner">
    <a class="logo" href="#">
      <div class="logo-mark">👁</div>
      <div class="logo-text">アイケアラボ <em>Works</em></div>
    </a>

    <div class="hcontrols">
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="検索...">
      </div>

      <div class="filters" id="filters">
        <button class="fbtn active" data-status="all">すべて</button>
        <button class="fbtn" data-status="active">Active</button>
        <button class="fbtn" data-status="wip">WIP</button>
        <button class="fbtn" data-status="paused">Paused</button>
        <button class="fbtn" data-status="planning">Planning</button>
      </div>
    </div>

    <div class="hright">
      <span class="count" id="count"></span>
      <span class="live" id="live" title="画像をimage/projectsに置くと自動反映">
        <span class="live-dot"></span>LIVE
      </span>
    </div>
  </div>
</header>

<main>
  <div class="masonry" id="masonry"></div>
</main>

<script>
// ============================================================
// 制作物データ
// 画像: image/projects/<slug>.png を置くと自動表示
// ============================================================
const PROJECTS = [
  {
    slug: 'gacha',
    name: 'Gacha World',
    desc: 'ガチャサイト + CMS管理画面。レアリティ設定・キャラ管理・ガチャ履歴まで一元管理',
    icon: '🎰',
    iconBg: 'linear-gradient(135deg,#4a1d96,#1e1040)',
    status: 'active',
    tags: ['game', 'cms', 'vanilla-js'],
    links: [
      { label: 'Site',  href: 'http://localhost:4000/tools/gacha/index.html', primary: true },
      { label: 'Admin', href: 'http://localhost:4000/tools/gacha/admin.html' },
      { label: 'Guide', href: 'http://localhost:4000/tools/gacha/howto.html' },
    ]
  },
  {
    slug: 'lp-research-engine',
    name: 'LP Research Engine',
    desc: 'LP分析・収集・研究ダッシュボード。競合LPを分析してインサイトを蓄積',
    icon: '🔬',
    iconBg: 'linear-gradient(135deg,#164e63,#0c2040)',
    status: 'wip',
    tags: ['research', 'lp', 'analytics'],
    links: [
      { label: 'Open', href: 'http://localhost:3000', primary: true },
    ]
  },
  {
    slug: 'website-check-board',
    name: 'Website Check Board',
    desc: 'Webサイト修正確認ボード。誤字脱字・指摘事項をクライアントと共有管理できる共有ツール',
    icon: '🗂',
    iconBg: 'linear-gradient(135deg,#0c4a6e,#0a2030)',
    status: 'active',
    tags: ['check', 'client', 'supabase', 'next.js'],
    links: [
      { label: 'Admin',  href: 'http://localhost:3000/board', primary: true },
      { label: 'Client', href: 'http://localhost:3000/client?token=preview' },
    ]
  },
  {
    slug: 'eyecare-monitor',
    name: 'EyeCare Monitor',
    desc: 'YouTube・各種SNSのモニタリングプロジェクト。アイケアラボ関連の言及をリアルタイム監視',
    icon: '👁',
    iconBg: 'linear-gradient(135deg,#14532d,#0a2a1a)',
    status: 'planning',
    tags: ['youtube', 'monitor', 'sns'],
    links: [
      { label: 'Open', href: 'http://localhost:3000', primary: true },
    ]
  },
  {
    slug: 'site-diagnosis',
    name: 'Site Diagnosis',
    desc: 'WebサイトのURLを入力するだけでAIが改善点を診断。CVR改善のヒントを自動レポート',
    icon: '🩺',
    iconBg: 'linear-gradient(135deg,#7c2d12,#2a1000)',
    status: 'active',
    tags: ['ai', 'claude', 'web-tool'],
    links: [
      { label: 'Open', href: 'http://localhost:4000/tools/site-diagnosis/index.html', primary: true },
    ]
  },
];
// ============================================================

const STATUS_LABEL = { active: 'Active', wip: 'WIP', paused: 'Paused', planning: 'Planning' };
const imgTs = {}; // slug → timestamp cache

function imgSrc(slug) {
  const ts = imgTs[slug];
  return `/image/projects/${slug}.png${ts ? '?t=' + ts : ''}`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function cardHtml(p) {
  const src      = imgSrc(p.slug);
  const overlays = p.links.map(l =>
    `<a class="ovbtn${l.primary ? ' primary' : ''}" href="${esc(l.href)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${esc(l.label)}</a>`
  ).join('');

  return `
<div class="card" data-slug="${esc(p.slug)}" data-status="${esc(p.status)}"
     data-name="${esc(p.name.toLowerCase())}" data-desc="${esc(p.desc.toLowerCase())}"
     data-tags="${esc((p.tags||[]).join(' ').toLowerCase())}">
  <div class="cimg-wrap">
    <img class="cimg" src="${esc(src)}"
         alt="${esc(p.name)}"
         onload="this.style.display='block';this.nextElementSibling.style.display='none'"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="cph" style="background:${esc(p.iconBg)}">
      <div class="cph-icon">${p.icon}</div>
      <div class="cph-label">画像未設定 — image/projects/${esc(p.slug)}.png</div>
    </div>
    <div class="coverlay">${overlays}</div>
  </div>
  <div class="cbody">
    <div class="ctop">
      <div class="cname">${esc(p.name)}</div>
      <div class="sdot ${esc(p.status)}" title="${STATUS_LABEL[p.status]||p.status}"></div>
    </div>
    <div class="cdesc">${esc(p.desc)}</div>
    ${p.tags && p.tags.length ? `<div class="ctags">${p.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>` : ''}
  </div>
</div>`;
}

let currentStatus = 'all';

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const list = PROJECTS.filter(p => {
    const okStatus = currentStatus === 'all' || p.status === currentStatus;
    const okSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      (p.tags||[]).some(t => t.toLowerCase().includes(q));
    return okStatus && okSearch;
  });

  const m = document.getElementById('masonry');
  if (list.length === 0) {
    m.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><p>条件に一致する制作物が見つかりません</p></div>`;
  } else {
    m.innerHTML = list.map(cardHtml).join('');
  }
  document.getElementById('count').textContent = `${list.length} works`;
}

document.getElementById('search').addEventListener('input', applyFilters);

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.fbtn');
  if (!btn) return;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentStatus = btn.dataset.status;
  applyFilters();
});

// ── SSE: リアルタイム画像更新 ────────────────────────────────────
function connectSSE() {
  const live = document.getElementById('live');
  const es = new EventSource('/api/watch-images');

  es.onopen = () => live.classList.add('on');

  es.onmessage = e => {
    try {
      const { slug, ts } = JSON.parse(e.data);
      imgTs[slug] = ts;
      const card = document.querySelector(`.card[data-slug="${slug}"]`);
      if (!card) return;
      const img = card.querySelector('.cimg');
      const ph  = card.querySelector('.cph');
      if (img) {
        img.style.display = 'block';
        if (ph) ph.style.display = 'none';
        img.src = imgSrc(slug);
      }
      card.classList.remove('updated');
      void card.offsetWidth;
      card.classList.add('updated');
      setTimeout(() => card.classList.remove('updated'), 1900);
    } catch { /* ignore malformed data */ }
  };

  es.onerror = () => {
    live.classList.remove('on');
    es.close();
    setTimeout(connectSSE, 5000);
  };
}

applyFilters();
connectSSE();
</script>

</body>
</html>
