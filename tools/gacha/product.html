<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>商品詳細 — ガチャワールド</title>
  <style>
    :root{
      --bg:#f2f2f7;--card:#fff;
      --green:#00a63c;--coin:#f0a000;--coin-bg:#fff8e1;
      --red:#e53935;--text:#1a1a1a;--sub:#666;--dim:#999;
      --border:#e5e5ea;--shadow:0 2px 8px rgba(0,0,0,0.08);--r:14px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:-apple-system,'Hiragino Sans','Noto Sans JP',sans-serif;
      background:var(--bg);color:var(--text);min-height:100vh;
      padding-bottom:100px;}

    /* ── HEADER ── */
    .hdr{
      position:sticky;top:0;z-index:80;
      background:rgba(255,255,255,0.92);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:10px;padding:10px 14px;
    }
    .hdr-back{background:none;border:none;font-size:1.3rem;cursor:pointer;
      color:var(--green);padding:2px 6px;flex-shrink:0;}
    .hdr-title{font-size:0.92rem;font-weight:800;flex:1;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .hdr-coin{display:flex;align-items:center;gap:4px;
      background:var(--coin-bg);border:1.5px solid #f0c040;
      border-radius:20px;padding:4px 10px;font-size:0.78rem;font-weight:700;
      color:#a07000;flex-shrink:0;}

    /* ── HERO ── */
    .hero{
      position:relative;height:260px;display:flex;
      flex-direction:column;align-items:center;justify-content:flex-end;
      overflow:hidden;padding:20px 16px;
      background-size:cover;background-position:center;
    }
    .hero-overlay{position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,0.68) 0%,rgba(0,0,0,0.12) 60%,transparent 100%);}
    .hero-bg-ico{position:absolute;font-size:9rem;opacity:0.12;
      right:-10px;bottom:-20px;transform:rotate(-12deg);pointer-events:none;}
    .hero-bottom{position:relative;z-index:2;width:100%;text-align:center;padding-bottom:4px;}
    .hero-icon{font-size:3.5rem;margin-bottom:8px;
      filter:drop-shadow(0 4px 12px rgba(0,0,0,0.35));}
    .hero-name{font-size:1.4rem;font-weight:900;color:white;
      text-shadow:0 2px 10px rgba(0,0,0,0.5);margin-bottom:5px;}
    .hero-copy{font-size:0.82rem;color:rgba(255,255,255,0.9);}
    .hero-tags{position:absolute;top:12px;left:12px;display:flex;gap:5px;z-index:3;flex-wrap:wrap;}
    .htag{padding:3px 9px;border-radius:12px;font-size:0.65rem;font-weight:700;
      background:rgba(0,0,0,0.38);color:white;backdrop-filter:blur(4px);}
    .hero-hot{position:absolute;top:12px;right:12px;z-index:3;
      background:rgba(0,0,0,0.45);color:white;border-radius:12px;
      padding:4px 9px;font-size:0.72rem;font-weight:700;}

    /* ── STICKY INFO BAR ── */
    .info-bar{
      background:white;border-bottom:1px solid var(--border);
      padding:10px 14px;
      position:sticky;top:49px;z-index:70;
    }
    .info-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
    .info-cost{font-size:1.1rem;font-weight:900;color:#a07000;}
    .info-cost span{font-size:0.78rem;color:var(--sub);font-weight:500;margin-left:3px;}
    .info-rem-label{display:flex;justify-content:space-between;
      font-size:0.72rem;color:var(--sub);margin-bottom:4px;}
    .info-rem-bar{height:6px;background:#e5e5ea;border-radius:3px;overflow:hidden;}
    .info-rem-fill{height:100%;border-radius:3px;transition:width .4s;}

    /* ── SECTIONS ── */
    .page-wrap{max-width:640px;margin:0 auto;padding:14px 12px;}
    .sec{background:white;border-radius:var(--r);box-shadow:var(--shadow);
      margin-bottom:14px;overflow:hidden;}
    .sec-hd{padding:13px 14px 10px;border-bottom:1px solid var(--border);
      display:flex;align-items:center;gap:8px;}
    .sec-grade{
      width:36px;height:36px;border-radius:10px;display:flex;align-items:center;
      justify-content:center;font-size:0.8rem;font-weight:900;color:white;flex-shrink:0;
    }
    .grade-1{background:linear-gradient(135deg,#ffd700,#ff8f00);}
    .grade-2{background:linear-gradient(135deg,#c0c0c0,#607d8b);}
    .grade-3{background:linear-gradient(135deg,#cd7f32,#8d4c2f);}
    .grade-other{background:linear-gradient(135deg,#78909c,#455a64);}
    .sec-hd-info{flex:1;}
    .sec-hd-title{font-size:0.95rem;font-weight:800;}
    .sec-hd-sub{font-size:0.7rem;color:var(--sub);margin-top:2px;}
    .sec-body{padding:12px 14px;}

    /* ── PRIZE CARDS ── */
    /* 1等: single large */
    .prize-1{
      display:flex;flex-direction:column;align-items:center;text-align:center;
      background:linear-gradient(135deg,rgba(255,215,0,0.10),rgba(255,143,0,0.08));
      border:2px solid rgba(255,193,7,0.45);border-radius:18px;
      padding:22px 16px 18px;margin-bottom:0;
      box-shadow:0 4px 24px rgba(255,193,7,0.12);
    }
    .prize-1-ico{font-size:7rem;flex-shrink:0;margin-bottom:14px;
      filter:drop-shadow(0 6px 16px rgba(0,0,0,0.22));}
    .prize-1-info{flex:1;width:100%;}
    .prize-1-name{font-size:1.3rem;font-weight:900;margin-bottom:8px;line-height:1.3;}
    .prize-1-cv{font-size:0.88rem;color:#a07000;margin-top:6px;}

    /* 2等・3等共通: 2-col grid */
    .prize-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .prize-card-m{
      background:#fafafa;border:1px solid var(--border);border-radius:12px;
      padding:14px 10px;text-align:center;
    }
    .prize-card-m-ico{font-size:3rem;margin-bottom:8px;}
    .prize-card-m-name{font-size:0.8rem;font-weight:700;line-height:1.3;margin-bottom:5px;}
    .prize-card-m-cv{font-size:0.7rem;color:#a07000;}

    /* 3等: 2-col (same as m) */
    .prize-card-s{
      background:#fafafa;border:1px solid var(--border);border-radius:12px;
      padding:14px 10px;text-align:center;
    }
    .prize-card-s-ico{font-size:3rem;margin-bottom:8px;}
    .prize-card-s-name{font-size:0.78rem;font-weight:700;line-height:1.3;margin-bottom:4px;}
    .prize-card-s-cv{font-size:0.68rem;color:#a07000;}

    /* その他: compact list */
    .prize-list{display:flex;flex-direction:column;gap:8px;}
    .prize-list-item{display:flex;align-items:center;gap:12px;
      background:#fafafa;border-radius:10px;padding:10px 12px;}
    .prize-list-ico{font-size:2rem;flex-shrink:0;}
    .prize-list-info{flex:1;min-width:0;}
    .prize-list-name{font-size:0.82rem;font-weight:700;}
    .prize-list-cv{font-size:0.7rem;color:#a07000;margin-top:2px;}

    /* ── RARITY BADGE ── */
    .rbadge{display:inline-block;padding:2px 9px;border-radius:10px;font-size:0.68rem;font-weight:700;margin-bottom:4px;}
    .rb-common    {background:#eceff1;color:#546e7a;}
    .rb-uncommon  {background:#e8f5e9;color:#2e7d32;}
    .rb-rare      {background:#e3f2fd;color:#1565c0;}
    .rb-super-rare{background:#f3e5f5;color:#6a1b9a;}
    .rb-ultra-rare{background:#fff3e0;color:#bf360c;}

    /* ── NOTES ── */
    .notes-list{display:flex;flex-direction:column;gap:7px;}
    .note-item{display:flex;gap:8px;align-items:flex-start;font-size:0.8rem;color:var(--sub);line-height:1.6;}
    .note-dot{color:var(--green);font-weight:900;flex-shrink:0;margin-top:1px;}

    /* ── RATE TABLE ── */
    .rate-table{width:100%;border-collapse:collapse;font-size:0.72rem;}
    .rate-table th{background:#f8f8f8;padding:6px 8px;text-align:left;
      font-weight:700;color:var(--sub);border-bottom:1px solid var(--border);}
    .rate-table td{padding:6px 8px;border-bottom:1px solid #f5f5f5;}
    .rate-table tr:last-child td{border-bottom:none;}
    .rate-bar-wrap{display:flex;align-items:center;gap:6px;}
    .rate-bar-track{flex:1;height:4px;background:#efefef;border-radius:3px;overflow:hidden;}
    .rate-bar-fill{height:100%;border-radius:3px;}

    /* ── FLOATING BOTTOM BAR ── */
    .float-bar{
      position:fixed;bottom:0;left:0;right:0;z-index:200;
      background:white;border-top:1px solid var(--border);
      padding:10px 14px calc(10px + env(safe-area-inset-bottom,0px));
      box-shadow:0 -4px 20px rgba(0,0,0,0.1);
    }
    .float-bar-inner{max-width:640px;margin:0 auto;display:flex;gap:10px;align-items:center;}
    .float-coin-info{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
    .float-coin-label{font-size:0.62rem;color:var(--dim);}
    .float-coin-val{font-size:0.92rem;font-weight:800;color:#a07000;}
    .float-btns{display:flex;gap:8px;flex:1;}
    .btn-draw-main{
      flex:2;padding:13px;border-radius:12px;border:none;cursor:pointer;
      font-size:0.95rem;font-weight:800;
      background:var(--green);color:white;
      box-shadow:0 4px 14px rgba(0,166,60,0.4);
      transition:transform .12s,opacity .12s;
    }
    .btn-draw-main:active{transform:scale(0.96);opacity:0.88;}
    .btn-draw-main:disabled{background:#ccc;box-shadow:none;cursor:not-allowed;}
    .btn-draw-10{
      flex:1;padding:13px;border-radius:12px;border:none;cursor:pointer;
      font-size:0.85rem;font-weight:700;
      background:#1a1a1a;color:white;
      transition:transform .12s,opacity .12s;
    }
    .btn-draw-10:active{transform:scale(0.96);}
    .btn-draw-10:disabled{background:#ccc;cursor:not-allowed;}

    /* ── RESULT OVERLAY ── */
    .res-ov{
      display:none;position:fixed;inset:0;z-index:500;
      background:rgba(0,0,0,0.7);align-items:flex-end;justify-content:center;
    }
    .res-ov.open{display:flex;}
    .res-sheet{
      background:white;border-radius:22px 22px 0 0;
      padding:20px 20px calc(24px + env(safe-area-inset-bottom,0px));
      width:100%;max-width:480px;text-align:center;
    }
    .res-handle{width:36px;height:4px;background:#e0e0e0;border-radius:2px;
      margin:0 auto 18px;}
    .res-ico{font-size:5.5rem;line-height:1;margin-bottom:10px;}
    .res-name{font-size:1.15rem;font-weight:900;margin-bottom:8px;line-height:1.3;}
    .res-cv{font-size:0.88rem;color:#a07000;margin-bottom:18px;}
    .res-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
    .res-btn{padding:10px 22px;border-radius:24px;border:none;
      cursor:pointer;font-weight:700;font-size:0.88rem;}
    .res-btn-green{background:var(--green);color:white;}
    .res-btn-gold{background:var(--coin);color:white;}
    .res-btn-gray{background:#f0f0f0;color:var(--text);}

    /* ── PRIZE ITEM IMAGES ── */
    .item-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 0 4px;
      scrollbar-width:none;-webkit-overflow-scrolling:touch;margin-top:10px;}
    .item-strip::-webkit-scrollbar{display:none;}
    .item-thumb{flex-shrink:0;text-align:center;width:68px;}
    .item-thumb-img{width:68px;height:68px;object-fit:cover;border-radius:10px;
      border:1.5px solid var(--border);display:block;}
    .item-thumb-ph{width:68px;height:68px;border-radius:10px;background:#f0f0f0;
      border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.6rem;}
    .item-thumb-name{font-size:0.6rem;color:var(--sub);margin-top:4px;
      line-height:1.3;overflow:hidden;display:-webkit-box;
      -webkit-line-clamp:2;-webkit-box-orient:vertical;}
    /* Result image */
    .res-item-img{width:100px;height:100px;object-fit:cover;border-radius:14px;
      display:block;margin:0 auto 10px;}

    /* ── TOAST ── */
    .toast{position:fixed;bottom:110px;left:50%;
      transform:translateX(-50%) translateY(60px);
      background:rgba(0,0,0,0.8);color:white;padding:9px 20px;
      border-radius:20px;font-size:0.85rem;font-weight:600;
      z-index:400;transition:transform .3s;white-space:nowrap;}
    .toast.show{transform:translateX(-50%) translateY(0);}

    /* ── EMPTY ── */
    .not-found{text-align:center;padding:60px 20px;color:var(--dim);}
    .not-found-ico{font-size:3rem;margin-bottom:14px;}
  </style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <button class="hdr-back" onclick="history.back()">←</button>
  <div class="hdr-title" id="hdrTitle">商品詳細</div>
  <div class="hdr-coin" id="hdrCoin">🪙 —</div>
</div>

<!-- MAIN (filled by JS) -->
<div id="main"></div>

<!-- FLOATING BOTTOM BAR -->
<div class="float-bar" id="floatBar" style="display:none">
  <div class="float-bar-inner">
    <div class="float-coin-info">
      <div class="float-coin-label">所持コイン</div>
      <div class="float-coin-val" id="floatCoin">🪙 —</div>
    </div>
    <div class="float-btns">
      <button class="btn-draw-main" id="btnDraw1" onclick="Page.spin(1)">🎰 1回引く</button>
      <button class="btn-draw-10"   id="btnDraw10" onclick="Page.spin(10)">⚡ 10連</button>
    </div>
  </div>
</div>

<!-- RESULT OVERLAY -->
<div class="res-ov" id="resOv">
  <div class="res-sheet">
    <div class="res-handle"></div>
    <div class="res-ico"  id="resIco"></div>
    <div id="resBadge"></div>
    <div class="res-name" id="resName"></div>
    <div class="res-cv"   id="resCv"></div>
    <div class="res-btns">
      <button class="res-btn res-btn-green" id="resBtnAgain" onclick="Page.spinAgain()">もう一度</button>
      <button class="res-btn res-btn-gold"  onclick="Page.exchLast()">コイン交換</button>
      <button class="res-btn res-btn-gray"  onclick="Page.closeResult()">閉じる</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE (same localStorage key as index.html) ──────
const GW_KEY = 'gachaWorld_v3';
const State = (()=>{
  let s;
  function load(){
    try{ s = JSON.parse(localStorage.getItem(GW_KEY)); }catch(e){}
    if(!s) s = {coins:1000,inv:{},spins:0,urCount:0,history:[],slots:{}};
  }
  function save(){ localStorage.setItem(GW_KEY, JSON.stringify(s)); }
  load();
  return {
    get coins(){ return s.coins; },
    set coins(v){ s.coins=v; save(); },
    slots(id){ return s.slots[id]??0; },
    setSlots(id,v){ s.slots[id]=v; save(); },
    addItem(item){
      if(s.inv[item.id]) s.inv[item.id].qty++;
      else s.inv[item.id]={...item,qty:1};
      save();
    },
    removeItem(id,qty=1){
      if(!s.inv[id]) return 0;
      const cv = s.inv[id].cv;
      const taken = Math.min(qty, s.inv[id].qty);
      s.inv[id].qty -= taken;
      if(s.inv[id].qty<=0) delete s.inv[id];
      save();
      return cv*taken;
    },
    recordSpin(mid, prize){
      s.spins++;
      if(prize.rarity==='ultra-rare') s.urCount++;
      if(s.slots[mid]>0) s.slots[mid]--;
      const m = MACHINES.find(x=>x.id===mid);
      s.history.unshift({time:new Date().toLocaleString('ja-JP'), machine:m?m.name:mid, prize});
      if(s.history.length>100) s.history.pop();
      save();
    },
  };
})();

// ─── MACHINES (defaults + localStorage overrides) ─────
const MACHINES=[
  {id:'beginner',name:'ビギナーズラック',icon:'🍀',grad:'linear-gradient(135deg,#66bb6a,#2e7d32)',copy:'初回限定！ラッキーな出会いを！',cost:30,cost10:270,totalSlots:99999,tags:['お手軽'],prizes:[{id:'bg_stk',name:'ラッキーステッカー',emoji:'🏷️',rarity:'common',cv:45,prob:0.55},{id:'bg_bdg',name:'クローバーバッジ',emoji:'🍀',rarity:'uncommon',cv:80,prob:0.30},{id:'bg_key',name:'ラッキーチャーム',emoji:'🔮',rarity:'rare',cv:150,prob:0.12},{id:'bg_fig',name:'幸運のフィギュア',emoji:'🧸',rarity:'super-rare',cv:280,prob:0.03}]},
  {id:'starter',name:'スターターガチャ',icon:'🎪',grad:'linear-gradient(135deg,#43a047,#1b5e20)',copy:'まずはここから！誰でも引けるお手軽ガチャ',cost:50,cost10:450,totalSlots:99999,tags:['お手軽'],prizes:[{id:'st_stk',name:'キャラステッカー',emoji:'🏷️',rarity:'common',cv:75,prob:0.50},{id:'st_bdg',name:'コレクションバッジ',emoji:'📛',rarity:'uncommon',cv:120,prob:0.30},{id:'st_key',name:'キーホルダー',emoji:'🔑',rarity:'rare',cv:200,prob:0.15},{id:'st_fig',name:'ミニフィギュア',emoji:'🧸',rarity:'super-rare',cv:350,prob:0.05}]},
  {id:'second',name:'セカンドチャンス',icon:'🎯',grad:'linear-gradient(135deg,#26c6da,#006064)',copy:'もう一度チャレンジ！お得な中級ガチャ',cost:80,cost10:720,totalSlots:80000,tags:['お手軽'],prizes:[{id:'sc_pin',name:'ピンバッジ',emoji:'📌',rarity:'common',cv:100,prob:0.50},{id:'sc_str',name:'ストラップ',emoji:'🔗',rarity:'uncommon',cv:160,prob:0.30},{id:'sc_bk',name:'ミニコミック',emoji:'📔',rarity:'rare',cv:250,prob:0.15},{id:'sc_fig',name:'アクションフィギュア',emoji:'🤺',rarity:'super-rare',cv:400,prob:0.05}]},
  {id:'normal',name:'ノーマルガチャ',icon:'⚡',grad:'linear-gradient(135deg,#1e88e5,#0d47a1)',copy:'バランス◎ スタンダードなガチャ',cost:100,cost10:900,totalSlots:50000,tags:['スタンダード'],prizes:[{id:'nm_pin',name:'ピンバッジセット',emoji:'📌',rarity:'common',cv:130,prob:0.50},{id:'nm_tsh',name:'キャラTシャツ',emoji:'👕',rarity:'uncommon',cv:280,prob:0.28},{id:'nm_pos',name:'限定ポスター',emoji:'🖼️',rarity:'rare',cv:500,prob:0.17},{id:'nm_fig',name:'レアフィギュア',emoji:'🎎',rarity:'super-rare',cv:1200,prob:0.05}]},
  {id:'anime',name:'アニメキャラガチャ',icon:'✨',grad:'linear-gradient(135deg,#ec407a,#880e4f)',copy:'人気アニメキャラのグッズが登場！',cost:150,cost10:1350,totalSlots:60000,tags:['アニメ'],prizes:[{id:'an_stk',name:'アニメステッカーセット',emoji:'🌸',rarity:'common',cv:180,prob:0.50},{id:'an_bdg',name:'キャラクターバッジ',emoji:'💮',rarity:'uncommon',cv:320,prob:0.28},{id:'an_key',name:'アニメキーホルダー',emoji:'🗝️',rarity:'rare',cv:600,prob:0.17},{id:'an_fig',name:'アニメフィギュア',emoji:'🎌',rarity:'super-rare',cv:1500,prob:0.05}]},

function rbadge(r){

}
function fmt(n){ return Number(n).toLocaleString('ja-JP'); }

// ─── GRADE CLASSIFIER ─────────────────────────────────
function gradeOf(prizes){
  // Sort prizes by rarity weight
  const order = ['ultra-rare','super-rare','rare','uncommon','common'];
  const sorted = [...prizes].sort((a,b)=>order.indexOf(a.rarity)-order.indexOf(b.rarity));
  const grades = {g1:[],g2:[],g3:[],other:[]};
  const used = new Set();
  // 1等: ultra-rare (or if none: super-rare top)
  sorted.filter(p=>p.rarity==='ultra-rare').forEach(p=>{grades.g1.push(p);used.add(p.id);});
  if(!grades.g1.length){
    const top = sorted.find(p=>p.rarity==='super-rare');
    if(top){grades.g1.push(top);used.add(top.id);}
  }
  // 2等: super-rare (remaining)
  sorted.filter(p=>p.rarity==='super-rare'&&!used.has(p.id)).forEach(p=>{grades.g2.push(p);used.add(p.id);});
  if(!grades.g2.length&&!grades.g1.length){
    const top = sorted.find(p=>p.rarity==='rare');
    if(top){grades.g1.push(top);used.add(top.id);}
  }
  // 3等: rare
  sorted.filter(p=>p.rarity==='rare'&&!used.has(p.id)).forEach(p=>{grades.g3.push(p);used.add(p.id);});
  // その他: rest
  sorted.filter(p=>!used.has(p.id)).forEach(p=>grades.other.push(p));
  return grades;
}

        <div class="sec-grade" style="background:#2196f3;font-size:0.7rem">確率</div>
        <div class="sec-hd-info">
          <div class="sec-hd-title">📊 排出確率</div>
        </div>
      </div>
      <div class="sec-body" style="padding:0">
        <div style="overflow-x:auto">
          <table class="rate-table"><tbody>${rows}</tbody></table>
        </div>
      </div>
    </div>`;
  },

  _descSection(m){
    return `
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-grade" style="background:#64748b;font-size:0.65rem">説明</div>
        <div class="sec-hd-info"><div class="sec-hd-title">📝 商品説明</div></div>
      </div>
      <div class="sec-body">
        <div style="font-size:0.83rem;color:var(--sub);line-height:1.75;white-space:pre-wrap">${m.description}</div>
      </div>
    </div>`;
  },
  _notesSection(m){
    const defaultNotes = [
      '本ガチャはデモ用です。実際の商品の売買は行っておりません。',
      '獲得したアイテムはコインに交換できます。コインは他のガチャに使用できます。',
      '排出確率は各景品の表記をご確認ください。',
      '残り枚数が0になるとこのガチャは終了となります。',
      '10連引きは1回あたり10%割引になります。',
      'コインが不足している場合はガチャを引くことができません。',
    ];
    const notes = (m.notes && m.notes.length) ? m.notes : defaultNotes;
    const items = notes.map(n=>`
      <div class="note-item"><span class="note-dot">●</span><span>${n}</span></div>`).join('');
    return `
    <div class="sec">
      <div class="sec-hd">
        <div class="sec-grade" style="background:#f0a000;font-size:0.65rem">注意</div>
        <div class="sec-hd-info"><div class="sec-hd-title">⚠️ ご注意事項</div></div>
      </div>
      <div class="sec-body">
        <div class="notes-list">${items}</div>
      </div>
    </div>`;
  },

  updateCoins(){
    const c = fmt(State.coins);
    document.getElementById('hdrCoin').textContent  = '🪙 '+c;
    document.getElementById('floatCoin').textContent = '🪙 '+c;
  },
  updateButtons(){
    if(!currentMachine) return;
    const m = currentMachine;
    const rem = State.slots(m.id);
    const noSlots = rem<=0;
    document.getElementById('btnDraw1').disabled  = State.coins < m.cost   || noSlots;
    document.getElementById('btnDraw10').disabled = State.coins < m.cost10 || noSlots;
    if(noSlots){
      document.getElementById('btnDraw1').textContent  = '売り切れ';
      document.getElementById('btnDraw10').textContent = '売り切れ';
    } else {
      document.getElementById('btnDraw1').textContent  = '🎰 1回引く  🪙'+fmt(m.cost);
      document.getElementById('btnDraw10').textContent = '⚡ 10連  🪙'+fmt(m.cost10);
    }
  },

  _drawPrize(m){
    const r = Math.random();
    let acc = 0;
    for(const p of m.prizes){
      acc += p.prob;
      if(r <= acc) return this._attachItem(p);
    }
    return this._attachItem(m.prizes[m.prizes.length-1]);
  },
  _attachItem(p){
    const items = (p.items||[]);
    if(!items.length) return p;
    const item = items[Math.floor(Math.random()*items.length)];
    return {...p, _item: item};
  },

  spin(count){
    const m = currentMachine;
    if(!m) return;
    const cost = count===1 ? m.cost : m.cost10;
    if(State.coins < cost){ toast('コインが不足しています'); return; }
    if(State.slots(m.id)<=0){ toast('売り切れです'); return; }
    State.coins -= cost;
    const prize = this._drawPrize(m);
    State.addItem(prize);
    State.recordSpin(m.id, prize);
    lastPrize = prize;
    lastSpinCount = count;
    this.showResult(prize);
    this.updateCoins();
    this.updateButtons();
    // refresh rem bar
    const rem = State.slots(m.id);
    const pct = Math.max(2,(rem/m.totalSlots)*100);
    const fillColor = pct>50?'#00a63c':pct>20?'#f0a000':'#e53935';
    const fill = document.querySelector('.info-rem-fill');
    const label = document.querySelector('.info-rem-label strong');
    if(fill) fill.style.width = pct+'%', fill.style.background = fillColor;
    if(label) label.textContent = fmt(rem);
  },
  spinAgain(){
    this.closeResult();
    setTimeout(()=>this.spin(lastSpinCount), 200);
  },
  exchLast(){
    if(!lastPrize) return;
    const gained = State.removeItem(lastPrize.id);
    if(gained>0){
      State.coins += gained;
      this.updateCoins();
      this.updateButtons();
      toast('🪙 '+fmt(gained)+'コインに交換しました');
    }
    this.closeResult();
  },
  showResult(prize){
    const info = RARITY_INFO[prize.rarity]||RARITY_INFO['common'];
    const item = prize._item;
    if(item && item.image){
      document.getElementById('resIco').innerHTML = `<img class="res-item-img" src="${item.image}" alt="">`;
    } else {
      document.getElementById('resIco').textContent = prize.emoji;
    }
    document.getElementById('resBadge').innerHTML  = rbadge(prize.rarity);
    document.getElementById('resName').textContent = (item && item.name) ? item.name : prize.name;
    document.getElementById('resCv').textContent   = '🪙 コイン換算 '+fmt(prize.cv);
    // UR glow
    const card = document.querySelector('.res-sheet');
    if(prize.rarity==='ultra-rare'){
      card.style.background='linear-gradient(160deg,#fff8e1,#fff3e0)';
    } else {
      card.style.background='white';
    }
    document.getElementById('resOv').classList.add('open');
  },
  closeResult(){
    document.getElementById('resOv').classList.remove('open');
  },
};

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2800);
}

// tap outside result sheet to close
document.getElementById('resOv').addEventListener('click',function(e){
  if(e.target===this) Page.closeResult();
});

Page.init();
</script>
</body>
</html>
