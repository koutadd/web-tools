<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Project Hub</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-hover: #79b8ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --purple: #bc8cff;
    --radius: 10px;
    --shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 24px;
    flex-wrap: wrap;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    white-space: nowrap;
  }
  .logo span { color: var(--accent); }

  .controls {
    display: flex;
    gap: 12px;
    flex: 1;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    min-width: 200px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
  }
  #search {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 0.9rem;
    padding: 8px 12px 8px 36px;
    outline: none;
    transition: border-color 0.2s;
  }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--text-muted); }

  .filter-group {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    padding: 6px 14px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d1117;
    font-weight: 600;
  }

  .count-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-muted);
    font-size: 0.8rem;
    padding: 6px 14px;
    white-space: nowrap;
    margin-left: auto;
  }

  main {
    max-width: 1400px;
    margin: 32px auto;
    padding: 0 32px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: border-color 0.2s, transform 0.15s;
  }
  .card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .card-header {
    padding: 20px 20px 14px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }

  .card-meta { flex: 1; min-width: 0; }

  .card-name {
    font-size: 1.05rem;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-desc {
    color: var(--text-muted);
    font-size: 0.85rem;
    line-height: 1.5;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .status-badge::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    display: block;
  }
  .status-active    { background: rgba(63,185,80,0.15); color: var(--green); }
  .status-active::before { background: var(--green); }
  .status-wip       { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .status-wip::before { background: var(--yellow); }
  .status-paused    { background: rgba(248,81,73,0.15); color: var(--red); }
  .status-paused::before { background: var(--red); }
  .status-planning  { background: rgba(188,140,255,0.15); color: var(--purple); }
  .status-planning::before { background: var(--purple); }

  .card-tags {
    padding: 0 20px 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text-muted);
    font-size: 0.75rem;
    padding: 2px 8px;
  }

  .card-links {
    padding: 14px 20px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: auto;
  }

  .link-btn {
    align-items: center;
    border-radius: 6px;
    cursor: pointer;
    display: inline-flex;
    font-size: 0.82rem;
    font-weight: 500;
    gap: 5px;
    padding: 6px 12px;
    text-decoration: none;
    transition: all 0.15s;
  }

  .link-primary {
    background: var(--accent);
    color: #0d1117;
  }
  .link-primary:hover { background: var(--accent-hover); }

  .link-secondary {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }
  .link-secondary:hover { border-color: var(--accent); color: var(--accent); }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 16px; }
  .empty p { font-size: 1rem; }

  @media (max-width: 640px) {
    header { padding: 14px 16px; }
    main { padding: 0 16px; margin: 20px auto; }
    .grid { grid-template-columns: 1fr; }
    .logo { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Project<span>Hub</span></div>
    <div class="controls">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="search" placeholder="プロジェクトを検索...">
      </div>
      <div class="filter-group" id="filters">
        <button class="filter-btn active" data-status="all">すべて</button>
        <button class="filter-btn" data-status="active">Active</button>
        <button class="filter-btn" data-status="wip">WIP</button>
        <button class="filter-btn" data-status="paused">Paused</button>
        <button class="filter-btn" data-status="planning">Planning</button>
      </div>
      <div class="count-badge" id="count">0 projects</div>
    </div>
  </div>
</header>

<main>
  <div class="grid" id="grid"></div>
</main>

<script>
// ============================================================
// プロジェクトデータ
// 追加するには projects 配列に要素を追加してください
// ============================================================
const projects = [
  {
    name: "Gacha World",
    desc: "ガチャサイト + CMS",
    icon: "🎰",
    iconBg: "#1a1040",
    status: "active",          // active | wip | paused | planning
    tags: ["game", "cms"],
    links: [
      { label: "Site",   href: "http://localhost:4000/tools/gacha/index.html",    type: "primary" },
      { label: "Admin",  href: "http://localhost:4000/tools/gacha/admin.html",    type: "secondary" },
      { label: "CMS",    href: "http://localhost:4000/tools/gacha/internal.html", type: "secondary" },
      { label: "Guide",  href: "http://localhost:4000/tools/gacha/howto.html",    type: "secondary" },
    ]
  },
  {
    name: "LP Research Engine",
    desc: "LP分析・収集・研究ダッシュボード",
    icon: "🔬",
    iconBg: "#0d2040",
    status: "wip",
    tags: ["research", "lp", "analytics"],
    links: [
      { label: "Open",   href: "http://localhost:3000", type: "primary" },
    ]
  },
  {
    name: "Website Check Board",
    desc: "Webサイト修正確認ボード。誤字脱字・指摘事項をクライアントと共有管理",
    icon: "🗂",
    iconBg: "#0d2030",
    status: "active",
    tags: ["check", "client", "supabase", "next.js"],
    links: [
      { label: "Admin",  href: "http://localhost:3000/board",                   type: "primary" },
      { label: "Client", href: "http://localhost:3000/client?token=preview",    type: "secondary" },
    ]
  },
  {
    name: "EyeCare Monitor",
    desc: "YouTube・モニタリング系プロジェクト",
    icon: "👁",
    iconBg: "#0d2a20",
    status: "planning",
    tags: ["youtube", "monitor"],
    links: [
      { label: "Open",   href: "http://localhost:3000", type: "primary" },
    ]
  },
];
// ============================================================

const statusLabel = { active: "Active", wip: "WIP", paused: "Paused", planning: "Planning" };

function renderCards(list) {
  const grid = document.getElementById("grid");
  document.getElementById("count").textContent = `${list.length} project${list.length !== 1 ? "s" : ""}`;

  if (list.length === 0) {
    grid.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <p>条件に一致するプロジェクトが見つかりません</p>
      </div>`;
    return;
  }

  grid.innerHTML = list.map(p => `
    <div class="card">
      <div class="card-header">
        <div class="card-icon" style="background:${p.iconBg}">${p.icon}</div>
        <div class="card-meta">
          <div class="card-name">${esc(p.name)}</div>
          <div class="card-desc">${esc(p.desc)}</div>
        </div>
        <span class="status-badge status-${p.status}">${statusLabel[p.status] || p.status}</span>
      </div>
      ${p.tags && p.tags.length ? `
      <div class="card-tags">
        ${p.tags.map(t => `<span class="tag">${esc(t)}</span>`).join("")}
      </div>` : ""}
      <div class="card-links">
        ${p.links.map(l => `
          <a class="link-btn link-${l.type}" href="${esc(l.href)}" target="_blank" rel="noopener">
            ${linkIcon(l.label)} ${esc(l.label)}
          </a>`).join("")}
      </div>
    </div>
  `).join("");
}

function linkIcon(label) {
  const icons = {
    Site: "🌐", Admin: "⚙️", CMS: "📝", Guide: "📖", Open: "↗",
    Docs: "📄", API: "🔌", Local: "📁",
  };
  return icons[label] || "🔗";
}

function esc(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

let currentStatus = "all";

function applyFilters() {
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filtered = projects.filter(p => {
    const matchStatus = currentStatus === "all" || p.status === currentStatus;
    const matchSearch = !q ||
      p.name.toLowerCase().includes(q) ||
      p.desc.toLowerCase().includes(q) ||
      (p.tags || []).some(t => t.toLowerCase().includes(q));
    return matchStatus && matchSearch;
  });
  renderCards(filtered);
}

document.getElementById("search").addEventListener("input", applyFilters);

document.getElementById("filters").addEventListener("click", e => {
  const btn = e.target.closest(".filter-btn");
  if (!btn) return;
  document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  currentStatus = btn.dataset.status;
  applyFilters();
});

// Initial render
applyFilters();
</script>
</body>
</html>
