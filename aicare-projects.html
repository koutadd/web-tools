// ===================== INLINE EDIT =====================
let _inlineEl = null;

function startInlineEdit(projId, field, displayEl) {
  if (_inlineEl) { try { _inlineEl.blur(); } catch(e) {} }

  const p = APP.projects.find(x => String(x.id) === String(projId));
  if (!p) return;
  const val = p[field] || '';

  const onSave = (newVal) => {
    p[field] = newVal;
    save();
    _inlineEl = null;
    const rowEl = document.getElementById('proj-row-' + projId);
    if (rowEl) rowEl.outerHTML = renderProjectRow(p);
  };

  const inputStyle = 'background:#22263a;border:1px solid #f59e0b;border-radius:6px;color:#e8eaf0;padding:3px 8px;font-size:12px;outline:none;';
  let input;

  if (field === 'deadline') {
    input = document.createElement('input');
    input.type = 'date'; input.value = val;
    input.style.cssText = inputStyle + 'width:130px;';
    input.onchange = () => onSave(input.value);
    input.onblur = () => setTimeout(() => { if (_inlineEl === input) onSave(input.value); }, 200);
  } else if (field === 'waitingFor') {
    input = document.createElement('input');
    input.type = 'text'; input.value = val;
    input.placeholder = 'がく / 開発 / 鷲巣...';
    input.setAttribute('list', 'waitingFor-datalist');
    input.style.cssText = inputStyle + 'width:110px;';
    input.onblur = () => setTimeout(() => { if (_inlineEl === input) onSave(input.value); }, 200);
    input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); onSave(input.value); } };
  } else {
    input = document.createElement('input');
    input.type = 'text'; input.value = val;
    input.style.cssText = inputStyle + 'min-width:120px;max-width:200px;';
    input.onblur = () => setTimeout(() => { if (_inlineEl === input) onSave(input.value); }, 200);
    input.onkeydown = (e) => { if (e.key === 'Enter') { e.preventDefault(); onSave(input.value); } };
  }

  _inlineEl = input;
  displayEl.replaceWith(input);
  input.focus();
}

let confirmCallback = null;

function showConfirm(title, message, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  confirmCallback = cb;
  document.getElementById('confirmDialog').classList.add('open');
}

function confirmOk() {
  document.getElementById('confirmDialog').classList.remove('open');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
}

function confirmCancel() {
  document.getElementById('confirmDialog').classList.remove('open');
  confirmCallback = null;
}

function deleteProject(id) {
  const p = APP.projects.find(x => String(x.id) === String(id));
  if (!p) return;
  showConfirm('プロジェクトを削除しますか？', `「${p.name}」を削除します。この操作は取り消せません。`, () => {
    APP.projects = APP.projects.filter(proj => String(proj.id) !== String(id));
    save();
    const route = parseRoute(getHash());
    if (route.view === 'project') navigate('#/');
    else render();
  });
}

function deleteTask(projectId, taskId) {
  const p = APP.projects.find(x => String(x.id) === String(projectId));
  if (!p) return;
  const t = taskTreeFind(p.tasks||[], taskId);
  if (!t) return;
  showConfirm('タスクを削除しますか？', `「${t.name}」を削除します。`, () => {
    taskTreeRemove(p.tasks, taskId);
    save();
    document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
  });
}

let _dragTaskId = null;

function taskDragStart(e, projectId, taskId) {
  _dragTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function taskDragEnd() {
  _dragTaskId = null;
  document.querySelectorAll('.task-item').forEach(el =>
    el.classList.remove('dragging','drop-before','drop-after','drop-child'));
}

function taskDragOver(e, projectId, taskId) {
  if (taskId === _dragTaskId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  if (!el) return;
  el.classList.remove('drop-before','drop-after','drop-child');
  const rect = el.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const h = rect.height;
  if (y < h * 0.3)       { el.classList.add('drop-before'); el.dataset.dz = 'before'; }
  else if (y > h * 0.7)  { el.classList.add('drop-after');  el.dataset.dz = 'after'; }
  else                   { el.classList.add('drop-child');   el.dataset.dz = 'child'; }
}

function taskDragLeave(e, taskId) {
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  if (el && !el.contains(e.relatedTarget))
    el.classList.remove('drop-before','drop-after','drop-child');
}

function taskDrop(e, projectId, taskId) {
  e.preventDefault();
  const src = _dragTaskId;
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  const dz = el ? el.dataset.dz : 'after';
  taskDragEnd();
  if (!src || src === taskId) return;

  const p = getProjectById(projectId);
  const dragged = taskTreeRemove(p.tasks, src);
  if (!dragged) return;

  if (dz === 'child') {
    const target = taskTreeFind(p.tasks, taskId);
    if (target) { if (!target.children) target.children = []; target.children.push(dragged); }
  } else {
    taskTreeInsert(p.tasks, taskId, dragged, dz === 'before');
  }
  save();
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

function taskTreeFind(tasks, id) {
  for (const t of tasks) {
    if (t.id === id) return t;
    const f = taskTreeFind(t.children||[], id);
    if (f) return f;
  }
  return null;
}

function taskTreeRemove(tasks, id) {
  for (let i = 0; i < tasks.length; i++) {
    if (tasks[i].id === id) return tasks.splice(i, 1)[0];
    const f = taskTreeRemove(tasks[i].children||[], id);
    if (f) return f;
  }
  return null;
}

function taskTreeInsert(tasks, targetId, node, before) {
  for (let i = 0; i < tasks.length; i++) {
    if (tasks[i].id === targetId) { tasks.splice(before ? i : i+1, 0, node); return true; }
    if (taskTreeInsert(tasks[i].children||[], targetId, node, before)) return true;
  }
  return false;
}

// ===================== INIT =====================
window.addEventListener('hashchange', () => {
  taskFilter = '全て';
  render();
});

// Initial load (async for GAS support)
initializeApp();

// ── リアルタイム自動保存 ──────────────────────────────
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'hidden') { try { save(); } catch(e) {} }
});
window.addEventListener('beforeunload', () => { try { save(); } catch(e) {} });
</script>

<script>
// ══════════════════════════════════ TOUR ══════════════════════════════════
const TOUR_STEPS = [
  {
    id: null,
    title: '👋 プロジェクト管理ツールの使い方',
    body: 'アイケアラボの全プロジェクトをここで管理します。<br>各機能をステップごとに体験してみましょう。',
    tip: null,
    pos: 'center',
  },
  {
    id: 'tour-stats',
    title: '📊 ステータス概要',
    body: 'プロジェクトの状態別件数が一目でわかります。<br><b style="color:#3b82f6">進行中</b> · <b style="color:#f59e0b">要確認</b> · <b style="color:#6b7280">未着手</b> が主要指標です。',
    tip: null,
    pos: 'bottom',
  },
  {
    id: 'section-today',
    title: '🔥 今日の優先対応',
    body: '<b style="color:#ef4444">期限3日以内</b> · 要確認 · こうた待ち · 他メンバー待ちのプロジェクトが自動表示されます。<br>毎朝ここから確認しましょう。',
    tip: 'データを保存するたびにリアルタイムで自動更新されます',
    pos: 'bottom',
  },
  {
    id: 'section-blockers',
    title: '⛔ 詰まり一覧',
    body: '誰待ち・何が詰まっているかを一覧できます。<br>上のボタンで担当者別にフィルタリングできます。',
    tip: 'プロジェクト編集の「誰待ち」「今の詰まり」フィールドから入力します',
    pos: 'bottom',
  },
  {
    id: 'section-projlist',
    title: '📋 全プロジェクト一覧（インライン編集）',
    body: '各列は<b style="color:#f59e0b">クリックして直接編集</b>できます。<br>・ステータス・優先度 → ドロップダウン<br>・担当者・期限・次アクション → クリックして直接入力<br>変更は<b style="color:#10b981">自動保存</b>されます。',
    tip: 'プロジェクト名をクリックすると詳細ページへ移動します',
    pos: 'top',
  },
  {
    id: 'section-shortcuts',
    title: '👥 担当者ショートカット',
    body: 'ボタンをクリックすると、<b style="color:#f59e0b">その担当者の最初のプロジェクト</b>までスクロールしてハイライト表示します。',
    tip: null,
    pos: 'top',
  },
  {
    id: 'section-categories',
    title: '🏷 カテゴリ一覧',
    body: 'カテゴリ別の件数・状態の内訳が確認できます。<br>カードをクリックするとそのカテゴリの詳細ページへ移動します。',
    tip: null,
    pos: 'top',
  },
  {
    id: null,
    title: '📝 プロジェクト詳細ページ',
    body: 'プロジェクト名をクリックすると詳細画面が開きます。<br>・タスクをタップ → 詳細展開<br>・<b style="color:#f59e0b">☑ 一括選択</b> → 複数タスクの担当者をまとめて変更<br>・ドラッグ&ドロップでタスクを並び替え',
    tip: '全体スケジュールページではガントチャートでプロジェクト状況を確認できます',
    pos: 'center',
  },
  {
    id: null,
    title: '✅ 準備完了！',
    body: '右上の <b style="color:#f59e0b">❓ 使い方ガイド</b> ボタンからいつでもこのガイドを再表示できます。<br><br>さっそく使ってみましょう！',
    tip: null,
    pos: 'center',
    isLast: true,
  },
];

let _tourIdx = 0;

function startTour() {
  // Ensure we're on the dashboard
  if (location.hash && location.hash !== '#/' && location.hash !== '#') {
    navigate('#/');
    setTimeout(startTour, 150);
    return;
  }
  _tourIdx = 0;
  document.getElementById('tour-overlay').classList.add('active');
  _showTourStep(0, false);
}

function endTour() {
  document.getElementById('tour-overlay').classList.remove('active');
  document.getElementById('tour-backdrop').style.display = 'none';
  document.getElementById('tour-spotlight').style.opacity = '0';
}

function nextTourStep() {
  if (_tourIdx < TOUR_STEPS.length - 1) {
    _advanceTour(_tourIdx + 1);
  } else {
    endTour();
  }
}

function prevTourStep() {
  if (_tourIdx > 0) _advanceTour(_tourIdx - 1);
}

function jumpTourStep(idx) { _advanceTour(idx); }

function _advanceTour(idx) {
  const card = document.getElementById('tour-card');
  card.classList.add('tour-fade-out');
  setTimeout(() => {
    card.classList.remove('tour-fade-out');
    _tourIdx = idx;
    _showTourStep(idx, true);
  }, 180);
}

function _showTourStep(idx, animate) {
  const step = TOUR_STEPS[idx];
  const spotlight = document.getElementById('tour-spotlight');
  const backdrop  = document.getElementById('tour-backdrop');
  const card      = document.getElementById('tour-card');

  _renderTourCard(step, idx);

  if (step.id) {
    const el = document.getElementById(step.id);
    if (el) {
      backdrop.style.display = 'none';
      // Scroll into view, then position spotlight
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const delay = animate ? 200 : 80;
      setTimeout(() => _positionSpotlight(el, step, card, spotlight), delay);
    } else {
      // Target not in DOM — show as center step
      backdrop.style.display = 'block';
      spotlight.style.opacity = '0';
      _positionCardCenter(card);
    }
  } else {
    backdrop.style.display = 'block';
    spotlight.style.opacity = '0';
    _positionCardCenter(card);
  }
}

function _positionSpotlight(el, step, card, spotlight) {
  const pad = 10;
  const r = el.getBoundingClientRect();
  spotlight.style.top    = (r.top  - pad) + 'px';
  spotlight.style.left   = (r.left - pad) + 'px';
  spotlight.style.width  = (r.width  + pad * 2) + 'px';
  spotlight.style.height = (r.height + pad * 2) + 'px';
  spotlight.style.opacity = '1';
  _positionCardNear(r, step.pos, card);
}

function _positionCardCenter(card) {
  card.style.top = '50%';
  card.style.left = '50%';
  card.style.transform = 'translate(-50%, -50%)';
}

function _positionCardNear(r, pref, card) {
  const cw = 360, ch = 230; // approx card size
  const winW = window.innerWidth, winH = window.innerHeight;
  const pad = 16, navH = 52;
  let top, left;

  // Determine vertical position
  const spaceBelow = winH - r.bottom - 20;
  const spaceAbove = r.top - navH - 20;

  if (pref === 'bottom' && spaceBelow >= ch) {
    top = r.bottom + 16;
  } else if (pref === 'top' && spaceAbove >= ch) {
    top = r.top - ch - 16;
  } else if (spaceBelow >= ch) {
    top = r.bottom + 16;
  } else if (spaceAbove >= ch) {
    top = r.top - ch - 16;
  } else {
    top = Math.max(navH + pad, Math.min(r.top, winH - ch - pad));
  }

  // Horizontal: align with spotlight, clamped to viewport
  left = Math.max(pad, Math.min(r.left, winW - cw - pad));

  card.style.top  = Math.max(navH + pad, top) + 'px';
  card.style.left = left + 'px';
  card.style.transform = 'none';
}

function _renderTourCard(step, idx) {
  const total = TOUR_STEPS.length;
  const card = document.getElementById('tour-card');

  const dots = TOUR_STEPS.map((_, i) =>
    `<div class="tc-dot${i === idx ? ' on' : ''}" onclick="jumpTourStep(${i})" title="${i+1}ステップ目"></div>`
  ).join('');

  card.innerHTML = `
    <div class="tc-header">
      <div class="tc-title">${step.title}</div>
      <button class="tc-close" onclick="endTour()" title="閉じる">✕</button>
    </div>
    <div class="tc-body">${step.body}</div>
    ${step.tip ? `<div class="tc-tip">${step.tip}</div>` : ''}
    <div class="tc-footer">
      <div class="tc-dots">${dots}</div>
      <div class="tc-nav">
        ${idx > 0 ? `<button class="tc-prev" onclick="prevTourStep()">← 前へ</button>` : ''}
        <span class="tc-count">${idx + 1} / ${total}</span>
        <button class="tc-next" onclick="${step.isLast ? 'endTour()' : 'nextTourStep()'}">${step.isLast ? '完了 ✓' : '次へ →'}</button>
      </div>
    </div>`;
}

// Close on backdrop click
document.getElementById('tour-backdrop').addEventListener('click', endTour);
// ESC key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && document.getElementById('tour-overlay').classList.contains('active')) endTour();
});
</script>
