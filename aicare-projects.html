<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロジェクト管理 | eye care lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================== COMMON NAV ===================== */
#aicare-common-nav {
  position: sticky; top: 0; z-index: 99999;
  background: #040c18;
  border-bottom: 1px solid rgba(245,158,11,0.18);
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px; height: 42px; min-height: 42px; max-height: 42px;
  overflow-x: auto; overflow-y: hidden;
  flex-wrap: nowrap; white-space: nowrap;
  scrollbar-width: none; -ms-overflow-style: none;
  font-family: 'DM Mono', 'SF Mono', monospace; font-size: 11px; letter-spacing: 0.05em;
  box-sizing: border-box;
}
#aicare-common-nav::-webkit-scrollbar { display: none; }
#aicare-common-nav > * { flex-shrink: 0; }
#aicare-common-nav .cn-label { color: rgba(255,255,255,0.25); font-size: 10px; letter-spacing: 0.1em; padding-right: 4px; }
#aicare-common-nav .cn-sep { color: rgba(255,255,255,0.15); padding: 0 2px; user-select: none; }
#aicare-common-nav a { color: rgba(148,163,184,0.85); text-decoration: none; padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(148,163,184,0.12); transition: color 0.15s, background 0.15s; white-space: nowrap; }
#aicare-common-nav a:hover { color: #e2eaf4; background: rgba(255,255,255,0.06); }
#aicare-common-nav a.cn-active { color: #f59e0b !important; border-color: rgba(245,158,11,0.35) !important; background: rgba(245,158,11,0.08) !important; }

/* ===================== DESIGN SYSTEM ===================== */
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #22263a;
  --border: #2e3350;
  --text: #e8eaf0;
  --muted: #6b7280;
  --accent: #f59e0b;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ===================== LAYOUT ===================== */
.page-container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

@media (max-width: 768px) {
  .page-container { padding: 20px 16px 60px; }
}

/* ===================== TYPOGRAPHY ===================== */
.page-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.page-desc {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 32px;
}

.section-title {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===================== CARDS ===================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}

/* ===================== GRIDS ===================== */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(3, 1fr); }
  .grid-5 { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
}

/* ===================== BADGES ===================== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.04em;
  white-space: nowrap;
}

.status-未着手 { background: rgba(107,114,128,0.18); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }
.status-進行中 { background: rgba(59,130,246,0.18); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
.status-完了   { background: rgba(16,185,129,0.18); color: #34d399; border: 1px solid rgba(16,185,129,0.3); }
.status-要確認 { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.status-保留   { background: rgba(139,92,246,0.18); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

.priority-最優先 { background: rgba(239,68,68,0.18); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
.priority-高     { background: rgba(249,115,22,0.18); color: #fb923c; border: 1px solid rgba(249,115,22,0.3); }
.priority-中     { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
.priority-低     { background: rgba(107,114,128,0.18); color: #9ca3af; border: 1px solid rgba(107,114,128,0.3); }

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #0f1117;
}
.btn-primary:hover { background: #d97706; }

.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface2); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
  padding: 5px 10px;
}
.btn-ghost:hover { color: var(--text); background: var(--surface2); }

.btn-danger {
  background: transparent;
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.3);
}
.btn-danger:hover { background: rgba(239,68,68,0.1); }

.btn-sm {
  padding: 4px 11px;
  font-size: 12px;
}

/* ===================== STAT CARDS ===================== */
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: center;
}
.stat-card .stat-num {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card .stat-label {
  font-size: 12px;
  color: var(--muted);
}

/* ===================== CATEGORY CARDS ===================== */
.category-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.category-card:hover {
  transform: translateY(-2px);
  border-color: rgba(245,158,11,0.3);
}
.category-card .cat-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
}
.category-card .cat-icon { font-size: 28px; margin-bottom: 10px; }
.category-card .cat-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.category-card .cat-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.category-card .cat-count { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.category-card .cat-count span { font-weight: 700; color: var(--text); }

/* ===================== PROJECT CARDS ===================== */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
  transition: border-color 0.15s;
}
.project-card:hover { border-color: rgba(245,158,11,0.4); transform: translateY(-1px); }
.project-card { cursor: pointer; }
.project-card .proj-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.project-card .proj-name {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.4;
}
.project-card .proj-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.project-card .proj-purpose {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.5;
}
.project-card .proj-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
}
.project-card .proj-meta span { display: flex; align-items: center; gap: 4px; }
.project-card .proj-deliverables {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--border);
  line-height: 1.5;
}
.project-card .proj-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===================== INLINE STATUS DROPDOWN ===================== */
.status-dropdown-wrap {
  position: relative;
  display: inline-block;
}
.status-dropdown-wrap .status-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: #1e2236;
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 100;
  min-width: 110px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
}
.status-dropdown-wrap.open .status-menu { display: block; }
.status-dropdown-wrap .status-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  background: none;
  border: none;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.1s;
}
.status-dropdown-wrap .status-menu button:hover { background: var(--surface2); }

/* ===================== TASK LIST ===================== */
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.task-item:hover { border-color: rgba(245,158,11,0.2); }
.task-item .task-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
}
.task-item .task-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.task-item .task-actions {
  display: flex;
  gap: 4px;
}

/* ===================== FILTER BAR ===================== */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
}
.filter-btn:hover { color: var(--text); background: var(--surface2); }
.filter-btn.active { background: var(--accent); color: #0f1117; border-color: var(--accent); }

/* ===================== TAB BAR ===================== */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: color 0.15s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ===================== BACK BUTTON ===================== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  margin-bottom: 24px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }

/* ===================== MODAL ===================== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: #1a1d27;
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
}
.modal-card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }

/* ===================== FORM ===================== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: rgba(245,158,11,0.5);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: #1a1d27; }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ===================== CONFIRM DIALOG ===================== */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 20000;
  align-items: center;
  justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-card {
  background: #1a1d27;
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}
.confirm-card h4 { font-size: 17px; margin-bottom: 10px; }
.confirm-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ===================== INFO SECTION ===================== */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }
.info-item { }
.info-item .info-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 600;
}
.info-item .info-value {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}
.info-item.full { grid-column: 1 / -1; }
.info-block {
  background: var(--surface2);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  min-height: 40px;
}

/* ===================== URGENT SECTION ===================== */
.urgent-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: border-color 0.15s;
  cursor: pointer;
}
.urgent-item:hover { border-color: rgba(245,158,11,0.3); }
.urgent-item .urgent-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.urgent-item .urgent-content { flex: 1; }
.urgent-item .urgent-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.urgent-item .urgent-meta { font-size: 12px; color: var(--muted); }

/* ===================== PRIORITY PROJECTS ===================== */
.priority-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.priority-row:hover { border-color: rgba(245,158,11,0.3); }
.priority-row .pr-name { flex: 1; font-size: 14px; font-weight: 600; }
.priority-row .pr-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.priority-row .pr-cat { font-size: 11px; color: var(--muted); }

/* ===================== HEADER INFO BAR ===================== */
.proj-header-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 24px;
}
.proj-header-bar .phb-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.proj-header-bar .phb-name {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.3;
}
.proj-header-bar .phb-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.proj-header-bar .phb-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 13px;
  color: var(--muted);
}
.proj-header-bar .phb-meta span { display: flex; align-items: center; gap: 5px; }

/* ===================== ROLES CARD ===================== */
.roles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.role-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.role-item .role-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.role-item .role-person { font-size: 14px; font-weight: 600; }

/* ===================== EMPTY STATE ===================== */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3e4570; }

/* ===================== TRANSITIONS ===================== */
#app { animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.section-block { margin-bottom: 40px; }

/* ===================== DRAG & DROP ===================== */
.task-item { position: relative; }
.task-drag-handle { cursor: grab; color: #6b7280; padding: 0 6px; font-size: 16px; user-select: none; flex-shrink: 0; }
.task-item.dragging { opacity: 0.35; }
.task-item.drop-before::before { content:''; position:absolute; top:-2px; left:0; right:0; height:3px; background:#60a5fa; border-radius:2px; z-index:10; }
.task-item.drop-after::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:3px; background:#60a5fa; border-radius:2px; z-index:10; }
.task-item.drop-child { border-color:#a78bfa !important; background:#2d1f4e !important; }
.task-children { margin-left:28px; margin-top:6px; padding-left:12px; border-left:2px solid #374151; }
.task-children .task-item { background:#16162a; }

</style>
</head>

<!-- Main App -->
<div id="app"></div>

<!-- Project Edit Modal -->
<div class="modal-overlay" id="projectModal">
  <div class="modal-card">

// ===================== STORAGE =====================
const STORAGE_KEY = 'aicare-projects-v1';
const API_URL     = '/api/data';

function showSaveIndicator(msg, color) {
  let el = document.getElementById('saveIndicator');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || '#4ade80';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function ensureChildren(tasks) {
  (tasks||[]).forEach(t => { if (!t.children) t.children = []; ensureChildren(t.children); });
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.projects && Array.isArray(d.projects)) {
        // Ensure roles exists even if missing from old data
        if (!d.roles) d.roles = JSON.parse(JSON.stringify(DEFAULT_ROLES));
        if (!d.categories) d.categories = JSON.parse(JSON.stringify(CATEGORIES));
        d.projects.forEach(p => ensureChildren(p.tasks));
        return d;
      }
    }
  } catch(e) {}
  return null;
}

  const projects = DEFAULT_PROJECTS.map(p => ({
    ...p,
    tasks: makeDefaultTasks(p.id)
  }));
  const data = { projects, roles: JSON.parse(JSON.stringify(DEFAULT_ROLES)), categories: JSON.parse(JSON.stringify(CATEGORIES)), updatedAt: 0 };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  return data;
}

let _saveTimer = null;
function saveData(data) {
  data.updatedAt = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showSaveIndicator('💾 保存中…', '#facc15');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(r => r.ok ? showSaveIndicator('☁️ 保存済み', '#4ade80') : showSaveIndicator('⚠️ 保存失敗', '#f87171'))
      .catch(() => showSaveIndicator('⚠️ 保存失敗', '#f87171'));
  }, 500);
}

let APP = null;

function initializeApp() {
  // Render immediately from localStorage (no waiting)
  APP = loadLocal() || initData();
  if (!window.location.hash || window.location.hash === '#') window.location.hash = '#/';
  render();
  // Background cloud sync (doesn't block rendering)
  syncFromCloud();
}

async function syncFromCloud() {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(API_URL + '?t=' + Date.now(), { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) return;
    const data = await res.json();
    if (!data || !data.projects || !Array.isArray(data.projects) || !data.roles) return;
    // Use cloud data if it's newer than local (timestamp-based, cloud wins on tie)
    const cloudTs = data.updatedAt || 0;
    const localTs = APP.updatedAt || 0;
    if (cloudTs < localTs) return;
    const cloudJson = JSON.stringify(data);
    if (JSON.stringify(APP) !== cloudJson) {
      APP = data;
      localStorage.setItem(STORAGE_KEY, cloudJson);
      render();
      showSaveIndicator('☁️ 同期完了', '#60a5fa');
    }
  } catch(e) { /* cloud sync failed silently */ }
}

function getProjects() { return APP.projects; }
function getRoles()    { return APP.roles || DEFAULT_ROLES; }
function save()        { saveData(APP); }

// ===================== ROUTING =====================
function getHash() {
  return window.location.hash || '#/';
}

function navigate(path) {
  window.location.hash = path;
}

function parseRoute(hash) {
  const h = hash.replace(/^#/, '') || '/';
  if (h === '/' || h === '') return { view: 'dashboard' };

  const catMatch = h.match(/^\/category\/([^/]+)$/);
  if (catMatch) return { view: 'category', slug: catMatch[1] };

  const projTaskMatch = h.match(/^\/project\/(\d+)\/tasks$/);
  if (projTaskMatch) return { view: 'project', id: parseInt(projTaskMatch[1]), tab: 'tasks' };

  const projMatch = h.match(/^\/project\/(\d+)$/);
  if (projMatch) return { view: 'project', id: parseInt(projMatch[1]), tab: 'tasks' };

  if (h === '/members') return { view: 'members' };

  return { view: 'dashboard' };
}

// ===================== RENDER DISPATCH =====================
function render() {
  const route = parseRoute(getHash());
  const app = document.getElementById('app');
  if (!app) return;
  try {
    closeAllDropdowns();
    if (route.view === 'dashboard') {
      app.innerHTML = renderDashboard();
    } else if (route.view === 'category') {
      app.innerHTML = renderCategory(route.slug);
    } else if (route.view === 'project') {
      app.innerHTML = renderProject(route.id, route.tab);
      initProjectTabs(route.id);
    } else if (route.view === 'members') {
      app.innerHTML = renderMembers();
    }
  } catch(e) {
    app.innerHTML = `<div style="padding:40px;color:#f87171;font-size:13px;"><b>描画エラー:</b> ${e.message}<br><pre style="margin-top:8px;font-size:11px;color:#9ca3af;">${e.stack}</pre></div>`;
    console.error('render error:', e);
  }
}

// ===================== HELPERS =====================
function getCategories() { return (APP && APP.categories) ? APP.categories : CATEGORIES; }
function getCategoryById(id) {
  return getCategories().find(c => c.id === id) || { name: id, icon: '📁', color: '#6b7280', desc: '' };
}

function getProjectById(id) {
  return APP.projects.find(p => p.id === id);
}

function statusBadge(status) {
  return `<span class="badge status-${status}">${status}</span>`;
}

function priorityBadge(priority) {
  return `<span class="badge priority-${priority}">${priority}</span>`;
}

function catBadge(categoryId) {
  const cat = getCategoryById(categoryId);
  return `<span class="badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.icon} ${cat.name}</span>`;
}

function priorityOrder(p) {
  return { '最優先': 0, '高': 1, '中': 2, '低': 3 }[p] ?? 9;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr);
  return Math.ceil((d - now) / 86400000);
}

function truncate(str, n) {
  if (!str) return '—';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

// ===================== MEMBERS VIEW =====================
function renderMembers() {
  const projects = getProjects();

  // プロジェクトを assignee で分類（カンマ区切りも分割）
  const grouped = {};
  projects.forEach(p => {
    const names = (p.assignee || '未設定').split(/[、,，\s]+/).map(n => n.trim()).filter(Boolean);
    names.forEach(name => {
      if (!grouped[name]) grouped[name] = [];
      grouped[name].push(p);
    });
  });

  const people = Object.keys(grouped).sort();

  const sections = people.map(person => {
    const projs = grouped[person];
    const done  = projs.filter(p => p.status === '完了').length;
    const doing = projs.filter(p => p.status === '進行中').length;
    const todo  = projs.filter(p => p.status === '未着手').length;

    // タスク一覧（担当者 assignee が一致するもの）
    const tasks = [];
    projects.forEach(p => {
      (p.tasks||[]).forEach(t => {
        if (t.assignee === person) tasks.push({ task: t, project: p });
      });
    });

    const rows = projs.map(p => {
      const cat = getCategoryById(p.categoryId);
      const d = daysUntil(p.deadline);
      const dlLabel = d === null ? '' : d < 0 ? `<span style="color:#ef4444;font-size:11px;">超過${Math.abs(d)}日</span>` : d <= 7 ? `<span style="color:#f59e0b;font-size:11px;">あと${d}日</span>` : `<span style="color:var(--muted);font-size:11px;">${formatDate(p.deadline)}</span>`;
      return `
      <div class="priority-row" onclick="navigate('#/project/${p.id}')" style="cursor:pointer;">
        <div class="pr-name">${p.name}</div>
        <div class="pr-meta">
          ${priorityBadge(p.priority)}
          ${statusBadge(p.status)}
          <span style="color:${cat.color};font-size:12px;">${cat.icon} ${cat.name}</span>
          ${dlLabel}
        </div>
      </div>`;
    }).join('');

    const taskRows = tasks.length ? `
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">担当タスク（${tasks.length}件）</div>
        ${tasks.map(({task, project}) => `
          <div class="priority-row" onclick="navigate('#/project/${project.id}')" style="cursor:pointer;">
            <div class="pr-name" style="font-size:12px;">📌 ${task.name}</div>
            <div class="pr-meta">
              <span style="font-size:11px;color:var(--muted);">${project.name}</span>
              ${statusBadge(task.status)}
            </div>
          </div>`).join('')}
      </div>` : '';

    // この人が担当しているロールを取得
    const roles = getRoles();
    const personRoles = Object.values(roles).filter(r =>
      (r.person || '').split(/[、,，\s]+/).map(s => s.trim()).includes(person)
    );

    return `
    <div class="card" style="margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div style="width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#4f7cff,#7c4fff);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">${person.slice(0,1)}</div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div style="font-size:16px;font-weight:700;">${person}</div>
            ${personRoles.map(r => `<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:#3b4f8422;color:#93c5fd;border:1px solid #3b4f8444;">${r.label}</span>`).join('')}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">プロジェクト ${projs.length}件 &nbsp;·&nbsp; 進行中 ${doing} &nbsp;·&nbsp; 完了 ${done} &nbsp;·&nbsp; 未着手 ${todo}</div>
        </div>
      </div>
      ${rows}
      ${taskRows}
    </div>`;
  }).join('');

  return `
<div class="page-container">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <button class="back-btn" onclick="navigate('#/')">← ダッシュボードへ</button>
    <h1 class="page-title" style="margin:0;">担当者別</h1>
    <span style="color:var(--muted);font-size:13px;">${people.length} 名 · ${projects.length} プロジェクト</span>
  </div>
  ${sections || '<div class="empty-state"><div class="empty-icon">👤</div><p>担当者情報がありません</p></div>'}
</div>`;
}

// ===================== CSV EXPORT =====================
function exportCSV() {
  const projects = getProjects();
  const rows = [
    ['ID','カテゴリ','プロジェクト名','目的','ステータス','優先度','締切','担当者','メンバー','成果物','概要','備考']
  ];
  projects.forEach(p => {
    const cat = getCategoryById(p.categoryId);
    rows.push([
      p.id,
      cat.name,
      p.name,
      p.purpose || '',
      p.status,
      p.priority,
      p.deadline || '',
      p.assignee || '',
      p.members || '',
      p.deliverables || '',
      p.overview || '',
      p.notes || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `aicare-projects-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function initProjectTabs(id) {
  // tabs handled via onclick
}

function switchTab(id, tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const p = getProjectById(id);
  document.getElementById('tab-content').innerHTML = renderTabContent(p, tab);
}

function renderTabContent(p, tab) {
  if (tab === 'tasks') return renderTaskTab(p);
  if (tab === 'deliverables') return renderDeliverablesTab(p);
  return '';
}

let taskFilter = '全て';
let taskSort = '優先度順';

function renderTaskTab(p) {
  const statuses = ['全て','未着手','進行中','完了','要確認','保留'];
  let tasks = p.tasks || [];

  if (taskFilter !== '全て') tasks = tasks.filter(t => t.status === taskFilter);

  if (taskSort === '優先度順') tasks = [...tasks].sort((a,b) => priorityOrder(a.priority)-priorityOrder(b.priority));
  else if (taskSort === '期限順') tasks = [...tasks].sort((a,b) => {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return new Date(a.deadline) - new Date(b.deadline);
  });

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div class="filter-bar" style="margin-bottom:0;">
        ${statuses.map(s => `<button class="filter-btn ${taskFilter===s?'active':''}" onclick="setTaskFilter(${p.id},'${s}')">${s}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <select onchange="setTaskSort(${p.id},this.value)" style="padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;">
          <option ${taskSort==='優先度順'?'selected':''}>優先度順</option>
          <option ${taskSort==='期限順'?'selected':''}>期限順</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openTaskModal(${p.id}, null)">＋ タスク追加</button>
      </div>
    </div>
    ${tasks.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><p>タスクがありません</p></div>` :
      tasks.map(t => renderTaskItem(p.id, t)).join('')
    }
  </div>`;
}

function renderTaskItem(projectId, t, isChild) {
  const children = t.children || [];
  const childrenHtml = children.length > 0
    ? `<div class="task-children">${children.map(c => renderTaskItem(projectId, c, true)).join('')}</div>`
    : '';
  return `
  <div class="task-item" data-task-id="${t.id}" data-project-id="${projectId}"
       id="task-item-${t.id.replace(/\W/g,'_')}"
       draggable="true"
       ondragstart="taskDragStart(event,${projectId},'${t.id}')"
       ondragover="taskDragOver(event,${projectId},'${t.id}')"
       ondragleave="taskDragLeave(event,'${t.id}')"
       ondrop="taskDrop(event,${projectId},'${t.id}')"
       ondragend="taskDragEnd()">
    <span class="task-drag-handle">⠿</span>
    <div>
      <div class="status-dropdown-wrap" id="tsdw-${t.id.replace(/\W/g,'_')}">
        <span class="badge status-${t.status}" style="cursor:pointer;font-size:10px;" onclick="toggleTaskStatusDropdown(event,'${t.id}',${projectId})">${t.status} ▾</span>
        <div class="status-menu">
          ${['未着手','進行中','完了','要確認','保留'].map(s => `<button onclick="quickChangeTaskStatus('${t.id}',${projectId},'${s}')">${s}</button>`).join('')}
        </div>
      </div>
    </div>
    <div class="task-name">${t.name}</div>
    <div class="task-meta">
      ${priorityBadge(t.priority)}
      ${t.assignee ? `<span>👤 ${t.assignee}</span>` : ''}
      ${t.deadline ? `<span>📅 ${formatDate(t.deadline)}</span>` : ''}
    </div>
    <div class="task-actions">
      <button class="btn btn-ghost btn-sm" onclick="openTaskModal(${projectId},'${t.id}')">✏️</button>
      <button class="btn btn-danger btn-sm" onclick="deleteTask(${projectId},'${t.id}')">🗑</button>
    </div>
  </div>${childrenHtml}`;
}

function renderDeliverablesTab(p) {
  if (!p.deliverables) return `<div class="empty-state"><div class="empty-icon">📦</div><p>成果物が設定されていません</p></div>`;
  const items = p.deliverables.split(/[、,，\n]/).map(s => s.trim()).filter(Boolean);
  return `
  <div class="card">
    <div class="section-title">成果物一覧</div>
    ${items.map(item => `
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
        <span style="color:var(--accent);">▸</span>
        <span>${item}</span>
      </div>

}

  const p = getProjectById(projectId);
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

function setTaskSort(projectId, s) {

// ===================== STATUS DROPDOWN =====================
let openDropdown = null;

function closeAllDropdowns() {
  document.querySelectorAll('.status-dropdown-wrap.open').forEach(el => el.classList.remove('open'));
  openDropdown = null;
}

function toggleStatusDropdown(e, projectId) {
  e.stopPropagation();
  const el = document.getElementById(`sdw-${projectId}`);
  if (!el) return;
  const wasOpen = el.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen) { el.classList.add('open'); openDropdown = el; }
}

function toggleTaskStatusDropdown(e, taskId, projectId) {
  e.stopPropagation();
  const safeId = taskId.replace(/[^a-z0-9]/gi,'_');
  const el = document.getElementById(`tsdw-${safeId}`);
  if (!el) return;
  const wasOpen = el.classList.contains('open');
  closeAllDropdowns();
  if (!wasOpen) { el.classList.add('open'); openDropdown = el; }
}

document.addEventListener('click', () => closeAllDropdowns());

function quickChangeStatus(projectId, newStatus) {
  const p = APP.projects.find(p => p.id === projectId);
  if (p) { p.status = newStatus; save(); }
  closeAllDropdowns();
  // Re-render current view
  const route = parseRoute(getHash());
  if (route.view === 'category') {
    render();
  } else {
    // update badge in place
    const sdw = document.getElementById(`sdw-${projectId}`);
    if (sdw) {
      const badge = sdw.querySelector('.badge');
      if (badge) {
        badge.className = `badge status-${newStatus}`;
        badge.textContent = `${newStatus} ▾`;
      }
    }
  }
}

function quickChangeTaskStatus(taskId, projectId, newStatus) {
  const p = APP.projects.find(p => p.id === projectId);
  if (!p) return;
  const t = taskTreeFind(p.tasks||[], taskId);
  if (t) { t.status = newStatus; save(); }
  closeAllDropdowns();
  // Re-render task tab
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

function saveProject(e) {
  e.preventDefault();
  const id = editingProjectId;

  const data = {
    name: document.getElementById('pf-name').value.trim(),
    categoryId: document.getElementById('pf-categoryId').value,
    status: document.getElementById('pf-status').value,
    priority: document.getElementById('pf-priority').value,
    deadline: document.getElementById('pf-deadline').value,
    assignee: document.getElementById('pf-assignee').value.trim(),
    members: document.getElementById('pf-members').value.trim(),
    purpose: document.getElementById('pf-purpose').value.trim(),
    deliverables: document.getElementById('pf-deliverables').value.trim(),
    overview: document.getElementById('pf-overview').value.trim(),
    background: document.getElementById('pf-background').value.trim(),
    completionCriteria: document.getElementById('pf-completionCriteria').value.trim(),
    notes: document.getElementById('pf-notes').value.trim(),
  };

  if (id) {
    const idx = APP.projects.findIndex(p => p.id === id);
    if (idx !== -1) Object.assign(APP.projects[idx], data);
  } else {
    const newId = Math.max(0, ...APP.projects.map(p => p.id)) + 1;
    APP.projects.push({ id: newId, leadRole: 'brand', ...data, tasks: makeDefaultTasks(newId) });
  }

  save();
  closeProjectModal();
  render();
}

function openTaskModal(projectId, taskId) {
  const modal = document.getElementById('taskModal');
  const title = document.getElementById('taskModalTitle');

  document.getElementById('tf-projectId').value = projectId;
  document.getElementById('tf-taskId').value = taskId || '';

  if (taskId) {
    const p = getProjectById(projectId);
    const t = taskTreeFind(p.tasks||[], taskId);
    if (!t) return;
    title.textContent = 'タスク編集';
    document.getElementById('tf-name').value = t.name || '';
    document.getElementById('tf-status').value = t.status || '未着手';
    document.getElementById('tf-priority').value = t.priority || '中';
    document.getElementById('tf-assignee').value = t.assignee || '';
    document.getElementById('tf-deadline').value = t.deadline || '';
    document.getElementById('tf-notes').value = t.notes || '';
  } else {
    title.textContent = 'タスク追加';
    document.getElementById('taskForm').reset();
    document.getElementById('tf-projectId').value = projectId;
  }

  modal.classList.add('open');
}

function closeTaskModal() {
  document.getElementById('taskModal').classList.remove('open');
}

function saveTask(e) {
  e.preventDefault();
  const projectId = parseInt(document.getElementById('tf-projectId').value);
  const taskId = document.getElementById('tf-taskId').value;

  const data = {
    name: document.getElementById('tf-name').value.trim(),
    status: document.getElementById('tf-status').value,
    priority: document.getElementById('tf-priority').value,
    assignee: document.getElementById('tf-assignee').value.trim(),
    deadline: document.getElementById('tf-deadline').value,
    notes: document.getElementById('tf-notes').value.trim(),
  };

  const p = APP.projects.find(p => p.id === projectId);
  if (!p) return;
  if (!p.tasks) p.tasks = [];

  if (taskId) {
    const t = taskTreeFind(p.tasks, taskId);
    if (t) Object.assign(t, data);
  } else {
    const newTaskId = `${projectId}-${Date.now()}`;
    p.tasks.push({ id: newTaskId, ...data, children: [] });
  }

  save();
  closeTaskModal();
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

let confirmCallback = null;

function showConfirm(title, message, cb) {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmMessage').textContent = message;
  confirmCallback = cb;
  document.getElementById('confirmDialog').classList.add('open');
}

function confirmOk() {
  document.getElementById('confirmDialog').classList.remove('open');
  if (confirmCallback) confirmCallback();
  confirmCallback = null;
}

function confirmCancel() {
  document.getElementById('confirmDialog').classList.remove('open');
  confirmCallback = null;
}

function deleteProject(id) {
  const p = getProjectById(id);
  if (!p) return;
  showConfirm('プロジェクトを削除しますか？', `「${p.name}」を削除します。この操作は取り消せません。`, () => {
    APP.projects = APP.projects.filter(proj => proj.id !== id);
    save();
    // Navigate to category or dashboard
    const route = parseRoute(getHash());
    if (route.view === 'project') navigate(`#/category/${p.categoryId}`);
    else render();
  });
}

function deleteTask(projectId, taskId) {
  const p = getProjectById(projectId);
  if (!p) return;
  const t = taskTreeFind(p.tasks||[], taskId);
  if (!t) return;
  showConfirm('タスクを削除しますか？', `「${t.name}」を削除します。`, () => {
    taskTreeRemove(p.tasks, taskId);
    save();
    document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
  });
}

// ===================== DRAG & DROP =====================
let _dragTaskId = null;

function taskDragStart(e, projectId, taskId) {
  _dragTaskId = taskId;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => {
    const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
    if (el) el.classList.add('dragging');
  }, 0);
}

function taskDragEnd() {
  _dragTaskId = null;
  document.querySelectorAll('.task-item').forEach(el =>
    el.classList.remove('dragging','drop-before','drop-after','drop-child'));
}

function taskDragOver(e, projectId, taskId) {
  if (taskId === _dragTaskId) return;
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  if (!el) return;
  el.classList.remove('drop-before','drop-after','drop-child');
  const rect = el.getBoundingClientRect();
  const y = e.clientY - rect.top;
  const h = rect.height;
  if (y < h * 0.3)       { el.classList.add('drop-before'); el.dataset.dz = 'before'; }
  else if (y > h * 0.7)  { el.classList.add('drop-after');  el.dataset.dz = 'after'; }
  else                   { el.classList.add('drop-child');   el.dataset.dz = 'child'; }
}

function taskDragLeave(e, taskId) {
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  if (el && !el.contains(e.relatedTarget))
    el.classList.remove('drop-before','drop-after','drop-child');
}

function taskDrop(e, projectId, taskId) {
  e.preventDefault();
  const src = _dragTaskId;
  const el = document.querySelector(`[data-task-id="${CSS.escape(taskId)}"]`);
  const dz = el ? el.dataset.dz : 'after';
  taskDragEnd();
  if (!src || src === taskId) return;

  const p = getProjectById(projectId);
  const dragged = taskTreeRemove(p.tasks, src);
  if (!dragged) return;

  if (dz === 'child') {
    const target = taskTreeFind(p.tasks, taskId);
    if (target) { if (!target.children) target.children = []; target.children.push(dragged); }
  } else {
    taskTreeInsert(p.tasks, taskId, dragged, dz === 'before');
  }
  save();
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

function taskTreeFind(tasks, id) {
  for (const t of tasks) {
    if (t.id === id) return t;
    const f = taskTreeFind(t.children||[], id);
    if (f) return f;
  }
  return null;
}

function taskTreeRemove(tasks, id) {
  for (let i = 0; i < tasks.length; i++) {
    if (tasks[i].id === id) return tasks.splice(i, 1)[0];
    const f = taskTreeRemove(tasks[i].children||[], id);
    if (f) return f;
  }
  return null;
}

function taskTreeInsert(tasks, targetId, node, before) {
  for (let i = 0; i < tasks.length; i++) {
    if (tasks[i].id === targetId) { tasks.splice(before ? i : i+1, 0, node); return true; }
    if (taskTreeInsert(tasks[i].children||[], targetId, node, before)) return true;
  }
  return false;
}
