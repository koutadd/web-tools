<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロジェクト管理 | eye care lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ===================== COMMON NAV ===================== */
#aicare-common-nav {
  position: sticky; top: 0; z-index: 99999;
  background: var(--bg);
  border-bottom: 1px solid rgba(245,158,11,0.18);
  display: flex; align-items: center; gap: 6px;
  padding: 0 20px; height: 42px; min-height: 42px; max-height: 42px;
  overflow-x: auto; overflow-y: hidden;
  flex-wrap: nowrap; white-space: nowrap;
  scrollbar-width: none; -ms-overflow-style: none;
  font-family: 'DM Mono', 'SF Mono', monospace; font-size: 11px; letter-spacing: 0.05em;
  box-sizing: border-box;
}
#aicare-common-nav::-webkit-scrollbar { display: none; }
#aicare-common-nav > * { flex-shrink: 0; }
#aicare-common-nav .cn-label { color: rgba(0,0,0,0.3); font-size: 10px; letter-spacing: 0.1em; padding-right: 4px; }
#aicare-common-nav .cn-sep { color: rgba(0,0,0,0.2); padding: 0 2px; user-select: none; }
#aicare-common-nav a { color: #4b6080; text-decoration: none; padding: 3px 10px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.1); transition: color 0.15s, background 0.15s; white-space: nowrap; }
#aicare-common-nav a:hover { color: #1a2535; background: rgba(0,0,0,0.05); }
#aicare-common-nav a.cn-active { color: #2563eb !important; border-color: rgba(37,99,235,0.35) !important; background: rgba(37,99,235,0.08) !important; }

/* ===================== DESIGN SYSTEM ===================== */
:root {
  --bg: #f0f4f8;
  --surface: #ffffff;
  --surface2: #e8edf3;
  --border: #d1dae6;
  --text: #1a2535;
  --muted: #6b7c93;
  --accent: #2563eb;
  --radius: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
}

/* ===================== LAYOUT ===================== */
.page-container {
  max-width: 1300px;
  margin: 0 auto;
  padding: 32px 32px 80px;
}

@media (max-width: 768px) {
  .page-container { padding: 20px 16px 60px; }
}

/* ===================== TYPOGRAPHY ===================== */
.page-title {
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}

.page-desc {
  color: var(--muted);
  font-size: 14px;
  margin-bottom: 32px;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ===================== CARDS ===================== */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 20px;
}

/* ===================== GRIDS ===================== */
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

@media (max-width: 1100px) {
  .grid-4 { grid-template-columns: repeat(3, 1fr); }
  .grid-5 { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }
}

/* ===================== BADGES ===================== */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
  white-space: nowrap;
}

.status-未着手 { background: rgba(107,114,128,0.12); color: #4b5563; border: 1px solid rgba(107,114,128,0.3); }
.status-進行中 { background: rgba(37,99,235,0.1);   color: #1d4ed8; border: 1px solid rgba(37,99,235,0.3); }
.status-完了   { background: rgba(16,185,129,0.12); color: #059669; border: 1px solid rgba(16,185,129,0.3); }
.status-要確認 { background: rgba(217,119,6,0.12);  color: #b45309; border: 1px solid rgba(217,119,6,0.3); }
.status-保留   { background: rgba(109,40,217,0.1);  color: #6d28d9; border: 1px solid rgba(109,40,217,0.3); }

.priority-最優先 { background: rgba(220,38,38,0.1);  color: #dc2626; border: 1px solid rgba(220,38,38,0.3); }
.priority-高     { background: rgba(234,88,12,0.1);  color: #ea580c; border: 1px solid rgba(234,88,12,0.3); }
.priority-中     { background: rgba(202,138,4,0.1);  color: #a16207; border: 1px solid rgba(202,138,4,0.3); }
.priority-低     { background: rgba(107,114,128,0.1); color: #6b7280; border: 1px solid rgba(107,114,128,0.25); }

/* ===================== BUTTONS ===================== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 16px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: none;
  text-decoration: none;
  white-space: nowrap;
}

.btn-primary {
  background: var(--accent);
  color: #ffffff;
}
.btn-primary:hover { background: #1d4ed8; }

.btn-secondary {
  background: transparent;
  color: var(--text);
  border: 1px solid var(--border);
}
.btn-secondary:hover { background: var(--surface2); }

.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid transparent;
  padding: 5px 10px;
}
.btn-ghost:hover { color: var(--text); background: var(--surface2); }

.btn-danger {
  background: transparent;
  color: #f87171;
  border: 1px solid rgba(239,68,68,0.3);
}
.btn-danger:hover { background: rgba(239,68,68,0.1); }

.btn-sm {
  padding: 4px 11px;
  font-size: 12px;
}

/* ===================== STAT CARDS ===================== */
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px 20px;
  text-align: center;
}
.stat-card .stat-num {
  font-size: 32px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 4px;
}
.stat-card .stat-label {
  font-size: 12px;
  color: var(--muted);
}

/* ===================== CATEGORY CARDS ===================== */
.category-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 22px;
  cursor: pointer;
  transition: border-color 0.15s, transform 0.15s;
  position: relative;
  overflow: hidden;
}
.category-card:hover {
  transform: translateY(-2px);
  border-color: rgba(245,158,11,0.3);
}
.category-card .cat-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  border-radius: 14px 14px 0 0;
}
.category-card .cat-icon { font-size: 28px; margin-bottom: 10px; }
.category-card .cat-name { font-size: 16px; font-weight: 700; margin-bottom: 6px; }
.category-card .cat-desc { font-size: 12px; color: var(--muted); margin-bottom: 14px; line-height: 1.5; }
.category-card .cat-count { font-size: 12px; color: var(--muted); margin-bottom: 14px; }
.category-card .cat-count span { font-weight: 700; color: var(--text); }

/* ===================== PROJECT CARDS ===================== */
.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 26px 22px;
  transition: border-color 0.15s;
}
.project-card:hover { border-color: rgba(245,158,11,0.4); transform: translateY(-1px); }
.project-card { cursor: pointer; }
.project-card .proj-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
}
.project-card .proj-name {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.4;
}
.project-card .proj-badges {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.project-card .proj-purpose {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 10px;
  line-height: 1.5;
}
.project-card .proj-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
}
.project-card .proj-meta span { display: flex; align-items: center; gap: 4px; }
.project-card .proj-deliverables {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 14px;
  padding: 10px 12px;
  background: var(--surface2);
  border-radius: 8px;
  border-left: 3px solid var(--border);
  line-height: 1.5;
}
.project-card .proj-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

/* ===================== INLINE STATUS DROPDOWN ===================== */
.status-dropdown-wrap {
  position: relative;
  display: inline-block;
}
.status-dropdown-wrap .status-menu {
  display: none;
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  z-index: 100;
  min-width: 110px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  overflow: hidden;
}
.status-dropdown-wrap.open .status-menu { display: block; }
.status-dropdown-wrap .status-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 14px;
  background: none;
  border: none;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.1s;
}
.status-dropdown-wrap .status-menu button:hover { background: var(--surface2); }

/* ===================== TASK LIST ===================== */
.task-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.task-item:hover { border-color: rgba(245,158,11,0.2); }
.task-item .task-name {
  flex: 1;
  font-size: 14px;
  font-weight: 500;
}
.task-item .task-meta {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.task-item .task-actions {
  display: flex;
  gap: 4px;
}

/* ===================== FILTER BAR ===================== */
.filter-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}
.filter-btn {
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
}
.filter-btn:hover { color: var(--text); background: var(--surface2); }
.filter-btn.active { background: var(--accent); color: #0f1117; border-color: var(--accent); }

/* ===================== TAB BAR ===================== */
.tab-bar {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab-btn {
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  transition: color 0.15s;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* ===================== BACK BUTTON ===================== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--muted);
  font-size: 13px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  margin-bottom: 24px;
  transition: color 0.15s;
}
.back-btn:hover { color: var(--text); }

/* ===================== MODAL ===================== */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 10000;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  width: 100%;
  max-width: 640px;
  max-height: 90vh;
  overflow-y: auto;
  padding: 28px;
  position: relative;
}
.modal-card h3 {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
}
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 6px;
  transition: background 0.15s;
}
.modal-close:hover { background: var(--surface2); color: var(--text); }

/* ===================== FORM ===================== */
.form-group { margin-bottom: 16px; }
.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 6px;
}
.form-group input,
.form-group select,
.form-group textarea {
  width: 100%;
  padding: 9px 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: rgba(245,158,11,0.5);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group select option { background: var(--surface); }

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

.form-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
}

/* ===================== CONFIRM DIALOG ===================== */
.confirm-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 20000;
  align-items: center;
  justify-content: center;
}
.confirm-overlay.open { display: flex; }
.confirm-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  max-width: 400px;
  width: 90%;
  text-align: center;
}
.confirm-card h4 { font-size: 17px; margin-bottom: 10px; }
.confirm-card p { color: var(--muted); font-size: 14px; margin-bottom: 24px; }
.confirm-actions { display: flex; gap: 10px; justify-content: center; }

/* ===================== INFO SECTION ===================== */
.info-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}
@media (max-width: 768px) { .info-grid { grid-template-columns: 1fr; } }
.info-item { }
.info-item .info-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--muted);
  margin-bottom: 4px;
  font-weight: 600;
}
.info-item .info-value {
  font-size: 14px;
  color: var(--text);
  line-height: 1.6;
}
.info-item.full { grid-column: 1 / -1; }
.info-block {
  background: var(--surface2);
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 14px;
  line-height: 1.7;
  white-space: pre-wrap;
  min-height: 40px;
}

/* ===================== URGENT SECTION ===================== */
.urgent-item {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  transition: border-color 0.15s;
  cursor: pointer;
}
.urgent-item:hover { border-color: rgba(245,158,11,0.3); }
.urgent-item .urgent-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
.urgent-item .urgent-content { flex: 1; }
.urgent-item .urgent-title { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
.urgent-item .urgent-meta { font-size: 12px; color: var(--muted); }

/* ===================== PRIORITY PROJECTS ===================== */
.priority-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color 0.15s;
}
.priority-row:hover { border-color: rgba(245,158,11,0.3); }
.priority-row .pr-name { flex: 1; font-size: 14px; font-weight: 600; }
.priority-row .pr-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.priority-row .pr-cat { font-size: 11px; color: var(--muted); }

/* ===================== PROJECT DETAIL INLINE EDIT ===================== */
.pde-field {
  cursor: pointer; padding: 3px 8px; border-radius: 7px;
  border: 1px dashed transparent; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 5px;
}
.pde-field:hover { border-color: rgba(245,158,11,0.4); background: rgba(245,158,11,0.07); }
.pde-field.empty { color: var(--muted); font-style: italic; font-size: 12px; }
.pde-name-field {
  cursor: pointer; padding: 2px 6px; border-radius: 6px;
  border-bottom: 2px dashed transparent; transition: all 0.15s;
}
.pde-name-field:hover { border-bottom-color: rgba(245,158,11,0.5); }
.pde-name-input {
  font-size: 22px; font-weight: 800; width: 100%;
  background: var(--surface2); border: 2px solid rgba(245,158,11,0.5);
  border-radius: 8px; color: var(--text); padding: 4px 10px; outline: none;
}
.pde-text-input {
  font-size: 13px; background: var(--surface2);
  border: 1px solid rgba(245,158,11,0.45); border-radius: 7px;
  color: var(--text); padding: 4px 10px; outline: none;
  min-width: 140px;
}
.pde-select {
  font-size: 12px; background: var(--surface2);
  border: 1px solid rgba(245,158,11,0.4); border-radius: 7px;
  color: var(--text); padding: 3px 8px; outline: none; cursor: pointer;
}
/* Assignee / person dropdown */
#pde-person-dd {
  display: none; position: fixed; z-index: 9500;
  background: var(--surface); border: 1px solid rgba(245,158,11,0.35);
  border-radius: 12px; padding: 6px; min-width: 200px; max-width: 260px;
  box-shadow: 0 14px 40px rgba(0,0,0,0.75);
  animation: pdeDdIn 0.12s ease;
}
@keyframes pdeDdIn { from { opacity:0; transform:translateY(-6px) scale(0.97); } to { opacity:1; transform:none; } }
.pde-dd-label { padding: 4px 10px 6px; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.pde-dd-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: 8px; cursor: pointer;
  font-size: 13px; transition: background 0.1s;
}
.pde-dd-item:hover { background: var(--surface2); }
.pde-dd-item.sel { color: var(--accent); }
.pde-dd-check { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.pde-dd-sep { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
.pde-add-input {
  width: 100%; padding: 5px 9px; background: var(--surface);
  border: 1px solid rgba(245,158,11,0.4); border-radius: 6px;
  color: var(--text); font-size: 12px; outline: none; margin: 2px 0;
}

/* ===================== HEADER INFO BAR ===================== */
.proj-header-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 24px;
}
.proj-header-bar .phb-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.proj-header-bar .phb-name {
  font-size: 22px;
  font-weight: 800;
  line-height: 1.3;
}
.proj-header-bar .phb-badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.proj-header-bar .phb-meta {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  font-size: 13px;
  color: var(--muted);
}
.proj-header-bar .phb-meta span { display: flex; align-items: center; gap: 5px; }

/* ===================== ROLES CARD ===================== */
.roles-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}
.role-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
}
.role-item .role-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.role-item .role-person { font-size: 14px; font-weight: 600; }

/* ===================== EMPTY STATE ===================== */
.empty-state {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
}
.empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* ===================== SCROLLBAR ===================== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #3e4570; }

/* ===================== TRANSITIONS ===================== */
#app { animation: fadeIn 0.18s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.section-block { margin-bottom: 32px; }

/* ===================== COMPACT CATEGORY CARDS ===================== */
.compact-cat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 4px solid;
  border-radius: 10px;
  padding: 9px 14px;
  display: flex; align-items: center; gap: 10px;
  cursor: pointer; transition: background 0.15s;
}
.compact-cat-card:hover { background: var(--surface2); }
.compact-cat-card .ccc-name { font-size: 13px; font-weight: 600; flex: 1; }
.compact-cat-card .ccc-count { font-size: 11px; color: var(--muted); }

/* ===================== PROJECT TABLE ROW ===================== */
.proj-row {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-left: 5px solid var(--border);
  border-radius: 10px; margin-bottom: 5px;
  transition: background 0.12s, border-color 0.12s;
  min-height: 52px;
}
.proj-row:hover { background: var(--surface2); border-color: var(--accent); }
.proj-row.dim { opacity: 0.42; }
.proj-row .proj-row-name {
  flex: 1; font-size: 14px; font-weight: 600;
  cursor: pointer; min-width: 0;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text);
}
.proj-row .proj-row-name:hover { color: var(--accent); }
.proj-row-waiting {
  font-size: 11px; padding: 4px 10px; border-radius: 20px; white-space: nowrap;
  background: rgba(234,88,12,0.1); color: #c2410c;
  border: 1px solid rgba(234,88,12,0.3); cursor: pointer;
  min-width: 72px; text-align: center; font-weight: 600;
}
.proj-row-waiting.empty {
  background: transparent; color: var(--muted); border: 1px dashed var(--border); font-style: italic; font-weight: 400;
}
.proj-row-waiting:hover { border-color: #ea580c; background: rgba(249,115,22,0.25); color: #ea580c; }
.proj-row-next {
  font-size: 12px; color: var(--muted); width: 150px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
  border: 1px dashed var(--border);
}
.proj-row-next:hover { border-color: #f59e0b; color: var(--text); background: rgba(245,158,11,0.06); }
.proj-row-deadline {
  font-size: 12px; color: var(--muted); cursor: pointer; white-space: nowrap;
  padding: 4px 8px; border-radius: 6px; border: 1px dashed transparent;
  width: 90px; text-align: center;
}
.proj-row-deadline:hover { border-color: #f59e0b; background: rgba(245,158,11,0.06); }
@media (max-width: 1000px) {
  .proj-row-next { display: none; }
}
@media (max-width: 768px) {
  .proj-row-deadline, .proj-row-waiting { display: none; }
}

/* ===================== PRIORITY ITEMS (today panel) ===================== */
.priority-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface);
  border-radius: 8px; margin-bottom: 0;
  border-left: 3px solid; cursor: pointer;
  transition: background 0.12s;
  border-bottom: 1px solid var(--border);
}
.priority-item:last-child { border-bottom: none; border-radius: 0 0 8px 8px; }
.priority-item:first-child { border-radius: 8px 8px 0 0; }
.priority-item:only-child { border-radius: 8px; border-bottom: none; }
.priority-item:hover { background: var(--surface2); }
.priority-item .pi-name { flex: 1; font-size: 13px; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text); }
.priority-item .pi-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; font-size: 11px; }

/* ===================== BLOCKER FILTER ===================== */
.blocker-filter { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.blocker-btn {
  padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 500;
  cursor: pointer; border: 1px solid var(--border);
  background: transparent; color: var(--muted); transition: all 0.15s;
}
.blocker-btn:hover { color: var(--text); background: var(--surface2); }
.blocker-btn.active { background: rgba(249,115,22,0.18); color: #ea580c; border-color: rgba(249,115,22,0.4); }

/* ===================== PERSON SHORTCUTS ===================== */
.person-shortcuts { display: flex; gap: 8px; flex-wrap: wrap; }
.person-btn {
  padding: 6px 14px; border-radius: 8px; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border);
  background: var(--surface); color: var(--text); transition: all 0.15s;
  display: flex; align-items: center; gap: 6px;
}
.person-btn:hover { background: var(--surface2); border-color: rgba(245,158,11,0.3); }
.person-btn .pcount { font-size: 10px; padding: 1px 5px; border-radius: 10px; background: var(--surface2); color: var(--muted); }

/* ===================== NEXT ACTION BAR ===================== */
.next-action-bar {
  background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.2);

}

/* ===================== TODAY PANEL ===================== */
.today-panel {
  border-radius: 10px; padding: 14px 16px; margin-bottom: 8px;
  border: 1px solid;
}
.today-panel-title {
  font-size: 13px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 6px;
}

/* ===================== TASK DONE CHECKBOX ===================== */
.task-done-cb {
  width: 17px; height: 17px; cursor: pointer; flex-shrink: 0;
  accent-color: #10b981; border-radius: 4px;
}
.task-item.is-done { opacity: 0.42; }
.task-item.is-done .task-name { text-decoration: line-through; color: var(--muted); }
@keyframes taskDoneFlash {
  0%   { background: rgba(16,185,129,0.2); }
  100% { background: transparent; }
}
.task-item.done-anim { animation: taskDoneFlash 0.5s ease; }
@keyframes taskHighlightPulse {
  0%   { background: rgba(245,158,11,0.0); box-shadow: none; }
  20%  { background: rgba(245,158,11,0.22); box-shadow: 0 0 0 3px rgba(245,158,11,0.35); }
  70%  { background: rgba(245,158,11,0.15); box-shadow: 0 0 0 3px rgba(245,158,11,0.2); }
  100% { background: rgba(245,158,11,0.06); box-shadow: 0 0 0 2px rgba(245,158,11,0.25); }
}
.task-item.highlight-focus {
  animation: taskHighlightPulse 1.6s ease forwards;
  border-color: rgba(245,158,11,0.6) !important;
}

/* ===================== BULK SELECT ===================== */
.task-select-cb {
  width: 16px; height: 16px; cursor: pointer; flex-shrink: 0;
  accent-color: var(--accent); border-radius: 4px;
}
.bulk-bar {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  padding: 10px 14px; background: rgba(245,158,11,0.07);
  border: 1px solid rgba(245,158,11,0.25); border-radius: 10px; margin-bottom: 12px;
}
.bulk-count { font-size: 13px; font-weight: 700; color: var(--accent); }
.bulk-assignee-sel {
  padding: 5px 10px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 12px;
}
.task-item.bulk-selected { border-color: rgba(245,158,11,0.5); background: rgba(245,158,11,0.05); }

/* ===================== DRAG & DROP ===================== */
.task-item { position: relative; }
.task-drag-handle { cursor: grab; color: #6b7280; padding: 0 6px; font-size: 16px; user-select: none; flex-shrink: 0; }
.task-item.dragging { opacity: 0.35; }
.task-item.drop-before::before { content:''; position:absolute; top:-2px; left:0; right:0; height:3px; background:#60a5fa; border-radius:2px; z-index:10; }
.task-item.drop-after::after { content:''; position:absolute; bottom:-2px; left:0; right:0; height:3px; background:#60a5fa; border-radius:2px; z-index:10; }
.task-item.drop-child { border-color:#6d28d9 !important; background:#2d1f4e !important; }
.task-children { margin-left:28px; margin-top:6px; padding-left:12px; border-left:2px solid #374151; }
.task-children .task-item { background:var(--surface2); }

/* ===================== TASK DETAIL EXPAND ===================== */
.task-wrap { margin-bottom: 6px; }
.task-item { cursor: pointer; }
.task-item:hover { border-color: rgba(245,158,11,0.3); }
.task-detail {
  display: none;
  background: var(--bg);
  border: 1px solid var(--border);
  border-top: none;
  border-radius: 0 0 10px 10px;
  padding: 14px 16px 14px 52px;
  margin-top: -6px;
  animation: slideDown 0.15s ease;
}
.task-wrap.expanded .task-item {
  border-radius: 10px 10px 0 0;
  border-bottom-color: transparent;
  border-color: rgba(245,158,11,0.4);
}
.task-wrap.expanded .task-detail { display: block; border-color: rgba(245,158,11,0.3); }
@keyframes slideDown { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.task-detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
}
@media (max-width: 600px) { .task-detail-grid { grid-template-columns: 1fr; } }
.td-row { display: flex; flex-direction: column; gap: 3px; }
.td-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); font-weight: 700; }
.td-val { font-size: 13px; color: var(--text); line-height: 1.5; }
.td-val.empty { color: #3d5070; font-style: italic; }

</style>

// ===================== STORAGE =====================
const STORAGE_KEY = 'aicare-projects-v3';
const API_URL     = '/api/data';

function showSaveIndicator(msg, color) {
  let el = document.getElementById('saveIndicator');
  if (!el) return;
  el.textContent = msg;
  el.style.color = color || '#4ade80';
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, 2500);
}

function ensureChildren(tasks) {
  (tasks||[]).forEach(t => { if (!t.children) t.children = []; ensureChildren(t.children); });
}

function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const d = JSON.parse(raw);
      if (d && d.projects && Array.isArray(d.projects)) {
        // Ensure roles exists even if missing from old data
        if (!d.roles) d.roles = JSON.parse(JSON.stringify(DEFAULT_ROLES));
        if (!d.categories) d.categories = JSON.parse(JSON.stringify(CATEGORIES));
        d.projects.forEach(p => { if (!p.categoryId && p.category) p.categoryId = p.category; ensureChildren(p.tasks); });
        return d;
      }
    }
  } catch(e) {}
  return null;
}

function initData() {
  const projects = DEFAULT_PROJECTS.map(p => ({
    ...p,
    tasks: makeDefaultTasks(p.id)
  }));
  const data = { projects, roles: JSON.parse(JSON.stringify(DEFAULT_ROLES)), categories: JSON.parse(JSON.stringify(CATEGORIES)), updatedAt: 0 };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  return data;
}

let _saveTimer = null;
function saveData(data) {
  _lastSaveTime = Date.now();
  data.updatedAt = _lastSaveTime;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  showSaveIndicator('💾 保存中…', '#facc15');
  clearTimeout(_saveTimer);
  _saveTimer = setTimeout(() => {
    fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    }).then(r => r.ok ? showSaveIndicator('☁️ 保存済み', '#4ade80') : showSaveIndicator('⚠️ 保存失敗', '#f87171'))
      .catch(() => showSaveIndicator('⚠️ 保存失敗', '#f87171'));
  }, 500);
}

let APP = null;

function deduplicateProjects(projects) {
  const seen = new Set();
  return projects.filter(p => {
    const key = String(p.id);
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function initializeApp() {
  // Render immediately from localStorage (no waiting)
  APP = loadLocal() || initData();
  // Deduplicate (fixes any duplicates from previous bad migration)
  const before = APP.projects.length;
  APP.projects = deduplicateProjects(APP.projects);
  // Add 本部ロゴ (id:28) if missing
  if (!APP.projects.find(p => String(p.id) === '28')) {
    const def = DEFAULT_PROJECTS.find(p => p.id === 28);
    if (def) APP.projects.push({ ...def, tasks: makeDefaultTasks(28) });
  }
  // Save if we changed anything
  if (APP.projects.length !== before) saveData(APP);
  initProgressSnapshot();
  if (!window.location.hash || window.location.hash === '#') window.location.hash = '#/';
  render();
  // Background cloud sync (doesn't block rendering)
  syncFromCloud();
}

let _lastSaveTime = 0;  // track last user save to guard sync
let _scrollToPerson = null; // pending scroll target after members render
let _highlightTaskId = null; // pending task highlight after project render

async function syncFromCloud() {
  try {
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 10000);
    const res = await fetch(API_URL + '?t=' + Date.now(), { signal: ctrl.signal });
    clearTimeout(tid);
    if (!res.ok) return;
    const data = await res.json();
    if (!data || !data.projects || !Array.isArray(data.projects) || !data.roles) return;
    data.projects.forEach(p => { if (!p.categoryId && p.category) p.categoryId = p.category; });
    // Use cloud data if it's newer than local (timestamp-based, cloud wins on tie)
    const cloudTs = data.updatedAt || 0;
    const localTs = APP.updatedAt || 0;
    if (cloudTs < localTs) return;
    // Guard: don't sync within 10s of a user save (prevents overwriting in-flight changes)
    if (Date.now() - _lastSaveTime < 10000) return;
    // Guard: don't re-render while user is actively typing in an input
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) return;
    data.projects.forEach(p => ensureChildren(p.tasks));
    data.projects = deduplicateProjects(data.projects);
    // ローカルで追加した担当者をクラウドデータが上書きしないようにマージ
    if (APP.people && APP.people.length) {
      if (!data.people || !data.people.length) data.people = APP.people;
      else data.people = [...new Set([...data.people, ...APP.people])];
    }
    APP = data;
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    render();
    showSaveIndicator('☁️ 同期完了', '#60a5fa');
  } catch(e) { /* cloud sync failed silently */ }
}

function getProjects() { return APP.projects; }
function getRoles() {
  let roles = (APP && APP.roles) ? APP.roles : DEFAULT_ROLES;
  if (Array.isArray(roles)) roles = DEFAULT_ROLES;
  const out = {};
  Object.entries(roles).forEach(([k, v]) => {
    const def = DEFAULT_ROLES[k];
    out[k] = { ...v, label: v.label || (def && def.label) || k, person: v.person || (def && def.person) || '' };
  });
  return out;
}
function save()        { saveData(APP); }

// ===================== ROUTING =====================
function getHash() {
  return window.location.hash || '#/';
}

function navigate(path) {
  window.location.hash = path;
}

function parseRoute(hash) {
  const h = hash.replace(/^#/, '') || '/';
  if (h === '/' || h === '') return { view: 'dashboard' };

  const catMatch = h.match(/^\/category\/([^/]+)$/);
  if (catMatch) return { view: 'category', slug: catMatch[1] };

  const projTaskMatch = h.match(/^\/project\/([^\/]+)\/tasks$/);
  if (projTaskMatch) return { view: 'project', id: projTaskMatch[1], tab: 'tasks' };

  const projMatch = h.match(/^\/project\/([^\/]+)$/);
  if (projMatch) return { view: 'project', id: projMatch[1], tab: 'tasks' };

  if (h === '/members') return { view: 'members' };

  const personMatch = h.match(/^\/person\/(.+)$/);
  if (personMatch) return { view: 'person', name: decodeURIComponent(personMatch[1]) };

  return { view: 'dashboard' };
}

// ===================== RENDER DISPATCH =====================
function render() {
  const route = parseRoute(getHash());
  const app = document.getElementById('app');
  if (!app) return;
  try {
    closeAllDropdowns();
    if (route.view === 'dashboard') {
      app.innerHTML = renderDashboard();
    } else if (route.view === 'category') {
      app.innerHTML = renderCategory(route.slug);
    } else if (route.view === 'project') {
      app.innerHTML = renderProject(route.id, route.tab);
      initProjectTabs(route.id);
      if (_highlightTaskId) {
        const tid = _highlightTaskId;
        _highlightTaskId = null;
        setTimeout(() => {
          const safeId = tid.replace(/[^a-z0-9]/gi, '_');
          const el = document.getElementById('task-item-' + safeId);
          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            setTimeout(() => el.classList.add('highlight-focus'), 150);
          }
        }, 120);
      }
    } else if (route.view === 'members') {
      app.innerHTML = renderMembers();
      if (_scrollToPerson) {
        const target = _scrollToPerson;
        _scrollToPerson = null;
        setTimeout(() => {
          const cards = app.querySelectorAll('[data-person]');
          for (const card of cards) {
            if (card.dataset.person === target) {
              card.scrollIntoView({ behavior: 'smooth', block: 'start' });
              break;
            }
          }
        }, 80);
      }
    } else if (route.view === 'person') {
      app.innerHTML = renderPersonView(route.name);
    }
  } catch(e) {
    app.innerHTML = `<div style="padding:40px;color:#f87171;font-size:13px;"><b>描画エラー:</b> ${e.message}<br><pre style="margin-top:8px;font-size:11px;color:var(--muted);">${e.stack}</pre></div>`;
    console.error('render error:', e);
  }
}

// ===================== HELPERS =====================
function getCategories() {
  const cats = (APP && APP.categories) ? APP.categories : CATEGORIES;
  return cats.map(c => ({ icon: '📁', desc: '', ...c, name: c.name || c.label || c.id }));
}
function getCategoryById(id) {
  return getCategories().find(c => c.id === id) || { name: id, icon: '📁', color: '#6b7280', desc: '' };
}

function getProjectById(id) {
  return APP.projects.find(p => String(p.id) === String(id));
}

function statusBadge(status) {
  return `<span class="badge status-${status}">${status}</span>`;
}

function priorityBadge(priority) {
  return `<span class="badge priority-${priority}">${priority}</span>`;
}

function catBadge(categoryId) {
  const cat = getCategoryById(categoryId);
  return `<span class="badge" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;">${cat.icon} ${cat.name}</span>`;
}

function priorityOrder(p) {
  return { '最優先': 0, '高': 1, '中': 2, '低': 3 }[p] ?? 9;
}

function formatDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

function daysUntil(dateStr) {
  if (!dateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr);
  return Math.ceil((d - now) / 86400000);
}

function truncate(str, n) {
  if (!str) return '—';
  return str.length > n ? str.slice(0, n) + '…' : str;
}

// ===================== MEMBERS VIEW =====================
function renderMembers() {
  const projects = getProjects();

  // プロジェクトを assignee で分類（カンマ区切りも分割）
  const grouped = {};
  function addToGroup(name, p) {
    if (!name || name === '未設定') return;
    if (!grouped[name]) grouped[name] = [];
    if (!grouped[name].includes(p)) grouped[name].push(p);
  }
  // タスク担当者を再帰収集してプロジェクトに関連付け
  function collectTaskAssignees(tasks, proj) {
    (tasks || []).forEach(t => {
      (t.assignee || '').split(/[、,，\s]+/).map(n => n.trim()).filter(Boolean)
        .forEach(name => addToGroup(name, proj));
      if (t.children) collectTaskAssignees(t.children, proj);
    });
  }

  projects.forEach(p => {
    // プロジェクトの assignee・members から収集
    const assigneeNames = (p.assignee || '').split(/[、,，\s]+/).map(n => n.trim()).filter(Boolean);
    const memberNames  = (p.members  || '').split(/[、,，\s]+/).map(n => n.trim()).filter(Boolean);
    const allNames = [...new Set([...assigneeNames, ...memberNames])];
    if (allNames.length === 0 && !(p.tasks && p.tasks.length)) addToGroup('未設定', p);
    else allNames.forEach(name => addToGroup(name, p));
    // タスク担当者も収集
    collectTaskAssignees(p.tasks, p);
  });

  // APP.people に登録されている人も必ず表示（プロジェクト未割当でも）
  getPeople().forEach(name => { if (name && !grouped[name]) grouped[name] = []; });
  const people = Object.keys(grouped).sort();

  const sections = people.map(person => {
    const projs = grouped[person];
    const done  = projs.filter(p => p.status === '完了').length;
    const doing = projs.filter(p => p.status === '進行中').length;
    const todo  = projs.filter(p => p.status === '未着手').length;

    // タスク一覧：タスクのassigneeが一致、または子タスクも再帰検索
    const tasks = [];
    function collectTasks(taskList, proj) {
      (taskList || []).forEach(t => {
        const ta = (t.assignee || '').split(/[、,，\s]+/).map(s => s.trim());
        if (ta.includes(person)) tasks.push({ task: t, project: proj });
        if (t.children && t.children.length) collectTasks(t.children, proj);
      });
    }
    // プロジェクト担当者の場合、タスクにassigneeがなければプロジェクト全タスクを含める
    projects.forEach(p => {
      const pa = (p.assignee || '').split(/[、,，\s]+/).map(s => s.trim());
      const pm = (p.members || '').split(/[、,，\s]+/).map(s => s.trim());
      if (pa.includes(person) || pm.includes(person)) {
        collectTasks(p.tasks, p);
      }
    });

    const rows = projs.map(p => {
      const cat = getCategoryById(p.categoryId);
      const d = daysUntil(p.deadline);
      const dlLabel = d === null ? '' : d < 0 ? `<span style="color:#ef4444;font-size:11px;">超過${Math.abs(d)}日</span>` : d <= 7 ? `<span style="color:#f59e0b;font-size:11px;">あと${d}日</span>` : `<span style="color:var(--muted);font-size:11px;">${formatDate(p.deadline)}</span>`;
      return `
      <div class="priority-row" onclick="navigate('#/project/${p.id}')" style="cursor:pointer;">
        <div class="pr-name">${p.name}</div>
        <div class="pr-meta">
          ${priorityBadge(p.priority)}
          ${statusBadge(p.status)}
          <span style="color:${cat.color};font-size:12px;">${cat.icon} ${cat.name}</span>
          ${dlLabel}
        </div>
      </div>`;
    }).join('');

    const taskRows = tasks.length ? `
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
        <div style="font-size:11px;color:var(--muted);margin-bottom:6px;">担当タスク（${tasks.length}件）</div>
        ${tasks.map(({task, project}) => `
          <div class="priority-row" onclick="navigate('#/project/${project.id}')" style="cursor:pointer;">
            <div class="pr-name" style="font-size:12px;">📌 ${task.name}</div>
            <div class="pr-meta">
              <span style="font-size:11px;color:var(--muted);">${project.name}</span>
              ${statusBadge(task.status)}
            </div>
          </div>`).join('')}
      </div>` : '';

    // この人が担当しているロールを取得
    const roles = getRoles();
    const personRoles = Object.values(roles).filter(r =>
      (r.person || '').split(/[、,，\s]+/).map(s => s.trim()).includes(person)
    );

    return `
    <div class="card" data-person="${person}" style="margin-bottom:24px;">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px;">
        <div style="width:40px;height:40px;border-radius:50%;background:${personColor(person)};display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;flex-shrink:0;">${person.slice(0,2)}</div>
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
            <div style="font-size:16px;font-weight:700;">${person}</div>
            ${personRoles.map(r => `<span style="font-size:11px;padding:2px 8px;border-radius:99px;background:rgba(37,99,235,0.1);color:#1d4ed8;border:1px solid rgba(37,99,235,0.25);">${r.label}</span>`).join('')}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">プロジェクト ${projs.length}件 &nbsp;·&nbsp; 進行中 ${doing} &nbsp;·&nbsp; 完了 ${done} &nbsp;·&nbsp; 未着手 ${todo}</div>
        </div>
      </div>
      ${rows}
      ${taskRows}
    </div>`;
  }).join('');

  return `
<div class="page-container">
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px;flex-wrap:wrap;">
    <button class="back-btn" onclick="navigate('#/')">← ダッシュボードへ</button>
    <h1 class="page-title" style="margin:0;">担当者別</h1>
    <span style="color:var(--muted);font-size:13px;">${people.length} 名 · ${projects.length} プロジェクト</span>
  </div>
  ${sections || '<div class="empty-state"><div class="empty-icon">👤</div><p>担当者情報がありません</p></div>'}
</div>`;
}

// ===================== CSV EXPORT =====================
function exportCSV() {
  const projects = getProjects();
  const rows = [
    ['ID','カテゴリ','プロジェクト名','目的','ステータス','優先度','締切','担当者','メンバー','成果物','概要','備考']
  ];
  projects.forEach(p => {
    const cat = getCategoryById(p.categoryId);
    rows.push([
      p.id,
      cat.name,
      p.name,
      p.purpose || '',
      p.status,
      p.priority,
      p.deadline || '',
      p.assignee || '',
      p.members || '',
      p.deliverables || '',
      p.overview || '',
      p.notes || ''
    ]);
  });
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const bom = '\uFEFF';
  const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `aicare-projects-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

function goToPersonSection(person) {
  _scrollToPerson = person;
  const cur = window.location.hash;
  if (cur === '#/members' || cur === '#/members/') {
    // Already on members page — just scroll directly
    const app = document.getElementById('app');
    if (app) {
      const cards = app.querySelectorAll('[data-person]');
      for (const card of cards) {
        if (card.dataset.person === person) {
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
          _scrollToPerson = null;
          return;
        }
      }
    }
    // Not found — re-render members and scroll
    _scrollToPerson = person;
    const appEl = document.getElementById('app');
    if (appEl) appEl.innerHTML = renderMembers();
    setTimeout(() => {
      const cards2 = document.querySelectorAll('[data-person]');
      for (const c of cards2) {
        if (c.dataset.person === person) { c.scrollIntoView({ behavior: 'smooth', block: 'start' }); _scrollToPerson = null; break; }
      }
    }, 80);
  } else {
    navigate('#/members');
  }
}

function scrollToPersonProjects(person) {
  // If not on dashboard, navigate there first then scroll
  const currentHash = location.hash;
  if (currentHash && currentHash !== '#/' && currentHash !== '#') {
    navigate('#/');
    setTimeout(() => _doScrollToPerson(person), 120);
    return;
  }
  _doScrollToPerson(person);
}

function _doScrollToPerson(person) {
  const statusOrd = {'進行中':0,'要確認':1,'未着手':2,'完了':3,'保留':4};
  const sorted = [...APP.projects].sort((a, b) => {
    const sA = statusOrd[a.status] ?? 5, sB = statusOrd[b.status] ?? 5;
    if (sA !== sB) return sA - sB;
    return priorityOrder(a.priority) - priorityOrder(b.priority);
  });
  // Try exact match first, then partial match
  let first = sorted.find(p => (p.assignee || '').trim() === person);
  if (!first) first = sorted.find(p => (p.assignee || '').includes(person));
  if (!first) { showSaveIndicator(`${person} のプロジェクトが見つかりません`, '#f87171'); return; }
  const el = document.getElementById('proj-row-' + first.id);
  if (!el) {
    // Fallback: scroll to project list section
    const list = document.getElementById('proj-list');
    if (list) list.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  el.style.transition = 'background 0.3s, box-shadow 0.3s, border-color 0.3s';
  el.style.background = 'rgba(245,158,11,0.18)';
  el.style.boxShadow = '0 0 0 2px rgba(245,158,11,0.5)';
  el.style.borderLeftColor = '#f59e0b';
  setTimeout(() => {
    el.style.background = '';
    el.style.boxShadow = '';
    el.style.borderLeftColor = '';
  }, 1600);
}

function setBlockerFilter(val) {
  blockerFilter = val;
  const el = document.getElementById('blocker-list');
  if (el) el.innerHTML = renderBlockerListInner(getProjects());
  document.querySelectorAll('.blocker-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.bf === val);
  });
}

function renderBlockerListInner(projects) {
  const active = projects.filter(p => p.status !== '完了' && p.status !== '保留');
  let filtered;
  if (blockerFilter === '全て') {
    filtered = active.filter(p => p.waitingFor || p.blockedBy);
  } else {
    const keyword = blockerFilter.replace('待ち', '').replace('確認', '').toLowerCase();
    filtered = active.filter(p => {
      const w = (p.waitingFor || '').toLowerCase();
      const b = (p.blockedBy || '').toLowerCase();
      const label = blockerFilter.toLowerCase();
      return w.includes(keyword) || b.includes(keyword) || w.includes(label) || b.includes(label);
    });
  }
  if (filtered.length === 0) return `<div style="color:var(--muted);padding:10px;font-size:13px;">該当なし</div>`;
  return filtered.map(p => {
    const waiting = p.waitingFor || '';
    const blocked = p.blockedBy || '';
    return `<div class="priority-item" style="border-left-color:#f97316;" onclick="navigate('#/project/${p.id}')">
      <span class="pi-name">${p.name}</span>
      <div class="pi-meta">
        ${waiting ? `<span style="background:rgba(249,115,22,0.15);color:#fb923c;padding:1px 7px;border-radius:12px;border:1px solid rgba(249,115,22,0.3);">⏳ ${waiting}</span>` : ''}
        ${blocked ? `<span style="color:var(--muted);">詰まり: ${truncate(blocked, 20)}</span>` : ''}
        ${statusBadge(p.status)}
      </div>
    </div>`;
  }).join('');
}

// ===================== PERSON VIEW =====================
function renderPersonView(name) {
  const projects = getProjects();
  const statusOrd = {'進行中':0,'要確認':1,'未着手':2,'完了':3,'保留':4};

  // Projects where this person is assignee or waitingFor
  const myProjects = projects.filter(p =>
    (p.assignee || '').includes(name) || (p.waitingFor || '').includes(name)
  ).sort((a,b) => {
    const sA = statusOrd[a.status] ?? 5, sB = statusOrd[b.status] ?? 5;
    if (sA !== sB) return sA - sB;
    return priorityOrder(a.priority) - priorityOrder(b.priority);
  });

  // All tasks assigned to this person across all projects
  function collectTasks(tasks, projectId, results) {
    (tasks || []).forEach(t => {
      if ((t.assignee || '').includes(name)) results.push({ t, projectId });
      if (t.children) collectTasks(t.children, projectId, results);
    });
  }
  const myTasks = [];
  projects.forEach(p => collectTasks(p.tasks, p.id, myTasks));

  const color = personColor(name);

  // Group tasks by project
  const tasksByProject = {};
  myTasks.forEach(({ t, projectId }) => {
    if (!tasksByProject[projectId]) tasksByProject[projectId] = [];
    tasksByProject[projectId].push(t);
  });

  const statusBadge = s => {
    const m = {'進行中':'#10b981','要確認':'#f59e0b','未着手':'#64748b','完了':'#6366f1','保留':'#94a3b8'};
    return `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${(m[s]||'#64748b')}22;color:${m[s]||'#64748b'};font-weight:700;">${s}</span>`;
  };

  let projectsHtml = '';
  if (myProjects.length === 0) {
    projectsHtml = `<div style="color:var(--muted);font-size:13px;padding:16px 0;">担当プロジェクトなし</div>`;
  } else {
    projectsHtml = myProjects.map(p => {
      const cat = getCategoryById(p.categoryId);
      const catColor = cat ? cat.color : '#64748b';
      const d = daysUntil(p.deadline);
      const dlStr = p.deadline ? `<span style="font-size:11px;color:${d!==null&&d<0?'#f87171':d!==null&&d<=3?'#fb923c':'#94a3b8'};">📅 ${p.deadline}</span>` : '';
      const role = (p.assignee || '').includes(name) && (p.waitingFor || '').includes(name)
        ? '担当・待ち'
        : (p.waitingFor || '').includes(name) ? '⏳ 待ち' : '👤 担当';
      return `<div onclick="navigate('#/project/${p.id}')" style="cursor:pointer;padding:12px 16px;border-radius:12px;background:var(--surface);border:1px solid var(--border);border-left:3px solid ${catColor};display:flex;flex-direction:column;gap:5px;transition:background 0.15s;"
        onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='var(--surface)'">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span style="font-weight:700;font-size:14px;">${p.name}</span>
          ${statusBadge(p.status)}
          <span style="font-size:11px;padding:2px 7px;border-radius:8px;background:${catColor}18;color:${catColor};">${cat?cat.name:''}</span>
          <span style="font-size:11px;color:var(--muted);margin-left:auto;">${role}</span>
        </div>
        <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
          ${dlStr}
          ${p.nextAction ? `<span style="font-size:12px;color:var(--muted);">▶ ${p.nextAction}</span>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  // Tasks grouped by project
  let tasksHtml = '';
  const projectsWithTasks = Object.keys(tasksByProject);
  if (projectsWithTasks.length === 0) {
    tasksHtml = `<div style="color:var(--muted);font-size:13px;padding:16px 0;">担当タスクなし</div>`;
  } else {
    tasksHtml = projectsWithTasks.map(pid => {
      const proj = getProjectById(pid);
      if (!proj) return '';
      const tasks = tasksByProject[pid];
      const taskRows = tasks.map(t => {
        const isDone = t.status === '完了';
        return `<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:var(--surface);margin-bottom:4px;${isDone?'opacity:0.45;':''}">
          <span style="font-size:16px;">${isDone?'✅':'⬜'}</span>
          <span style="font-size:13px;${isDone?'text-decoration:line-through;color:var(--muted);':''}">${t.name}</span>
          ${t.status !== '完了' && t.status ? `<span style="font-size:10px;margin-left:auto;color:var(--muted);">${t.status}</span>` : ''}
        </div>`;
      }).join('');
      return `<div style="margin-bottom:16px;">
        <div onclick="navigate('#/project/${pid}')" style="cursor:pointer;font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px;display:flex;align-items:center;gap:5px;">
          <span>📁</span><span>${proj.name}</span><span style="color:var(--muted);font-weight:400;"> (${tasks.length}件)</span>
        </div>
        ${taskRows}
      </div>`;
    }).join('');
  }

  return `
    <div style="max-width:860px;margin:0 auto;padding:24px 16px;">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:28px;">
        <button onclick="navigate('#/')" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 14px;cursor:pointer;font-size:12px;color:var(--text);">← ホームへ</button>
        <div style="width:44px;height:44px;border-radius:50%;background:${color}22;color:${color};display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;">${name.slice(0,2)}</div>
        <div>
          <div style="font-size:22px;font-weight:800;">${name}</div>

      <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:32px;">${projectsHtml}</div>

      <div style="font-size:13px;font-weight:700;color:var(--accent);margin-bottom:12px;letter-spacing:0.04em;">✅ 担当タスク</div>
      <div>${tasksHtml}</div>
    </div>`;
}

function renderDashboard() {
  const projects = getProjects();
  const total = projects.length;
  const byStatus = {};
  projects.forEach(p => { byStatus[p.status] = (byStatus[p.status]||0)+1; });

  // ① 今日の優先対応
  const active = projects.filter(p => p.status !== '完了' && p.status !== '保留');
  const deadline3 = active.filter(p => { const d = daysUntil(p.deadline); return d !== null && d <= 3; });
  const review = active.filter(p => p.status === '要確認');
  const waitMe = active.filter(p => (p.waitingFor||'').includes('こうた'));
  const waitOther = active.filter(p => { const w = p.waitingFor||''; return w && !w.includes('こうた'); });

  function todayGroup(label, color, bgAlpha, emoji, items, labelFn) {
    if (!items.length) return '';
    const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
    return `
    <div class="today-panel" style="background:rgba(${r},${g},${b},${bgAlpha});border-color:rgba(${r},${g},${b},0.35);border-left:3px solid ${color};margin-bottom:8px;">
      <div class="today-panel-title" style="color:${color};">${emoji} ${label} <span style="opacity:0.65;font-weight:500;font-size:12px;">${items.length}件</span></div>
      ${items.map(p => `
        <div class="priority-item" style="border-left-color:rgba(${r},${g},${b},0.6);" onclick="navigate('#/project/${p.id}')">
          <span class="pi-name">${p.name}</span>
          <div class="pi-meta">
            ${statusBadge(p.status)}
            ${p.waitingFor ? `<span style="color:#fdba74;font-size:11px;">⏳ ${p.waitingFor}</span>` : ''}
            ${labelFn ? labelFn(p) : ''}
            <button class="btn btn-ghost btn-sm" style="font-size:11px;padding:2px 8px;" onclick="event.stopPropagation();navigate('#/project/${p.id}')">今見る →</button>
          </div>
        </div>`).join('')}
    </div>`;
  }

  // 今日・期限切れのタスク（子タスク含む）
  const todayTasks = [];
  function collectTodayTasks(taskList, proj) {
    (taskList || []).forEach(t => {
      if (t.status !== '完了') {
        const d = daysUntil(t.deadline);
        if (d !== null && d <= 3) todayTasks.push({ t, proj });
      }
      if (t.children) collectTodayTasks(t.children, proj);
    });
  }
  active.forEach(p => collectTodayTasks(p.tasks, p));

  const d3Html = todayGroup('期限3日以内', '#ef4444', 0.08, '🔴', deadline3, p => {
    const d = daysUntil(p.deadline);
    return `<span style="color:${d < 0 ? '#f87171' : '#fb923c'};font-weight:700;">${d < 0 ? `${Math.abs(d)}日超過` : d === 0 ? '今日期限' : `あと${d}日`}</span>`;
  });
  const revHtml = todayGroup('要確認', '#f59e0b', 0.07, '🟡', review, null);
  const meHtml = todayGroup('こうた待ち', '#fb923c', 0.06, '👤', waitMe, p => `<span style="color:#fdba74;">${p.waitingFor}</span>`);
  const otherHtml = todayGroup('他メンバー待ち', '#3b82f6', 0.07, '👥', waitOther, p => `<span style="color:#1d4ed8;">${p.waitingFor}</span>`);

  // 今日のタスクパネル
  let taskTodayHtml = '';
  if (todayTasks.length) {
    taskTodayHtml = `<div class="today-panel" style="background:rgba(167,139,250,0.07);border-color:rgba(109,40,217,0.25);border-left:3px solid #7c3aed;margin-bottom:8px;">
      <div class="today-panel-title" style="color:#6d28d9;">📌 3日以内のタスク <span style="opacity:0.65;font-weight:500;font-size:12px;">${todayTasks.length}件</span></div>
      ${todayTasks.map(({ t, proj }) => {
        const d = daysUntil(t.deadline);
        const dlColor = d < 0 ? '#f87171' : d === 0 ? '#fb923c' : d <= 1 ? '#f59e0b' : '#6d28d9';
        const dlLabel = d < 0 ? `${Math.abs(d)}日超過` : d === 0 ? '今日期限' : `あと${d}日`;
        return `<div class="priority-item" style="border-left-color:${dlColor};" onclick="_highlightTaskId='${t.id}';navigate('#/project/${proj.id}')">

// ===================== PROGRESS SNAPSHOT (昨日比) =====================
const PROGRESS_SNAP_KEY = 'aicare-progress-snap';

function _dateStr() { return new Date().toISOString().slice(0, 10); }

function initProgressSnapshot() {
  const today = _dateStr();
  let snap = null;
  try { snap = JSON.parse(localStorage.getItem(PROGRESS_SNAP_KEY)); } catch(e) {}
  if (snap && snap.date === today) return; // already initialized today
  // New day: previous snap becomes "yesterday" reference
  const prevData = snap ? { date: snap.date, data: snap.data } : null;
  const todayData = {};
  (APP.projects || []).forEach(p => { todayData[String(p.id)] = calcProgress(p).pct; });
  localStorage.setItem(PROGRESS_SNAP_KEY, JSON.stringify({ date: today, data: todayData, prev: prevData }));
}

function getProgressDelta(p) {
  try {
    const snap = JSON.parse(localStorage.getItem(PROGRESS_SNAP_KEY));
    if (!snap) return null;
    const ref = (snap.date === _dateStr() && snap.prev) ? snap.prev : snap;
    if (!ref || !ref.data) return null;
    const prev = ref.data[String(p.id)];
    if (prev === undefined || prev === null) return null;
    return calcProgress(p).pct - prev;
  } catch(e) { return null; }
}

// ===================== PROGRESS CALC =====================
function calcProgress(p) {
  let total = 0, done = 0;
  function walk(tasks) {
    (tasks || []).forEach(t => {
      total++;
      if (t.status === '完了') done++;
      if (t.children && t.children.length) walk(t.children);
    });
  }
  walk(p.tasks);
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  return { total, done, pct };
}

function progressBarHtml(p, opts) {
  const { pct, done, total } = calcProgress(p);
  const height   = (opts && opts.height)  || '4px';
  const fontSize = (opts && opts.fontSize) || '11px';
  const barColor = pct === 100 ? 'rgba(74,222,128,0.4)' : 'rgba(96,165,250,0.35)';
  const trackColor = 'rgba(255,255,255,0.06)';
  const pctColor = pct === 100 ? '#4ade80' : pct >= 50 ? '#60a5fa' : '#94a3b8';
  const delta = getProgressDelta(p);
  const deltaHtml = (delta !== null && delta !== 0)
    ? `<span style="font-size:10px;padding:1px 5px;border-radius:4px;background:${delta > 0 ? 'rgba(74,222,128,0.12)' : 'rgba(248,113,113,0.12)'};color:${delta > 0 ? '#4ade80' : '#f87171'};white-space:nowrap;">${delta > 0 ? '▲' : '▼'}${Math.abs(delta)}%</span>`
    : '';
  return `<div style="display:flex;align-items:center;gap:6px;margin-top:5px;">
    <div style="flex:1;height:${height};background:${trackColor};border-radius:99px;overflow:hidden;">
      <div style="width:${pct}%;height:100%;background:${barColor};border-radius:99px;transition:width .3s;"></div>
    </div>
    <span style="font-size:13px;font-weight:700;color:${pctColor};white-space:nowrap;letter-spacing:-0.3px;">${pct}<span style="font-size:10px;font-weight:500;opacity:0.7;">%</span></span>
    ${total > 0 ? `<span style="font-size:10px;color:#3d5070;white-space:nowrap;">${done}/${total}</span>` : ''}
    ${deltaHtml}
  </div>`;
}

let currentTab = 'tasks';

// ══════════════════════════════ PROJECT DETAIL INLINE EDIT ══════════════════════════
const DEFAULT_PEOPLE = ['こうた','がく','ささじま','ワーカー','鷲巣','ちなり','開発'];
const PERSON_COLORS = ['#818cf8','#34d399','#60a5fa','#a78bfa','#fb923c','#f472b6','#94a3b8','#f87171','#34d399','#fbbf24'];
function personColor(name) {
  const all = getPeople();
  const i = all.indexOf(name);
  return PERSON_COLORS[(i >= 0 ? i : Math.abs(name.split('').reduce((a,c)=>a+c.charCodeAt(0),0))) % PERSON_COLORS.length];
}

// 全プロジェクト・タスクから担当者名を収集してAPP.peopleにマージ
function getAllKnownPeople() {
  const set = new Set(APP.people && APP.people.length ? APP.people : DEFAULT_PEOPLE);
  function scanTasks(tasks) {
    (tasks || []).forEach(t => {
      (t.assignee || '').split(/[、,，\s]+/).map(s => s.trim()).filter(Boolean).forEach(n => set.add(n));
      if (t.children) scanTasks(t.children);
    });
  }
  (APP.projects || []).forEach(p => {
    (p.assignee || '').split(/[、,，\s]+/).map(s => s.trim()).filter(Boolean).forEach(n => set.add(n));
    (p.members  || '').split(/[、,，\s]+/).map(s => s.trim()).filter(Boolean).forEach(n => set.add(n));
    scanTasks(p.tasks);
  });
  return [...set].filter(Boolean);
}

function getPeople() {
  return getAllKnownPeople();
}

function startProjDetailEdit(pid, field, el) {
  const p = getProjectById(pid);
  if (!p) return;
  const cur = p[field] || '';

  let input;
  if (field === 'name') {
    input = document.createElement('input');
    input.type = 'text'; input.className = 'pde-name-input'; input.value = cur;
  } else if (field === 'deadline') {
    input = document.createElement('input');
    input.type = 'date'; input.className = 'pde-text-input'; input.value = cur;
  } else if (field === 'urgency' || field === 'importance') {
    input = document.createElement('select');
    input.className = 'pde-select';
    ['', '高', '中', '低'].forEach(v => {
      const o = document.createElement('option');
      o.value = v; o.textContent = v || '（未設定）'; o.selected = v === cur;
      input.appendChild(o);
    });
  } else {
    input = document.createElement('input');
    input.type = 'text'; input.className = 'pde-text-input'; input.value = cur;
    input.placeholder = field === 'nextAction' ? '次アクションを入力…' : '';
  }

  let saved = false;
  const save = () => {
    if (saved) return; saved = true;
    const newVal = input.value;
    if (p[field] !== newVal) { p[field] = newVal; saveData(APP); }
    navigate('#/project/' + pid);
  };
  input.addEventListener('blur', save);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); save(); }
    if (e.key === 'Escape') { saved = true; navigate('#/project/' + pid); }
  });
  if (field === 'urgency' || field === 'importance') {
    input.addEventListener('change', save);
  }

  el.replaceWith(input);
  input.focus();
  if (input.select && field !== 'deadline') input.select();
}

function showPersonDropdown(pid, field, triggerEl) {
  const p = getProjectById(pid);
  if (!p) return;
  const people = getPeople();
  const extras = field === 'waitingFor' ? ['外部', '確認待ち', '素材待ち'] : [];
  const cur = p[field] || '';
  const dd = document.getElementById('pde-person-dd');

  const allOptions = [...people, ...extras];
  dd.innerHTML = `
    <div class="pde-dd-label">${field === 'assignee' ? '主担当を選択' : '誰待ちを設定'}</div>
    ${allOptions.map(name => `
      <div class="pde-dd-item${cur === name ? ' sel' : ''}" onclick="selectPersonField('${pid}','${field}','${name}')">
        <span class="pde-dd-check" style="background:${cur===name?'var(--accent)':'transparent'};border:1.5px solid ${cur===name?'var(--accent)':'var(--border)'};"></span>
        <span>${name}</span>
        ${cur === name ? '<span style="margin-left:auto;font-size:11px;color:var(--accent)">✓</span>' : ''}
      </div>`).join('')}
    <hr class="pde-dd-sep">
    <div id="pde-add-trigger" class="pde-dd-item" onclick="showPdeAddInput('${pid}','${field}')">
      <span style="color:var(--accent);font-size:14px;">＋</span>
      <span style="color:var(--muted);font-size:12px;">新しく追加</span>
    </div>
    <div id="pde-add-area" style="display:none;padding:4px 4px 2px;">
      <input id="pde-new-name" class="pde-add-input" type="text" placeholder="名前を入力…"
             onkeydown="if(event.key==='Enter')confirmPdeAdd('${pid}','${field}');if(event.key==='Escape')closePdeAdd();">
      <div style="display:flex;gap:4px;margin-top:4px;">
        <button onclick="confirmPdeAdd('${pid}','${field}')" style="flex:1;padding:5px;background:var(--accent);border:none;border-radius:6px;font-size:11px;font-weight:700;color:#000;cursor:pointer;">追加して選択</button>
        <button onclick="closePdeAdd()" style="padding:5px 8px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;">×</button>
      </div>
    </div>
    <hr class="pde-dd-sep">
    <div class="pde-dd-item" onclick="selectPersonField('${pid}','${field}','')">
      <span class="pde-dd-check" style="border:1.5px solid var(--border);"></span>
      <span style="color:var(--muted);font-size:12px;">クリア（なし）</span>
    </div>`;

  const rect = triggerEl.getBoundingClientRect();
  dd.style.top  = (rect.bottom + 6) + 'px';
  dd.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 268)) + 'px';
  dd.style.display = 'block';

  const close = (e) => {
    if (!dd.contains(e.target) && e.target !== triggerEl) {
      dd.style.display = 'none';
      document.removeEventListener('mousedown', close);
    }
  };
  setTimeout(() => document.addEventListener('mousedown', close), 10);
}

function selectPersonField(pid, field, value) {
  const p = getProjectById(pid);
  if (!p) return;
  p[field] = value;
  saveData(APP);
  document.getElementById('pde-person-dd').style.display = 'none';
  navigate('#/project/' + pid);
}

function showPdeAddInput(pid, field) {
  document.getElementById('pde-add-trigger').style.display = 'none';
  document.getElementById('pde-add-area').style.display = 'block';
  setTimeout(() => document.getElementById('pde-new-name').focus(), 30);
}

function closePdeAdd() {
  document.getElementById('pde-add-area').style.display = 'none';
  const t = document.getElementById('pde-add-trigger');
  if (t) t.style.display = '';
}

function confirmPdeAdd(pid, field) {
  const input = document.getElementById('pde-new-name');
  const name = (input && input.value || '').trim();
  if (!name) return;
  if (!APP.people) APP.people = [...DEFAULT_PEOPLE];
  if (!APP.people.includes(name)) { APP.people.push(name); saveData(APP); }
  selectPersonField(pid, field, name);
}

      <span class="badge pde-field${p.importance?'':' empty'}" style="${p.importance?'background:rgba(99,102,241,0.15);color:#a5b4fc;border:1px solid rgba(99,102,241,0.3);':''}" onclick="startProjDetailEdit('${p.id}','importance',this)" title="重要度をクリックで変更">${p.importance ? '重要度: '+p.importance : '重要度 +'}</span>

        📅 ${p.deadline ? formatDate(p.deadline)+(d !== null ? (d < 0 ? ` (${Math.abs(d)}日超過)` : d === 0 ? ' (今日!)' : ` (あと${d}日)`) : '') : '<span style="color:var(--muted)">期限を設定</span>'}
      </span>
      <span class="pde-field${p.waitingFor?'':' empty'}" style="${p.waitingFor?'color:#fb923c;':''}" onclick="showPersonDropdown('${p.id}','waitingFor',this)" title="クリックで誰待ちを変更">
        ⏳ ${p.waitingFor ? p.waitingFor+'待ち' : '誰待ちを設定'}

    </div>
    <div style="margin-top:10px;">${progressBarHtml(p, { height: '6px', fontSize: '12px' })}</div>
    <div class="pde-field" style="margin-top:8px;display:flex;" onclick="startProjDetailEdit('${p.id}','nextAction',this)" title="クリックで次アクションを編集">

function initProjectTabs(id) {
  // tabs handled via onclick
}

function switchTab(id, tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const p = getProjectById(id) || APP.projects.find(x => String(x.id) === String(id));
  if (p) document.getElementById('tab-content').innerHTML = renderTabContent(p, tab);
}

function renderTabContent(p, tab) {
  if (tab === 'tasks') return renderTaskTab(p);
  if (tab === 'deliverables') return renderDeliverablesTab(p);
  return '';
}

let taskFilter = '全て';
let taskSort = '優先度順';
let blockerFilter = '全て';
let bulkSelectMode = false;
let selectedTaskIds = new Set();

function renderTaskTab(p) {
  const statuses = ['全て','未着手','進行中','完了','要確認','保留'];
  let tasks = p.tasks || [];

  if (taskFilter !== '全て') tasks = tasks.filter(t => t.status === taskFilter);

  if (taskSort === '優先度順') tasks = [...tasks].sort((a,b) => priorityOrder(a.priority)-priorityOrder(b.priority));
  else if (taskSort === '期限順') tasks = [...tasks].sort((a,b) => {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return new Date(a.deadline) - new Date(b.deadline);
  });

  const bulkBar = bulkSelectMode ? `
  <div class="bulk-bar">
    <button class="btn btn-ghost btn-sm" onclick="selectAllVisibleTasks('${p.id}')">☑ 全選択</button>
    <button class="btn btn-ghost btn-sm" onclick="clearTaskSelection('${p.id}')">☐ 全解除</button>
    <span class="bulk-count" id="bulk-count-${p.id}">${selectedTaskIds.size}件選択中</span>
    <div style="flex:1;"></div>
    <span style="font-size:12px;color:var(--muted);">担当者を変更:</span>
    <select class="bulk-assignee-sel" id="bulk-assignee-sel" onchange="bulkAssigneeSelChange(this)">
      <option value="">選択してください</option>
      ${getPeople().map(person => `<option value="${person}">${person}</option>`).join('')}
      <option value="__new__">＋ 新しく追加…</option>
    </select>
    <button class="btn btn-primary btn-sm" onclick="bulkChangeAssignee('${p.id}')">変更する</button>
    <button class="btn btn-secondary btn-sm" onclick="toggleBulkMode('${p.id}')">キャンセル</button>
  </div>` : '';

  return `
  <div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;">
      <div class="filter-bar" style="margin-bottom:0;">
        ${statuses.map(s => `<button class="filter-btn ${taskFilter===s?'active':''}" onclick="setTaskFilter('${p.id}','${s}')">${s}</button>`).join('')}
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-ghost btn-sm${bulkSelectMode?' active':''}" onclick="toggleBulkMode('${p.id}')" style="${bulkSelectMode?'color:var(--accent);border-color:rgba(245,158,11,0.4);':''}" title="複数タスクを選択して一括操作">☑ 一括選択</button>
        <select onchange="setTaskSort('${p.id}',this.value)" style="padding:5px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:12px;">
          <option ${taskSort==='優先度順'?'selected':''}>優先度順</option>
          <option ${taskSort==='期限順'?'selected':''}>期限順</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openTaskModal('${p.id}', null)">＋ タスク追加</button>
      </div>
    </div>
    ${bulkBar}
    ${tasks.length === 0 ? `<div class="empty-state"><div class="empty-icon">📋</div><p>タスクがありません</p></div>` :
      tasks.map(t => renderTaskItem(p.id, t)).join('')
    }
  </div>`;
}

function toggleTaskDetail(safeId) {
  const wrap = document.getElementById('task-wrap-' + safeId);
  if (wrap) wrap.classList.toggle('expanded');
}

// ── Bulk select ──────────────────────────────────────────────────
function toggleBulkMode(projectId) {
  bulkSelectMode = !bulkSelectMode;
  selectedTaskIds.clear();
  const p = getProjectById(projectId);
  if (p) document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
}

function toggleTaskSelect(taskId, projectId) {
  if (selectedTaskIds.has(taskId)) {
    selectedTaskIds.delete(taskId);
  } else {
    selectedTaskIds.add(taskId);
  }
  // Update visual state of the row
  const safeId = taskId.replace(/[^a-z0-9]/gi, '_');
  const el = document.getElementById('task-item-' + safeId);
  if (el) el.classList.toggle('bulk-selected', selectedTaskIds.has(taskId));
  const cb = el && el.querySelector('.task-select-cb');
  if (cb) cb.checked = selectedTaskIds.has(taskId);
  const countEl = document.getElementById('bulk-count-' + projectId);
  if (countEl) countEl.textContent = selectedTaskIds.size + '件選択中';
}

function selectAllVisibleTasks(projectId) {
  const p = getProjectById(projectId);
  if (!p) return;
  let tasks = p.tasks || [];
  if (taskFilter !== '全て') tasks = tasks.filter(t => t.status === taskFilter);
  function collectIds(ts) {
    ts.forEach(t => {
      selectedTaskIds.add(t.id);
      if (t.children) collectIds(t.children);
    });
  }
  collectIds(tasks);
  document.querySelectorAll('.task-select-cb').forEach(cb => { cb.checked = true; });
  document.querySelectorAll('.task-item').forEach(el => el.classList.add('bulk-selected'));
  const countEl = document.getElementById('bulk-count-' + projectId);
  if (countEl) countEl.textContent = selectedTaskIds.size + '件選択中';
}

function clearTaskSelection(projectId) {
  selectedTaskIds.clear();
  document.querySelectorAll('.task-select-cb').forEach(cb => { cb.checked = false; });
  document.querySelectorAll('.task-item').forEach(el => el.classList.remove('bulk-selected'));
  const countEl = document.getElementById('bulk-count-' + projectId);
  if (countEl) countEl.textContent = '0件選択中';
}

function toggleTaskDone(taskId, projectId, cb) {
  const p = getProjectById(projectId);
  if (!p) return;
  function find(tasks) {
    for (const t of tasks) {
      if (String(t.id) === String(taskId)) return t;
      const found = t.children && find(t.children);
      if (found) return found;
    }
  }
  const task = find(p.tasks || []);
  if (!task) return;
  const newStatus = cb.checked ? '完了' : '未着手';
  task.status = newStatus;
  saveData(APP);
  const safeId = taskId.replace(/[^a-z0-9]/gi, '_');
  const el = document.getElementById('task-item-' + safeId);
  if (el) {
    el.classList.toggle('is-done', newStatus === '完了');
    if (newStatus === '完了') {
      el.classList.add('done-anim');
      setTimeout(() => el.classList.remove('done-anim'), 600);
    }
    // Update status badge
    const badge = el.querySelector('.badge');
    if (badge) { badge.className = 'badge status-' + newStatus; badge.textContent = newStatus + ' ▾'; }
  }
}

function startKpiEdit(pid, el) {
  const p = getProjectById(pid);
  if (!p) return;
  const ta = document.createElement('textarea');
  ta.value = p.kpi || '';
  ta.placeholder = '例: CVR 3%以上、月間PV 10,000…';
  ta.rows = 2;
  ta.className = 'pde-text-input';
  ta.style.cssText = 'width:100%;font-size:12px;resize:vertical;';
  let saved = false;
  const save = () => {
    if (saved) return; saved = true;
    p.kpi = ta.value.trim();
    saveData(APP);
    navigate('#/project/' + pid);
  };
  ta.addEventListener('blur', save);
  ta.addEventListener('keydown', e => { if (e.key === 'Escape') { saved = true; navigate('#/project/'+pid); } });
  el.replaceWith(ta);
  ta.focus(); ta.select();
}

function bulkAssigneeSelChange(sel) {
  if (sel.value !== '__new__') return;
  const name = prompt('新しい担当者名を入力してください:');
  if (!name || !name.trim()) { sel.value = ''; return; }
  const trimmed = name.trim();
  if (!APP.people) APP.people = [...getPeople()];
  if (!APP.people.includes(trimmed)) {
    APP.people.push(trimmed);
    saveData(APP);
    // Add to select
    const opt = document.createElement('option');
    opt.value = trimmed; opt.textContent = trimmed;

  }

}

function bulkChangeAssignee(projectId) {
  const sel = document.getElementById('bulk-assignee-sel');
  if (!sel || !sel.value) {
    if (sel) { sel.style.borderColor = '#ef4444'; setTimeout(() => { sel.style.borderColor = ''; }, 1000); }
    return;
  }
  if (selectedTaskIds.size === 0) return;
  const newAssignee = sel.value;
  const p = getProjectById(projectId);
  if (!p) return;
  function updateTasks(tasks) {
    tasks.forEach(t => {
      if (selectedTaskIds.has(t.id)) t.assignee = newAssignee;
      if (t.children) updateTasks(t.children);
    });
  }
  updateTasks(p.tasks || []);
  const count = selectedTaskIds.size;
  saveData(APP);
  bulkSelectMode = false;
  selectedTaskIds.clear();
  document.getElementById('tab-content').innerHTML = renderTabContent(p, 'tasks');
  showSaveIndicator(`✅ ${count}件の担当者を ${newAssignee} に変更`, '#10b981');
}

         id="task-item-${safeId}"

         ondragover="${bulkSelectMode ? '' : `taskDragOver(event,'${projectId}','${t.id}')`}"
